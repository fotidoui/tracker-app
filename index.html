<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker FIXED v5</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#eef2f6;
}

#weekSelect{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  padding:20px;
}

.weekBox{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

#app{display:none;}

#header{
  display:flex;
  background:#111827;
  color:white;
}

#tabs{
  display:flex;
  flex:1;
}

#tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:#cbd5e1;
  font-size:11px;
}

#tabs button.active{
  background:#1f2937;
  color:white;
}

#back{
  padding:10px;
  background:#374151;
  color:white;
  border:none;
  font-size:11px;
}

#sync{
  padding:10px;
  background:#10b981;
  color:white;
  border:none;
  font-size:11px;
}

#content{padding:10px;}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ddd;
  font-size:10px;
  text-align:center;
  padding:2px;
}

textarea,input{
  width:100%;
  font-size:11px;
}

button{
  font-size:11px;
  margin:2px;
}

.routeBox{
  border:1px solid #ddd;
  padding:6px;
  margin:6px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="weekSelect"></div>

<div id="app">

<div id="header">
  <div id="tabs">
    <button onclick="goTab('weekly')" id="t-weekly">Weekly</button>
    <button onclick="goTab('routes')" id="t-routes">Routes</button>
    <button onclick="goTab('db')" id="t-db">Database</button>
  </div>

  <button id="sync" onclick="sync()">SYNC</button>
  <button id="back" onclick="back()">Weeks</button>
</div>

<div id="content">

<div id="weekly"></div>
<div id="routes"></div>
<div id="db"></div>

<div id="map" style="height:250px;margin-top:10px;"></div>

</div>
</div>

<script>

/* ================= STATE ================= */
let state={
  week:null,
  data:JSON.parse(localStorage.getItem("data")||"{}")
};

let session=null;
let watch=null;
let map=null;
let marker=null;
let currentRoutePreview=[];

/* ================= WEEKS ================= */
function initWeeks(){
  let c=document.getElementById("weekSelect");
  c.innerHTML="<h2 style='grid-column:1/-1'>Select Week</h2>";

  for(let i=1;i<=52;i++){
    let el=document.createElement("div");
    el.className="weekBox";
    el.innerHTML="Week "+i;

    el.onclick=()=>{
      state.week=i;
      ensure();
      open();
    };

    c.appendChild(el);
  }
}
initWeeks();

function open(){
  document.getElementById("weekSelect").style.display="none";
  document.getElementById("app").style.display="block";
  goTab("weekly");
}

function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("weekSelect").style.display="grid";
}

/* ================= DATA ================= */
function ensure(){
  if(!state.data[state.week]){
    state.data[state.week]={
      checks:Array(8).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

/* ================= SYNC ================= */
function sync(){
  save();
  goTab(activeTab);
}

/* ================= TABS ================= */
let activeTab="weekly";

function goTab(t){

  if(activeTab==="weekly" && t!=="weekly"){
    if(!confirm("Save weekly changes?")) return;
    save();
  }

  activeTab=t;

  ["weekly","routes","db"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });

  document.getElementById(t).style.display="block";

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("t-"+t).classList.add("active");

  if(t==="weekly") renderWeekly();
  if(t==="routes") renderRoutes();
  if(t==="db") renderDB();
}

/* ================= WEEKLY FIX ================= */
function renderWeekly(){

  let w=state.data[state.week];

  let html="<div class='card'><b>Week "+state.week+"</b></div>";

  html+="<div class='card'><b>Habits</b><table><tr><th></th>";

  ["M","T","W","T","F","S","S"].forEach(d=>html+="<th>"+d+"</th>");

  html+="</tr>";

  for(let i=0;i<8;i++){
    html+="<tr><td>H"+(i+1)+"</td>";

    for(let j=0;j<7;j++){
      html+=`
      <td>
        <input type="checkbox"
        ${w.checks[i][j]?"checked":""}
        onchange="w.checks[${i}][${j}]=this.checked;save()">
      </td>`;
    }

    html+="</tr>";
  }

  html+="</table></div>";

  html+="<div class='card'><b>Notes per day</b>";

  w.notes.forEach((n,i)=>{
    html+=`
    <textarea onchange="w.notes[${i}]=this.value;save()">${n}</textarea>`;
  });

  html+="</div>";

  document.getElementById("weekly").innerHTML=html;
}

/* ================= ROUTES FIX ================= */
function renderRoutes(){

  let w=state.data[state.week];

  let html="<div class='card'><b>Route Control</b>";

  html+=`
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>
  <button onclick="stop()">Stop</button>
  `;

  html+="</div>";

  html+="<div class='card'><b>Live Preview</b><div id='live'></div></div>";

  html+="<div class='card'><b>Saved Routes</b>";

  w.routes.forEach((day,i)=>{
    html+="<b>Day "+(i+1)+"</b>";

    day.forEach((r,j)=>{
      html+=`
      <div class="routeBox">
        ${r.totalKm.toFixed(2)} km<br>
        Segments: ${r.segments.length}<br>

        <button onclick="loadRoute(${i},${j})">Load</button>
      </div>`;
    });
  });

  html+="</div>";

  document.getElementById("routes").innerHTML=html;
}

/* ================= GPS ================= */
function start(){

  session={
    seg:[[]],
    route:{segments:[],totalKm:0}
  };

  watch=navigator.geolocation.watchPosition(p=>{

    let pt={lat:p.coords.latitude,lng:p.coords.longitude};

    session.seg.at(-1).push(pt);

    currentRoutePreview.push(pt);
    drawPreview();

  });
}

function pause(){
  session.seg.push([]);
}

function stop(){

  navigator.geolocation.clearWatch(watch);

  let w=state.data[state.week];
  let day=(new Date().getDay()+6)%7;

  session.seg.forEach(s=>{
    if(s.length<2) return;

    let km=calc(s);

    session.route.segments.push({
      points:s,
      distanceKm:km
    });

    session.route.totalKm+=km;
  });

  w.routes[day].push(session.route);

  save();
  renderWeekly();
}

/* ================= PREVIEW ================= */
function drawPreview(){

  let el=document.getElementById("live");
  el.innerHTML=currentRoutePreview.length+" points recorded";
}

/* ================= MAP ================= */
function loadRoute(day,i){

  let r=state.data[state.week].routes[day][i];

  currentRoutePreview=r.segments.flatMap(s=>s.points);

  drawPreview();
}

/* ================= DIST ================= */
function calc(a){
  let t=0;
  for(let i=1;i<a.length;i++){
    let x=a[i-1],y=a[i];
    t+=Math.hypot(y.lat-x.lat,y.lng-x.lng)*111;
  }
  return t;
}

/* ================= DB FIX ================= */
function renderDB(){

  let w=state.data[state.week];

  let html="<div class='card'><b>Database</b></div>";

  html+="<div class='card'><b>Habits</b></div>";

  html+="<div class='card'><b>Routes</b>";

  w.routes.forEach((d,i)=>{
    let total=0;
    d.forEach(r=>total+=r.totalKm||0);
    html+="Day "+(i+1)+": "+total.toFixed(1)+" km<br>";
  });

  html+="</div>";

  document.getElementById("db").innerHTML=html;
}

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("data",JSON.stringify(state.data));
}

</script>

</body>
</html>
