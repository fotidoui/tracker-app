<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    .screen { display:none; }

    table {
      margin:10px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:5px;
      font-size:12px;
    }

    textarea { width:95%; height:40px; }
    #map { height:250px; margin:10px; }

    .eventBox {
      font-size:10px;
      border-top:1px solid #ddd;
    }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeekToDB()">💾 Save Week</button>
  <button onclick="exportCSV()">CSV</button>
  <button onclick="exportXML()">XML</button>

  <div id="map"></div>

  <table id="grid"></table>

  <div id="eventLog"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

// ===== STATE =====
let habits = Array(10).fill("").map((_,i)=>"Habit "+(i+1));

let liveEvents = JSON.parse(localStorage.getItem("liveEvents")) || [];
let database = JSON.parse(localStorage.getItem("database")) || [];

let currentWeek = null;
let selectedDay = null;

let routeSession = {active:false, paused:false, id:null};
let watchId = null;

let map, layer;

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== INIT =====
window.onload = () => {

  document.getElementById("weekInput").onchange = (e)=>{
    currentWeek = Number(e.target.value);
    renderWeek();
    updateMap();
  };

  show("home");
};

// ===== STORAGE =====
function save(){
  localStorage.setItem("liveEvents",JSON.stringify(liveEvents));
  localStorage.setItem("database",JSON.stringify(database));
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") setTimeout(initMap,100);
  if(id==="db") renderDB();
}

// ===== MAP =====
function initMap(){
  if(map) return;

  map = L.map('map').setView([52,5],7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  layer = L.layerGroup().addTo(map);
}

function updateMap(){

  if(!map || currentWeek===null) return;

  layer.clearLayers();

  let evs = liveEvents.filter(e => e.week===currentWeek && e.lat);

  if(evs.length===0) return;

  let bounds=[];
  let grouped={};

  evs.forEach(e=>{
    let key = e.lat.toFixed(4)+","+e.lng.toFixed(4);
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(e);
  });

  Object.values(grouped).forEach(group=>{
    let e = group[0];

    let marker = L.marker([e.lat,e.lng]).addTo(layer);

    let html = group.map(g=>
      `${g.type} | ${days[g.day]} | ${new Date(g.time).toLocaleTimeString()}`
    ).join("<br>");

    marker.bindPopup(html);
    bounds.push([e.lat,e.lng]);
  });

  map.fitBounds(bounds);
}

// ===== GEO =====
function getDay(){
  return selectedDay!==null
    ? selectedDay
    : (new Date().getDay()+6)%7;
}

function getPos(cb){
  navigator.geolocation.getCurrentPosition(
    pos=>cb(pos.coords),
    ()=>cb(null),
    {enableHighAccuracy:false, timeout:5000}
  );
}

// ===== EVENTS =====
function record(type, extra={}){

  if(!Number.isFinite(currentWeek)){
    alert("Enter valid week");
    return;
  }

  getPos(coords=>{

    liveEvents.push({
      type,
      time:Date.now(),
      lat:coords?.latitude,
      lng:coords?.longitude,
      week:currentWeek,
      day:getDay(),
      routeId:routeSession.id,
      ...extra
    });

    save();
    renderWeek();
    updateMap();
  });
}

// ===== ROUTES =====
function startRoute(){
  routeSession={active:true,paused:false,id:Date.now()};
  record("route-start");

  watchId = navigator.geolocation.watchPosition(pos=>{
    if(routeSession.active && !routeSession.paused){
      liveEvents.push({
        type:"route-point",
        time:Date.now(),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        week:currentWeek,
        day:getDay(),
        routeId:routeSession.id
      });
      save();
      updateMap();
    }
  }, null, {enableHighAccuracy:false, maximumAge:5000});
}

function pauseRoute(){
  if(!routeSession.active) return;
  routeSession.paused=true;
  record("route-pause");
}

function resumeRoute(){
  if(!routeSession.active) return;
  routeSession.paused=false;
  record("route-resume");
}

function stopRoute(){
  if(watchId!==null){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
  }
  record("route-end");
  routeSession={active:false,paused:false,id:null};
}

// ===== WEEK =====
function renderWeek(){

  let table=document.getElementById("grid");
  table.innerHTML="";

  let h=document.createElement("tr");
  h.appendChild(document.createElement("th"));

  days.forEach((d,i)=>{
    let th=document.createElement("th");
    th.innerText=d;
    th.onclick=()=>selectedDay=i;
    h.appendChild(th);
  });

  table.appendChild(h);

  for(let i=0;i<10;i++){

    let r=document.createElement("tr");
    let td=document.createElement("td");
    td.innerText=habits[i];
    r.appendChild(td);

    for(let d=0;d<7;d++){

      let cell=document.createElement("td");

      let btn=document.createElement("button");
      btn.innerText="+";

      btn.onclick=()=>{
        selectedDay=d;
        record("habit",{habitIndex:i});
      };

      cell.appendChild(btn);

      let evs = liveEvents.filter(e=>
        e.type==="habit" &&
        e.week===currentWeek &&
        e.day===d &&
        e.habitIndex===i
      );

      evs.forEach(ev=>{
        let div=document.createElement("div");
        div.className="eventBox";
        div.innerText=new Date(ev.time).toLocaleTimeString();

        let del=document.createElement("button");
        del.innerText="X";

        del.onclick=()=>{
          liveEvents.splice(liveEvents.indexOf(ev),1);
          save();
          renderWeek();
          updateMap();
        };

        div.appendChild(del);
        cell.appendChild(div);
      });

      r.appendChild(cell);
    }

    table.appendChild(r);
  }

  // NOTES
  let r=document.createElement("tr");
  r.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let d=0;d<7;d++){

    let td=document.createElement("td");

    let ta=document.createElement("textarea");

    let btn=document.createElement("button");
    btn.innerText="✔";

    btn.onclick=()=>{
      if(!ta.value.trim()) return;
      selectedDay=d;
      record("note",{text:ta.value});
      ta.value="";
    };

    td.appendChild(ta);
    td.appendChild(btn);

    let evs = liveEvents.filter(e=>
      e.type==="note" &&
      e.week===currentWeek &&
      e.day===d
    );

    evs.forEach(ev=>{
      let div=document.createElement("div");
      div.className="eventBox";
      div.innerText=ev.text;

      let del=document.createElement("button");
      del.innerText="X";

      del.onclick=()=>{
        liveEvents.splice(liveEvents.indexOf(ev),1);
        save();
        renderWeek();
        updateMap();
      };

      div.appendChild(del);
      td.appendChild(div);
    });

    r.appendChild(td);
  }

  table.appendChild(r);

  renderEventLog();
}

// ===== EVENT LOG =====
function renderEventLog(){

  let div=document.getElementById("eventLog");
  div.innerHTML="<h3>Events</h3>";

  let evs = liveEvents
    .filter(e=>e.week===currentWeek)
    .sort((a,b)=>b.time-a.time);

  evs.forEach(ev=>{
    let row=document.createElement("div");

    row.innerText =
      `${days[ev.day]} | ${ev.type} | ${new Date(ev.time).toLocaleString()}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      liveEvents.splice(liveEvents.indexOf(ev),1);
      save();
      renderWeek();
      updateMap();
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}

// ===== DATABASE =====
function saveWeekToDB(){

  if(!Number.isFinite(currentWeek)){
    alert("Invalid week");
    return;
  }

  let weekEvents = liveEvents.filter(e=>e.week===currentWeek);

  let i = database.findIndex(w=>Number(w.week)===currentWeek);

  let copy = JSON.parse(JSON.stringify(weekEvents));

  if(i!==-1){
    database[i].data = copy;
  } else {
    database.push({week:currentWeek,data:copy});
  }

  save();
  alert("Saved");
}

function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  database.forEach(w=>{
    if(!Number.isFinite(w.week)) return;

    let table=document.createElement("table");

    let h=document.createElement("tr");
    ["Type","Day","Time","Lat","Lng","Route"].forEach(t=>{
      let th=document.createElement("th");
      th.innerText=t;
      h.appendChild(th);
    });

    table.appendChild(h);

    w.data.forEach(e=>{
      let tr=document.createElement("tr");

      tr.innerHTML=`
        <td>${e.type}</td>
        <td>${days[e.day]}</td>
        <td>${new Date(e.time).toLocaleString()}</td>
        <td>${e.lat||""}</td>
        <td>${e.lng||""}</td>
        <td>${e.routeId||""}</td>
      `;

      table.appendChild(tr);
    });

    div.appendChild(document.createTextNode("Week "+w.week));
    div.appendChild(table);
  });
}

// ===== EXPORT =====
function exportCSV(){
  let evs = liveEvents.filter(e=>e.week===currentWeek);
  let rows = ["type,day,time,lat,lng"];
  evs.forEach(e=>{
    rows.push(`${e.type},${e.day},${e.time},${e.lat},${e.lng}`);
  });
  download("data.csv",rows.join("\n"));
}

function exportXML(){
  let evs = liveEvents.filter(e=>e.week===currentWeek);
  let xml = "<events>";
  evs.forEach(e=>{
    xml+=`<event type="${e.type}" day="${e.day}" time="${e.time}" lat="${e.lat}" lng="${e.lng}" />`;
  });
  xml+="</events>";
  download("data.xml",xml);
}

function download(name,content){
  let a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([content]));
  a.download=name;
  a.click();
}

</script>

</body>
</html>
