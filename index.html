<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; display:flex; }

#menu {
  width:130px;
  background:#222;
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

#menu button {
  background:none;
  color:white;
  border:none;
  padding:15px;
  text-align:left;
  cursor:pointer;
}

#menu button:hover { background:#444; }

#content { flex:1; padding:10px; }

.screen { display:none; }

table { width:100%; border-collapse: collapse; }
td, th { border:1px solid #ccc; padding:5px; }

textarea { width:100%; height:50px; }

#mapContainer { height:500px; }

</style>
</head>
<body>

<div id="menu">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('routes')">Routes</button>
  <button onclick="show('map');initMap()">Map</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="content">

<div id="weekly" class="screen">
  <h3 id="weekTitle"></h3>
  <input id="weekInput" type="number" value="1">
  <table id="grid"></table>
</div>

<div id="routes" class="screen">
  <h3>Route Recorder</h3>
  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>
  <p id="gpsStatus"></p>
</div>

<div id="map" class="screen">
  <h3>Map</h3>
  <div id="mapContainer"></div>
</div>

<div id="db" class="screen">
  <h3>Database</h3>
  <button onclick="exportData()">Export</button>
  <input type="file" onchange="importData(event)">
  <div id="dbContent"></div>
</div>

</div>

<script>

// ===== STATE =====
let weekData = JSON.parse(localStorage.getItem("weekData")||"{}");
let habits = JSON.parse(localStorage.getItem("habits")||"null") 
  || Array(5).fill("").map((_,i)=>"Habit "+(i+1));

let currentWeek = 1;

let session = null;
let watchId = null;

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== DATE =====
function getMonday(week, year){
  let d = new Date(year, 0, 1 + (week-1)*7);
  let day = d.getDay();
  let diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function getWeekInfo(){
  let year = new Date().getFullYear();
  let monday = getMonday(currentWeek, year);
  let month = monday.toLocaleString('default', { month: 'long' });
  return { monday, month, year };
}

// ===== INIT =====
window.onload = () => {
  ensureWeek();
  render();
  show("weekly");
};

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  if(id==="db") renderDB();
}

// ===== WEEK =====
document.getElementById("weekInput").onchange = function(){
  currentWeek = Number(this.value)||1;
  ensureWeek();
  render();
};

function ensureWeek(){
  if(!weekData[currentWeek]){
    weekData[currentWeek] = {
      checks:Array(habits.length).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

// ===== RENDER =====
function render(){

  let { monday, month, year } = getWeekInfo();

  document.getElementById("weekTitle").innerText =
    "Week " + currentWeek + " (" + month + " " + year + ")";

  let table = document.getElementById("grid");
  table.innerHTML = "";

  let w = weekData[currentWeek];

  let tr = document.createElement("tr");
  tr.appendChild(document.createElement("th"));

  for(let i=0;i<7;i++){
    let d=new Date(monday);
    d.setDate(monday.getDate()+i);

    let th=document.createElement("th");
    th.innerText = days[i]+" "+d.getDate();
    tr.appendChild(th);
  }
  table.appendChild(tr);

  let rrow=document.createElement("tr");
  rrow.appendChild(Object.assign(document.createElement("td"),{innerText:"KM"}));

  for(let j=0;j<7;j++){
    let total = w.routes[j].reduce((s,r)=>s+(r.totalKm||0),0);
    let td=document.createElement("td");
    td.innerText=total.toFixed(1);
    rrow.appendChild(td);
  }
  table.appendChild(rrow);

  habits.forEach((h,i)=>{
    let row=document.createElement("tr");

    let input=document.createElement("input");
    input.value=h;
    input.onchange=()=>{ habits[i]=input.value; saveAll(); };

    let name=document.createElement("td");
    name.appendChild(input);
    row.appendChild(name);

    for(let j=0;j<7;j++){
      let cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=w.checks[i][j];
      cb.onchange=()=>{ w.checks[i][j]=cb.checked; saveAll(); };

      let td=document.createElement("td");
      td.appendChild(cb);
      row.appendChild(td);
    }

    table.appendChild(row);
  });

  let nrow=document.createElement("tr");
  nrow.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let j=0;j<7;j++){
    let t=document.createElement("textarea");
    t.value=w.notes[j];
    t.onchange=()=>{ w.notes[j]=t.value; saveAll(); };

    let td=document.createElement("td");
    td.appendChild(t);
    nrow.appendChild(td);
  }

  table.appendChild(nrow);
}

// ===== ROUTES =====
function startRoute(){
  session = { active:true, paused:false, segments:[[]] };

  watchId = navigator.geolocation.watchPosition(pos=>{
    if(!session.active || session.paused) return;

    let p={lat:pos.coords.latitude,lng:pos.coords.longitude};
    session.segments[session.segments.length-1].push(p);

    document.getElementById("gpsStatus").innerText =
      "Tracking: "+session.segments.flat().length;

  }, err=>{
    document.getElementById("gpsStatus").innerText=err.message;
  }, {enableHighAccuracy:true});
}

function pauseRoute(){ if(session){ session.paused=true; session.segments.push([]); } }
function resumeRoute(){ if(session){ session.paused=false; } }

async function stopRoute(){

  if(!session) return;

  session.active=false;
  navigator.geolocation.clearWatch(watchId);

  let day=(new Date().getDay()+6)%7;

  let route={segments:[], totalKm:0};

  for(let seg of session.segments){

    if(seg.length<2) continue;

    let km = calc(seg);
    let start = await getAddr(seg[0]);
    let end = await getAddr(seg[seg.length-1]);

    route.segments.push({km,start,end,coords:seg});
    route.totalKm+=km;
  }

  if(route.segments.length>0){
    weekData[currentWeek].routes[day].push(route);
  }

  saveAll();
  render();
}

// ===== MAP =====
let map, userMarker;

function initMap(){

  if(map) return;

  map = L.map('mapContainer').setView([52.1, 5.3], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  drawRoutes();
  trackUser();
}

function drawRoutes(){
  for(let w in weekData){
    weekData[w].routes.forEach(day=>{
      day.forEach(route=>{
        route.segments.forEach(seg=>{
          if(!seg.coords) return;
          let latlngs = seg.coords.map(p=>[p.lat,p.lng]);
          L.polyline(latlngs,{color:'blue'}).addTo(map);
        });
      });
    });
  }
}

function trackUser(){
  navigator.geolocation.watchPosition(pos=>{
    let lat=pos.coords.latitude;
    let lng=pos.coords.longitude;

    if(!userMarker){
      userMarker = L.circleMarker([lat,lng],{radius:8,color:'red'}).addTo(map);
    } else {
      userMarker.setLatLng([lat,lng]);
    }
  });
}

// ===== DELETE =====
function deleteRoute(week,day,index){
  if(!confirm("Delete route?")) return;
  weekData[week].routes[day].splice(index,1);
  saveAll();
  renderDB();
  render();
}

// ===== DATABASE =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  for(let w in weekData){

    let data = weekData[w];

    let block=document.createElement("div");
    block.style.border="1px solid #aaa";
    block.style.margin="10px";
    block.style.padding="10px";

    block.innerHTML="<h3>Week "+w+"</h3>";

    data.routes.forEach((day,i)=>{
      if(day.length===0) return;

      block.innerHTML+="<b>"+days[i]+"</b><br>";

      day.forEach((r,idx)=>{

        block.innerHTML+=`
          Total ${r.totalKm.toFixed(2)} km
          <button onclick="deleteRoute(${w},${i},${idx})">❌</button><br>
        `;

        r.segments.forEach(s=>{
          block.innerHTML+=s.start+" → "+s.end+
          " ("+s.km.toFixed(2)+" km)<br>";
        });

        block.innerHTML+="<br>";
      });
    });

    div.appendChild(block);
  }
}

// ===== HELPERS =====
function calc(r){
  let t=0;
  for(let i=1;i<r.length;i++) t+=dist(r[i-1],r[i]);
  return t;
}

function dist(a,b){
  let R=6371;
  let dLat=(b.lat-a.lat)*Math.PI/180;
  let dLon=(b.lng-a.lng)*Math.PI/180;

  let x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function getAddr(c){
  try{
    let r=await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.lat}&lon=${c.lng}`
    );
    let d=await r.json();
    return d.display_name || "Unknown";
  }catch{
    return "Unknown";
  }
}

// ===== SAVE / EXPORT =====
function saveAll(){
  localStorage.setItem("weekData",JSON.stringify(weekData));
  localStorage.setItem("habits",JSON.stringify(habits));
}

function exportData(){
  let blob=new Blob([JSON.stringify({weekData,habits})],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tracker_backup.json";
  a.click();
}

function importData(e){
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=()=>{
    let data=JSON.parse(reader.result);
    weekData=data.weekData||{};
    habits=data.habits||habits;
    saveAll();
    render();
    alert("Imported");
  };

  reader.readAsText(file);
}

</script>
</body>
</html>
