<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker V4</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f1f5f9; }

#menu {
  display:flex;
  background:#111827;
}
#menu button {
  flex:1;
  padding:12px;
  border:none;
  background:#111827;
  color:#cbd5e1;
}
#menu button:hover { background:#1f2937; color:white; }

.screen { display:none; padding:15px; }

.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

button.action {
  margin:5px;
  padding:10px;
}

#map { height:300px; }

.event {
  font-size:12px;
  border-bottom:1px solid #eee;
  padding:5px;
}
</style>

</head>

<body>

<div id="menu">
  <button onclick="show('home')">Home</button>
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('map');initMap()">Map</button>
  <button onclick="show('db')">DB</button>
</div>

<!-- HOME -->

<div id="home" class="screen">
  <div class="card">
    <h3>Record Event</h3>

```
<button class="action" onclick="recordEvent('start')">Start</button>
<button class="action" onclick="recordEvent('pause')">Pause</button>
<button class="action" onclick="recordEvent('resume')">Resume</button>
<button class="action" onclick="recordEvent('end')">End</button>

<hr>

<button class="action" onclick="recordEvent('habit')">Habit</button>
<button class="action" onclick="recordEvent('note')">Note</button>
<button class="action" onclick="recordEvent('skill')">Skill</button>

<p id="status"></p>
```

  </div>
</div>

<!-- WEEKLY -->

<div id="weekly" class="screen">
  <div class="card">
    Week: <input id="weekInput" type="number" value="1">
  </div>
  <div class="card" id="weeklyList"></div>
</div>

<!-- MAP -->

<div id="mapScreen" class="screen">
  <div class="card">
    Week: <input id="mapWeek" type="number" value="1">
    <button onclick="renderMap()">Show</button>
  </div>
  <div id="map"></div>
</div>

<!-- DB -->

<div id="db" class="screen">
  <div class="card">
    <button onclick="clearDB()">Clear DB</button>
    <div id="dbView"></div>
  </div>
</div>

<script>

// ===== STORAGE =====
let records = JSON.parse(localStorage.getItem("records") || "[]");

// ===== SESSION =====
let currentSession = null;

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");

  if(id==="map"){
    document.getElementById("mapScreen").style.display="block";
    return;
  }

  document.getElementById(id).style.display="block";

  if(id==="weekly") renderWeekly();
  if(id==="db") renderDB();
}

// ===== SAVE =====
function save(){
  localStorage.setItem("records", JSON.stringify(records));
}

// ===== WEEK HELPER =====
function getWeek(ts){
  let d = new Date(ts);
  let onejan = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - onejan) / 86400000) + onejan.getDay()+1)/7);
}

// ===== RECORD EVENT (FIXED GPS) =====
function recordEvent(type){

  if(!navigator.geolocation){
    createRecord(type, null, null);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      createRecord(type, pos.coords.latitude, pos.coords.longitude);
    },
    err=>{
      console.warn("GPS error:", err.message);
      createRecord(type, null, null);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

function createRecord(type, lat, lng){

  if(type==="start") currentSession = Date.now();
  if(type==="end") currentSession = null;

  let rec = {
    id: Date.now() + Math.random(),
    timestamp: Date.now(),
    lat,
    lng,
    type,
    session_id: currentSession,
    address: null
  };

  records.push(rec);
  save();

  document.getElementById("status").innerText =
    "Saved: " + type + (lat ? " (GPS OK)" : " (NO GPS)");
}

// ===== WEEKLY =====
function renderWeekly(){

  let week = Number(document.getElementById("weekInput").value);
  let div = document.getElementById("weeklyList");

  let data = records.filter(r => getWeek(r.timestamp) === week);

  div.innerHTML = "<b>Total events:</b> "+data.length+"<br><br>";

  data.forEach(r=>{
    div.innerHTML += `
      <div class="event">
        ${new Date(r.timestamp).toLocaleString()} |
        ${r.type} |
        ${r.lat ? r.lat.toFixed(5)+","+r.lng.toFixed(5) : "no GPS"}
      </div>
    `;
  });
}

// ===== MAP =====
let map, layer;

function initMap(){
  if(map) return;

  map = L.map("map").setView([52.1,5.3],7);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
    .addTo(map);

  layer = L.layerGroup().addTo(map);
}

function renderMap(){

  if(!map) return;

  layer.clearLayers();

  let week = Number(document.getElementById("mapWeek").value);
  let data = records.filter(r => getWeek(r.timestamp) === week && r.lat);

  let sessions = {};

  data.forEach(r=>{
    if(r.session_id){
      if(!sessions[r.session_id]) sessions[r.session_id] = [];
      sessions[r.session_id].push(r);
    }
  });

  Object.values(sessions).forEach(arr=>{
    arr.sort((a,b)=>a.timestamp-b.timestamp);

    if(arr.length > 1){
      let coords = arr.map(p=>[p.lat,p.lng]);
      L.polyline(coords,{color:"blue"}).addTo(layer);
    }
  });

  data.forEach(r=>{
    L.circleMarker([r.lat,r.lng]).addTo(layer)
      .bindPopup(r.type);
  });
}

// ===== DB =====
function renderDB(){

  let div = document.getElementById("dbView");
  div.innerHTML = "<b>Total records:</b> "+records.length+"<br><br>";

  records.slice().reverse().forEach(r=>{
    div.innerHTML += `
      <div class="event">
        ${r.type} | ${new Date(r.timestamp).toLocaleString()}
      </div>
    `;
  });
}

function clearDB(){
  if(confirm("Delete all data?")){
    records = [];
    save();
    renderDB();
  }
}

// ===== INIT =====
show("home");

</script>

</body>
</html>
