<html lang="el">

<title>Personal Spatial Journal Tracker — Integrated Stable</title>
<style>
:root{--bg:#fbf6ea;--paper:#fffaf0;--ink:#24333b;--muted:#66777d;--line:#d8ccb2;--sea:#2f6f7e;--green:#718455;--orange:#c57449;--red:#d95d5d;--violet:#7757a5;--shadow:0 14px 34px rgba(36,51,59,.18)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink)}
button,input,select,textarea{font:inherit;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:8px 10px}button{cursor:pointer;touch-action:manipulation}.primary{background:var(--sea);border-color:var(--sea);color:#fff}.danger{background:#fff0ef}.warn{background:#fff1e7}.hidden{display:none!important}
#app{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(#fffaf2,#f6efdf)}#map{position:absolute;inset:0;z-index:1;touch-action:none}
#info{position:absolute;z-index:20;left:10px;right:10px;top:10px;background:rgba(255,250,240,.95);border:1px solid var(--line);border-radius:18px;padding:10px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}.infoText{font-size:12px;line-height:1.35;color:var(--muted)}.infoText b{color:var(--ink)}.icons{display:flex;gap:8px}.icon{width:48px;height:48px;border-radius:999px;display:grid;place-items:center;font-size:23px;position:relative;padding:0;box-shadow:0 8px 22px rgba(36,51,59,.12)}#needle{position:absolute;width:3px;height:22px;border-radius:4px;background:var(--red);left:50%;top:6px;transform-origin:50% 18px;transform:translateX(-50%) rotate(0deg)}#compass span{position:absolute;bottom:3px;font-size:10px;color:var(--muted)}
#zoom{position:absolute;z-index:18;right:10px;top:146px;display:flex;flex-direction:column;gap:6px;background:rgba(255,250,240,.82);border:1px solid var(--line);border-radius:16px;padding:7px;box-shadow:var(--shadow)}#zoom button{padding:7px 9px}
#dock{position:absolute;z-index:21;left:10px;right:10px;bottom:10px;background:rgba(255,250,240,.96);border:1px solid var(--line);border-radius:20px;padding:10px;box-shadow:var(--shadow)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;background:#fff;padding:4px 9px;font-size:12px}.small{font-size:12px}.muted{color:var(--muted)}
.panel{position:absolute;z-index:34;right:0;top:0;width:min(96vw,900px);height:100dvh;background:var(--paper);border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(105%);transition:.22s;display:flex;flex-direction:column}.panel.open{transform:translateX(0)}.head,.tabs{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px;border-bottom:1px solid var(--line)}.head{justify-content:space-between}.tabs button.active{outline:2px solid var(--sea)}.body{overflow:auto;padding:12px;flex:1}.sec{display:none}.sec.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:14px;margin:8px 0;padding:10px}.draft{border-style:dashed;border-color:var(--orange);background:#fff8ea}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tableWrap{max-height:62dvh;overflow:auto}table{border-collapse:collapse;width:100%;background:#fff}th,td{border:1px solid var(--line);padding:7px;font-size:13px;vertical-align:top}th{background:#f8f0df;position:sticky;top:0;z-index:1}td.center{text-align:center}.noteBox{border:1px solid var(--line);border-radius:10px;padding:6px;margin:4px 0;background:#fffaf0}pre{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;max-height:260px;overflow:auto}

@media(max-width:760px){#info{left:6px;right:6px;top:6px;grid-template-columns:1fr}.icons{justify-content:flex-end}.grid2,.grid3{grid-template-columns:1fr}.panel{width:100vw}#zoom{top:182px;right:6px}#dock{left:6px;right:6px;bottom:6px;padding:8px}th,td{font-size:12px;padding:5px}}

</head>
<body>
<div id="app">
<canvas id="map"></canvas>
<div id="info"><div id="infoText" class="infoText">Loading…</div><div class="icons"><button id="book" class="icon" title="Databases">📘</button><button id="weekly" class="icon" title="Weekly View">📅</button><button id="compass" class="icon" title="Tools"><div id="needle"></div><span>N</span>🧭</button><button id="hammer" class="icon" title="Settings">🔨</button></div></div>
<div id="zoom"><button id="zin">+</button><button id="zout">−</button><button id="fit">Fit</button><button id="pin">Avatar</button></div>
<div id="dock"><div class="row"><b>Ενεργή εντολή</b><label>Mode <select id="cmdMode"><option value="then">Add Then</option><option value="now">Add Now</option></select></label><label>Οντότητα <select id="cmdEntity"><option value="point">Σημείο</option><option value="line">Γραμμή</option><option value="area">Περιοχή</option><option value="current">Παρούσα τοποθεσία</option></select></label><label>Action <select id="cmdAction"></select></label><button id="exec" class="primary">Εφαρμογή</button><button id="undo">Undo</button></div><div class="row"><button id="refreshMap">Refresh Map</button><button id="refreshAddr">Refresh Addresses</button><span id="hint" class="pill">—</span></div></div>

<aside id="side" class="panel"><div class="head"><b id="sideTitle">📘 Βάσεις</b><button id="closeSide">Κλείσιμο</button></div><div id="dbTabs" class="tabs"><button data-tab="main" class="active">Main DB</button><button data-tab="tempUser">Temp User</button><button data-tab="tempGnss">Temp GNSS</button><button data-tab="metadata">Metadata</button><button data-tab="processor">Processor</button><button data-tab="backup">Backup/Export</button></div><div id="toolTabs" class="tabs hidden"><button data-tab="gps" class="active">GPS</button><button data-tab="layers">Layers</button><button data-tab="compassSec">Compass</button></div><div id="settingsTabs" class="tabs hidden"><button data-tab="settings" class="active">General</button><button data-tab="cats">Categories</button></div><div class="body">
<section id="main" class="sec active"><div class="row"><select id="mainScope"><option value="all">All</option><option value="day">Day</option><option value="week">Week</option><option value="month">Month</option></select><input id="mainDate" type="date"><select id="mainType"><option value="">All types</option><option value="point">point</option><option value="route">route</option><option value="area">area</option></select><button id="mainFilter">Filter</button></div><div class="tableWrap"><table id="mainTable"></table></div></section>
<section id="tempUser" class="sec"><div id="tempUserList"></div></section><section id="tempGnss" class="sec"><button id="clearGnss" class="danger">Clear Temp GNSS</button><pre id="gnssTempText"></pre></section><section id="metadata" class="sec"><button id="promoteMeta">Promote good GNSS to Metadata</button><pre id="metaText"></pre></section><section id="processor" class="sec"><pre id="processorText"></pre></section>
<section id="backup" class="sec"><div class="row"><button id="backupBtn" class="primary">Backup JSON</button><button id="restoreBtn">Restore JSON</button><input id="restoreFile" class="hidden" type="file" accept=".json,application/json"></div><h3>Export visible map records</h3><div class="row"><select id="exportCrs"><option value="wgs84">WGS84</option><option value="local">Local XYZ</option></select><button id="csv">CSV</button><button id="geojson">GeoJSON</button><button id="dxf">DXF</button></div></section>
<section id="gps" class="sec"><button id="refreshGps">Refresh GPS</button><button id="wake">Keep awake</button><pre id="gpsText"></pre></section><section id="layers" class="sec"><label><input type="checkbox" data-layer="points" checked> Points</label><label><input type="checkbox" data-layer="routes" checked> Routes</label><label><input type="checkbox" data-layer="areas" checked> Areas</label><label><input type="checkbox" data-layer="drafts" checked> Drafts</label><label><input type="checkbox" data-layer="gnss" checked> GNSS stream</label><label><input type="checkbox" data-layer="metadata" checked> Metadata/control</label><label><input type="checkbox" data-layer="rings" checked> Accuracy/scale rings</label></section><section id="compassSec" class="sec"><pre id="compassText"></pre></section>
<section id="settings" class="sec"><label>Selected date/time <input id="selectedAt" type="datetime-local"></label><label>Map view <select id="viewMode"><option value="day">Day</option><option value="week" selected>Week</option><option value="month">Month</option><option value="all">All</option></select></label><label>GNSS interval sec <input id="gnssSec" type="number" min="1" value="5"></label><label>Route interval sec <input id="routeSec" type="number" min="1" value="5"></label><label>GNSS temp cap <input id="gnssCap" type="number" min="50" value="1000"></label><label>Scale ring radius m <input id="scaleRing" type="number" min="1" value="10"></label><button id="saveSettings" class="primary">Save settings</button></section><section id="cats" class="sec"><div id="catEditor" class="grid2"></div><button id="saveCats" class="primary">Save categories</button></section>
</div></aside>
<aside id="weeklyPanel" class="panel"><div class="head"><b>📅 Weekly View</b><button id="closeWeekly">Κλείσιμο</button></div><div class="body"><div class="row"><button id="prevW">←</button><button id="thisW">Τρέχουσα εβδομάδα</button><button id="nextW">→</button><span id="weekLabel" class="pill">—</span><span id="draftSafe" class="pill">—</span><button id="validateWeek" class="primary">Οριστικοποίηση αυτής της εβδομάδας</button></div><div id="weeklyTable"></div><h3>Εγγραφές εβδομάδας</h3><div id="weeklyCards"></div></div></aside>
</div>
<dialog id="recordDlg"><div class="dh"><b id="recordTitle">Record</b></div><div class="db" id="recordBody"></div><div class="df"><button id="cancelRecord">Cancel</button><button id="saveRecord" class="primary">Save draft</button></div></dialog>
<script>
'use strict';
const $=id=>document.getElementById(id);const ui={canvas:$('map'),info:$('infoText'),needle:$('needle'),book:$('book'),weekly:$('weekly'),compass:$('compass'),hammer:$('hammer'),zin:$('zin'),zout:$('zout'),fit:$('fit'),pin:$('pin'),cmdMode:$('cmdMode'),cmdEntity:$('cmdEntity'),cmdAction:$('cmdAction'),exec:$('exec'),undo:$('undo'),refreshMap:$('refreshMap'),refreshAddr:$('refreshAddr'),hint:$('hint'),ctxMenu:$('ctxMenu'),side:$('side'),sideTitle:$('sideTitle'),closeSide:$('closeSide'),dbTabs:$('dbTabs'),toolTabs:$('toolTabs'),settingsTabs:$('settingsTabs'),mainScope:$('mainScope'),mainDate:$('mainDate'),mainType:$('mainType'),mainFilter:$('mainFilter'),mainTable:$('mainTable'),tempUserList:$('tempUserList'),clearGnss:$('clearGnss'),gnssTempText:$('gnssTempText'),promoteMeta:$('promoteMeta'),metaText:$('metaText'),processorText:$('processorText'),backupBtn:$('backupBtn'),restoreBtn:$('restoreBtn'),restoreFile:$('restoreFile'),exportCrs:$('exportCrs'),csv:$('csv'),geojson:$('geojson'),dxf:$('dxf'),refreshGps:$('refreshGps'),wake:$('wake'),gpsText:$('gpsText'),compassText:$('compassText'),selectedAt:$('selectedAt'),viewMode:$('viewMode'),gnssSec:$('gnssSec'),routeSec:$('routeSec'),gnssCap:$('gnssCap'),scaleRing:$('scaleRing'),saveSettings:$('saveSettings'),catEditor:$('catEditor'),saveCats:$('saveCats'),weeklyPanel:$('weeklyPanel'),closeWeekly:$('closeWeekly'),prevW:$('prevW'),thisW:$('thisW'),nextW:$('nextW'),weekLabel:$('weekLabel'),draftSafe:$('draftSafe'),validateWeek:$('validateWeek'),weeklyTable:$('weeklyTable'),weeklyCards:$('weeklyCards'),recordDlg:$('recordDlg'),recordTitle:$('recordTitle'),recordBody:$('recordBody'),cancelRecord:$('cancelRecord'),saveRecord:$('saveRecord')};
const ctx=ui.canvas.getContext('2d'),R=6378137,KEY='psj_integrated_stable_state_v1';
const app={records:[],drafts:[],gnss:[],metadata:[],live:null,displayLive:null,northAngle:0,cats:['Π/φια','Αλκ','Σορτς','Τσιγάρο','Γυμναστική','Βασιλικός Πολτός','Αστάθεια','Object','Note','Custom'],settings:{selectedAt:new Date().toISOString(),viewMode:'week',gnssSec:5,routeSec:5,gnssCap:1000,scaleRing:10},layers:{points:true,routes:true,areas:true,drafts:true,gnss:true,metadata:true,rings:true},crs:{origin:{lat:50,lng:10,alt:0},falseEasting:5000000,falseNorthing:5000000,falseUp:10000,scale:1},cam:{x:5000000,y:5000000,z:.8},cmd:{activeRoute:null,activeArea:null,contextLocal:null},wake:null,timer:null};
function id(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,8)}function esc(s=''){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function ymd(d){d=new Date(d);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function weekStart(d){d=new Date(d);let n=(d.getDay()+6)%7;d.setDate(d.getDate()-n);d.setHours(0,0,0,0);return d}function addDays(d,n){d=new Date(d);d.setDate(d.getDate()+n);return d}function weekKey(d){return ymd(weekStart(d))}function weekNo(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));let y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}function isoLocal(d){d=new Date(d);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}function recDate(r){return (r.time?.eventAt||r.time?.capturedAt||'').slice(0,10)}function recWeek(r){return weekKey(recDate(r))}function num(v,f=0){v=Number(v);return Number.isFinite(v)?v:f}
function save(){localStorage.setItem(KEY,JSON.stringify({records:app.records,drafts:app.drafts,gnss:app.gnss,metadata:app.metadata,cats:app.cats,settings:app.settings,layers:app.layers,crs:app.crs,cam:app.cam}))}function load(){try{let s=JSON.parse(localStorage.getItem(KEY)||'{}');Object.assign(app,{records:s.records||[],drafts:s.drafts||[],gnss:s.gnss||[],metadata:s.metadata||[],cats:s.cats||app.cats,settings:{...app.settings,...(s.settings||{})},layers:{...app.layers,...(s.layers||{})},crs:s.crs||app.crs,cam:s.cam||app.cam})}catch(e){}}
function w2l(lat,lng,alt=0){let o=app.crs.origin,s=app.crs.scale;return{x:app.crs.falseEasting+R*(lng-o.lng)*Math.PI/180*Math.cos(o.lat*Math.PI/180)*s,y:app.crs.falseNorthing+R*(lat-o.lat)*Math.PI/180*s,z:app.crs.falseUp+((alt||0)-(o.alt||0))}}function l2w(x,y,z=app.crs.falseUp){let o=app.crs.origin,s=app.crs.scale;return{lat:o.lat+((y-app.crs.falseNorthing)/(R*s))*180/Math.PI,lng:o.lng+((x-app.crs.falseEasting)/(R*Math.cos(o.lat*Math.PI/180)*s))*180/Math.PI,alt:(z-app.crs.falseUp)+(o.alt||0)}}function l2s(x,y){let r=ui.canvas.getBoundingClientRect();return{x:(x-app.cam.x)*app.cam.z+r.width/2,y:r.height/2-(y-app.cam.y)*app.cam.z}}function s2l(px,py){let r=ui.canvas.getBoundingClientRect();return{x:app.cam.x+(px-r.width/2)/app.cam.z,y:app.cam.y+(r.height/2-py)/app.cam.z,z:app.crs.falseUp}}function dist(a,b){let rad=x=>x*Math.PI/180,dlat=rad(b.lat-a.lat),dlng=rad(b.lng-a.lng),q=Math.sin(dlat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dlng/2)**2;return 6371000*2*Math.asin(Math.sqrt(q))}function d2(v){let s=0;for(let i=1;i<v.length;i++)s+=dist(v[i-1].wgs,v[i].wgs);return s}function d3(v){let s=0;for(let i=1;i<v.length;i++){let d=dist(v[i-1].wgs,v[i].wgs),z=(v[i].wgs.alt||0)-(v[i-1].wgs.alt||0);s+=Math.sqrt(d*d+z*z)}return s}function area(v){if(v.length<3)return 0;let a=0;for(let i=0;i<v.length;i++){let p=v[i].local,q=v[(i+1)%v.length].local;a+=p.x*q.y-q.x*p.y}return Math.abs(a/2)}function cent(v){let n=v.length||1,l={x:v.reduce((s,p)=>s+p.local.x,0)/n,y:v.reduce((s,p)=>s+p.local.y,0)/n,z:v.reduce((s,p)=>s+p.local.z,0)/n};return{local:l,wgs:l2w(l.x,l.y,l.z)}}function northAngle(w){let p=w2l(w.lat,w.lng,w.alt||0),n=w2l(w.lat+.0001,w.lng,w.alt||0);return Math.atan2(n.x-p.x,n.y-p.y)*180/Math.PI}function city(a=''){let p=String(a||'').split(',').map(x=>x.trim()).filter(Boolean);return p[0]||''}async function reverse(lat,lng){if(!navigator.onLine)return'';try{let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);if(!r.ok)return'';let j=await r.json();return j.display_name||''}catch{return''}}
function vertexW(w,e='vertex',seg=1){let local=w2l(w.lat,w.lng,w.alt||0);return{id:id('V'),wgs:{lat:w.lat,lng:w.lng,alt:w.alt||0,accuracy:w.accuracy??null},local,event:e,segment:seg,address:'',city:'',capturedAt:new Date().toISOString()}}function vertexL(l,e='vertex',seg=1){return vertexW(l2w(l.x,l.y,l.z),e,seg)}function process(r){if(r.type==='point')r.metrics={quality:r.wgs.accuracy==null?20:Math.max(5,100-r.wgs.accuracy*4)};if(r.type==='route')r.metrics={distance2dM:d2(r.vertices),distance3dM:d3(r.vertices),vertexCount:r.vertices.length,routeCities:[...new Set(r.vertices.map(v=>v.city||city(v.address)).filter(Boolean))].join(' → ')};if(r.type==='area'){r.center=cent(r.vertices);r.metrics={areaM2:area(r.vertices),vertexCount:r.vertices.length}}return r}function pointDraft(mode,cat,text,wgs,local,eventAt,address=''){if(!wgs)wgs=l2w(local.x,local.y,local.z);if(!local)local=w2l(wgs.lat,wgs.lng,wgs.alt||0);return process({id:id('DRF'),status:'draft',type:'point',mode,category:cat,text,wgs,local,address,city:city(address),time:{capturedAt:new Date().toISOString(),eventAt,timeSource:mode==='now'?'live':'manual',timeConfidence:mode==='now'?'exact':'estimated'}})}function routeDraft(mode,rid,vertices,eventAt){return process({id:id('DRF'),status:'draft',type:'route',mode,routeId:rid,vertices,time:{capturedAt:new Date().toISOString(),eventAt,timeSource:mode==='now'?'live':'manual',timeConfidence:mode==='now'?'exact':'estimated'}})}function areaDraft(mode,aid,vertices,eventAt){return process({id:id('DRF'),status:'draft',type:'area',mode,areaId:aid,vertices,time:{capturedAt:new Date().toISOString(),eventAt,timeSource:mode==='now'?'live':'manual',timeConfidence:mode==='now'?'exact':'estimated'}})}
function saveDraft(r){let weeks=[...new Set(app.drafts.map(recWeek))],nw=recWeek(r);if(weeks.length&&!weeks.includes(nw)){openWeekly();alert('Υπάρχουν drafts σε άλλη εβδομάδα. Οριστικοποίησε ή διέγραψέ τα στο Weekly View.');return false}app.drafts.push(r);save();renderAll();return true}function validateWeek(){let wk=weekKey(app.settings.selectedAt),rows=app.drafts.filter(r=>recWeek(r)===wk);if(!rows.length)return alert('Δεν υπάρχουν drafts σε αυτή την εβδομάδα.');rows.forEach(d=>app.records.push({...d,id:id('REC'),status:'validated',validatedAt:new Date().toISOString()}));app.drafts=app.drafts.filter(r=>recWeek(r)!==wk);save();renderAll()}
async function getGps(){return new Promise((res,rej)=>navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>res(p.coords),rej,{enableHighAccuracy:true,timeout:15000,maximumAge:0}):rej(new Error('GPS unavailable')))}async function refreshGps(){try{let c=await getGps(),w={lat:c.latitude,lng:c.longitude,alt:c.altitude||0,accuracy:c.accuracy,altitudeAccuracy:c.altitudeAccuracy,speed:c.speed,heading:c.heading};let obs={id:id('GNSS'),wgs:w,local:w2l(w.lat,w.lng,w.alt),capturedAt:new Date().toISOString()};app.live=obs;if(!app.displayLive)app.displayLive=JSON.parse(JSON.stringify(obs));app.northAngle=northAngle(w);app.gnss.push(obs);while(app.gnss.length>app.settings.gnssCap)app.gnss.shift();maybeMeta(false);save();renderAll()}catch(e){ui.gpsText.textContent='GPS error: '+e.message}}function maybeMeta(verbose){let recent=app.gnss.slice(-8).filter(g=>g.wgs.accuracy!=null&&g.wgs.accuracy<=5);if(recent.length<4){if(verbose)alert('Δεν υπάρχουν αρκετά καλά GNSS samples.');return}let max=0;for(let i=1;i<recent.length;i++)max=Math.max(max,dist(recent[0].wgs,recent[i].wgs));if(max>3){if(verbose)alert('Τα GNSS samples δεν είναι αρκετά σταθερά.');return}let avg={lat:recent.reduce((s,g)=>s+g.wgs.lat,0)/recent.length,lng:recent.reduce((s,g)=>s+g.wgs.lng,0)/recent.length,alt:recent.reduce((s,g)=>s+(g.wgs.alt||0),0)/recent.length,accuracy:recent.reduce((s,g)=>s+g.wgs.accuracy,0)/recent.length};app.metadata.push({id:id('META'),type:'control-point',wgs:avg,local:w2l(avg.lat,avg.lng,avg.alt),samples:recent.length,quality:90,createdAt:new Date().toISOString()});if(verbose)alert('Created metadata/control point.')}function animate(){if(app.live){if(!app.displayLive)app.displayLive=JSON.parse(JSON.stringify(app.live));let a=.12;app.displayLive.local.x+=(app.live.local.x-app.displayLive.local.x)*a;app.displayLive.local.y+=(app.live.local.y-app.displayLive.local.y)*a;app.displayLive.local.z+=(app.live.local.z-app.displayLive.local.z)*a;app.displayLive.wgs=app.live.wgs}draw();requestAnimationFrame(animate)}
function visible(){let rows=[...app.records,...app.drafts],m=app.settings.viewMode,d=new Date(app.settings.selectedAt);if(m==='day')return rows.filter(r=>recDate(r)===ymd(d));if(m==='week')return rows.filter(r=>recWeek(r)===weekKey(d));if(m==='month')return rows.filter(r=>recDate(r).startsWith(ymd(d).slice(0,7)));return rows}function draw(){let r=ui.canvas.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);ctx.strokeStyle='rgba(36,51,59,.06)';for(let x=0;x<r.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,r.height);ctx.stroke()}for(let y=0;y<r.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(r.width,y);ctx.stroke()}if(app.layers.gnss)app.gnss.slice(-250).forEach(g=>pt(g.local,'rgba(123,92,168,.42)',2.5));if(app.layers.metadata)app.metadata.forEach(m=>pt(m.local,'#7757a5',5));visible().forEach(rec=>{let draft=rec.status==='draft';if(rec.type==='point'&&app.layers.points)pt(rec.local,draft?'#c57449':'#718455',draft?7:5);if(rec.type==='route'&&app.layers.routes)line(rec.vertices,'#c57449',3);if(rec.type==='area'&&app.layers.areas)poly(rec.vertices,draft?'#c57449':'#4d8c95')});if(app.cmd.activeRoute)line(app.cmd.activeRoute.vertices,'#c57449',3);if(app.cmd.activeArea)poly(app.cmd.activeArea.vertices,'#4d8c95');if(app.displayLive)avatar(app.displayLive);ui.needle.style.transform=`translateX(-50%) rotate(${app.northAngle||0}deg)`}function pt(l,col,r=5){let p=l2s(l.x,l.y);ctx.beginPath();ctx.arc(p.x,p.y,r,0,7);ctx.fillStyle=col;ctx.fill()}function line(v,col,w){if(!v?.length)return;ctx.beginPath();v.forEach((a,i)=>{let p=l2s(a.local.x,a.local.y);i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});ctx.strokeStyle=col;ctx.lineWidth=w;ctx.stroke()}function poly(v,col){if(!v?.length)return;ctx.beginPath();v.forEach((a,i)=>{let p=l2s(a.local.x,a.local.y);i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});if(v.length>2)ctx.closePath();ctx.fillStyle='rgba(77,140,149,.18)';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke()}function avatar(o){let p=l2s(o.local. unction coordHtml(r){if(r.type==='point')return`WGS ${r.wgs.lat.toFixed(6)}, ${r.wgs.lng.toFixed(6)}, z${(r.wgs.alt||0).toFixed(1)}<br>Local ${r.local.x.toFixed(2)}, ${r.local.y.toFixed(2)}`;return r.vertices.map((v,i)=>`${i+1}: ${v.wgs.lat.toFixed(6)},${v.wgs.lng.toFixed(6)} | ${v.local.x.toFixed(2)},${v.local.y.toFixed(2)}`).join('<br>')}function metricHtml(r){if(r.type==='route')return`${(r.metrics.distance2dM||0).toFixed(1)}m 2D<br>${(r.metrics.distance3dM||0).toFixed(1)}m 3D<br>${esc(r.metrics.routeCities||'')}`;if(r.type==='area')return`${(r.metrics.areaM2||0).toFixed(1)} m²`;return`quality ${r.metrics.quality??''}`}function card(r){let label=r.type==='route'?`Route ${r.routeId} · ${((r.metrics.distance2dM||0)/1000).toFixed(3)} km · ${r.metrics.routeCities||'-'}`:r.type==='area'?`Area ${r.areaId} · ${(r.metrics.areaM2||0).toFixed(1)} m²`:`${r.category} ${r.text?'· '+r.text:''}`;return`<div class="card ${r.status==='draft'?'draft':''}"><span class="pill">${r.status}</span> <span class="pill">${r.type}</span> <b>${esc(label)}</b><br><span class="small muted">captured ${esc(r.time.capturedAt)} · event ${esc(r.time.eventAt)}</span><div class="row"><button data-show="${r.id}">Show on map</button>${r.status==='draft'?`<button data-delete="${r.id}" class="danger">Delete draft</button>`:''}</div></div>`}function bindCards(){document.querySelectorAll('[data-show]').forEach(b=>b.onclick=()=>showMap(b.dataset.show));document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>{app.drafts=app.drafts.filter(r=>r.id!==b.dataset.delete);renderAll()})}function renderTemp(){ui.tempUserList.innerHTML=app.drafts.map(card).join('')||'<p class="muted">No temp user records.</p>';bindCards()}function renderGnss(){ui.gnssTempText.textContent=JSON.stringify({count:app.gnss.length,last:app.gnss.at(-1)||null,cap:app.settings.gnssCap},null,2)}function renderMeta(){ui.metaText.textContent=JSON.stringify({count:app.metadata.length,last:app.metadata.at(-1)||null},null,2)}function ren electedAt);ui.viewMode.value=app.settings.viewMode;ui.gnssSec.value=app.settings.gnssSec;ui.routeSec.value=app.settings.routeSec;ui.gnssCap.value=app.settings.gnssCap;ui.scaleRing.value=app.settings.scaleRing;ui.catEditor.innerHTML=app.cats.map((c,i)=>`<label>Category ${i+1}<input data-cat="${i}" value="${esc(c)}"></label>`).join('')}function renderTools(){ui.gpsText.textContent=JSON.stringify(app.live,null,2);ui.compassText.textContent=JSON.stringify({northAngleDeg:app.northAngle||0,logic:'WGS84 north point transformed to local XY; not phone sensor.'},null,2)}function showMap(idv){let r=[...app.records,...app.drafts].find(x=>x.id===idv);if(!r)return;app.settings.selectedAt=r.time.eventAt;app.settings.viewMode='week';let p=r.type==='point'?r.local:r.type==='area'?r.center.local:r.vertices[0].local;app.cam.x=p.x;app.cam.y=p.y;app.cam.z=Math.max(app.cam.z,2);ui.side.classList.remove('open');ui.weeklyPanel.classList.remove('open');renderAll()}async function refreshAddresses(){for(const r of [...app.records,...app.drafts]){if(r.type==='point'&&!r.address){r.address=await reverse(r.wgs.lat,r.wgs.lng);r.city=city(r.address);process(r)}if(r.vertices){for(const v of r.vertices){if(!v.address){v.address=await reverse(v.wgs.lat,v.wgs.lng);v.city=city(v.address)}}process(r)}}renderAll();alert('Addresses refreshed where internet was available.')}function validate(){let wk=weekKey(app.settings.selectedAt),rows=app.drafts.filter(r=>recWeek(r)===wk);if(!rows.length)return alert('Δεν υπάρχουν drafts σε αυτή την εβδομάδα.');rows.forEach(d=>app.records.push({...d,id:id('REC'),status:'validated',validatedAt:new Date().toISOString()}));app.drafts=app.drafts.filter(r=>recWeek(r)!==wk);renderAll()}function ensureNoDraftWeek(){if(!app.drafts.length)return true;openWeekly();alert('Υπάρχουν προσωρινές εγγραφές. Οριστικοποίησε ή διέγραψέ τις από το Weekly View.');return false}function openSide(kind,tab){ui.sideTitle.textContent=kind==='db'?'📘 Βάσεις':kind==='tools'?'🧭 Εργαλεία':'🔨 Ρυθμίσεις';ui.dbTabs.classList.toggle('hidden',kind!=='db');ui.toolTabs.classList.toggle('hidden',kind!=='tools');ui.settingsTabs.classList.toggle('hidden',kind!=='settings');ui.side.classList.add('open');showTab(tab)}function showTab(idv){document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===idv));document.querySelectorAll('#side .sec').forEach(s=>s.classList.toggle('active',s.id===idv));renderAll()}function openWeekly(){ui.weeklyPanel.classList.add('open');renderWeekly()}function saveSettings(){app.settings.selectedAt=new Date(ui.selectedAt.value||app.settings.selectedAt).toISOString();app.settings.viewMode=ui.viewMode.value;app.settings.gnssSec=Math.max(1,num(ui.gnssSec.value,5));app.settings.routeSec=Math.max(1,num(ui.routeSec.value,5));app.settings.gnssCap=Math.max(50,num(ui.gnssCap.value,1000));app.settings.scaleRing=Math.max(1,num(ui.scaleRing.value,10));restartTimer();renderAll()}function saveCats(){app.cats=[...document.querySelectorAll('[data-cat]')].map((i,n)=>i.value||`Category ${n+1}`);renderAll()}function backup(){download(JSON.stringify({version:'integrated-stable-v1',records:app.records,drafts:app.drafts,gnss:app.gnss,metadata:app.metadata,cats:app.cats,settings:app.settings,layers:app.layers,crs:app.crs,cam:app.cam},null,2),'psj-backup.json','application/json')}async function restore(){let f=ui.restoreFile.files[0];if(!f)return;let data=JSON.parse(await f.text());if(!confirm('Restore backup and replace local data?'))return;app.records=data.records||[];app.drafts=data.drafts||[];app.gnss=data.gnss||[];app.metadata=data.metadata||[];app.cats=data.cats||app.cats;app.settings={...app.settings,...(data.settings||{})};app.layers={...app.layers,...(data.layers||{})};app.crs=data.crs||app.crs;app.cam=data.cam||app.cam;renderAll()}function exportCSV(rows){let h=['id','status','type','category','capturedAt','eventAt','coordinates','metrics'];return h.join(',')+'\n'+rows.map(r=>[r.id,r.status,r.type,r.category||r.routeId||r.areaId||'',r.time.capturedAt,r.time.eventAt,JSON.stringify(r.type==='point'?r.wgs:r.vertices).replaceAll('"','""'),JSON.stringify(r.metrics).replaceAll('"','""')].map(x=>`"${x??''}"`).join(',')).join('\n')}function exportGeoJSON(rows){return JSON.stringify({type:'FeatureCollection',features:rows.map(r=>{let geometry;if(r.type==='point')geometry={type:'Point',coordinates:[r.wgs.lng,r.wgs.lat,r.wgs.alt||0]};else{let cs=r.vertices.map(v=>[v.wgs.lng,v.wgs.lat,v.wgs.alt||0]);geometry={type:r.type==='area'?'Polygon':'LineString',coordinates:r.type==='area'?[cs.concat([cs[0]])]:cs}}return{type:'Feature',geometry,properties:{id:r.id,status:r.status,type:r.type,category:r.category,metrics:r.metrics,time:r.time}}})},null,2)}function exportDXF(rows){let out=['0','SECTION','2','ENTITIES'];rows.forEach(r=>{if(r.type==='point')out.push('0','POINT','8',r.type,'10',String(r.local.x),'20',String(r.local.y),'30',String(r.local.z||0));else{out.push('0','LWPOLYLINE','8',r.type,'90',String(r.vertices.length),'70',r.type==='area'?'1':'0');r.vertices.forEach(v=>out.push('10',String(v.local.x),'20',String(v.local.y)))}});out.push('0','ENDSEC','0','EOF');return out.join('\n')}function download(t,n,type){let a=document.createElement('a'),u=URL.createObjectURL(new Blob([t],{type}));a.href=u;a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
function setup(){ui.book.onclick=()=>openSide('db','main');ui.compass.onclick=()=>openSide('tools','gps');ui.hammer.onclick=()=>openSide('settings','settings');ui.weekly.onclick=openWeekly;document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));ui.closeSide.onclick=()=>ui.side.classList.remove('open');ui.closeWeekly.onclick=()=>ui.weeklyPanel.classList.remove('open');document.querySelectorAll('[data-layer]').forEach(cb=>cb.onchange=()=>{app.layers[cb.dataset.layer]=cb.checked;draw()});ui.cmdEntity.onchange=()=>{updateActions();renderAll()};ui.cmdMode.onchange=renderAll;ui.cmdAction.onchange=renderAll;ui.exec.onclick=()=>execute();ui.undo.onclick=()=>{if(app.cmd.activeRoute?.vertices.length)app.cmd.activeRoute.vertices.pop();else if(app.cmd.activeArea?.vertices.length)app.cmd.activeArea.vertices.pop();renderAll()};ui.refreshMap.onclick=renderAll;ui.refreshAddr.onclick=refreshAddresses;ui.zin.onclick=()=>{app.cam.z*=1.25;draw()};ui.zout.onclick=()=>{app.cam.z/=1.25;draw()};ui.fit.onclick=fit;ui.pin.onclick=pin;ui.refreshGps.onclick=refreshGps;ui.wake.onclick=async()=>{try{if(app.wake){await app.wake.release();app.wake=null;ui.wake.textContent='Keep awake'}else{app.wake=await navigator.wakeLock.request('screen');ui.wake.textContent='Awake on'}}catch(e){alert(e.message)}};ui.clearGnss.onclick=()=>{if(confirm('Clear temporary GNSS stream?')){app.gnss=[];renderAll()}};ui.promoteMeta.onclick=()=>maybeMeta(true);ui.saveSettings.onclick=saveSettings;ui.saveCats.onclick=saveCats;ui.selectedAt.onchange=()=>{app.settings.selectedAt=new Date(ui.selectedAt.value).toISOString();renderAll()};ui.viewMode.onchange=()=>{app.settings.viewMode=ui.viewMode.value;renderAll()};ui.gnssSec.onchange=saveSettings;ui.routeSec.onchange=saveSettings;ui.gnssCap.onchange=saveSettings;ui.scaleRing.onchange=saveSettings;ui.prevW.onclick=()=>{let t=addDays(weekStart(app.settings.selectedAt),-7);if(ensureNoDraftWeek()){app.settings.selectedAt=t.toISOString();renderAll()}};ui.thisW.onclick=()=>{if(ensureNoDraftWeek()){app.settings.selectedAt=new Date().toISOString();renderAll()}};ui.nextW.onclick=()=>{let t=addDays(weekStart(app.settings.selectedAt),7);if(ensureNoDraftWeek()){app.settings.selectedAt=t.toISOString();renderAll()}};ui.validateWeek.onclick=validate;ui.mainFilter.onclick=renderMain;ui.backupBtn.onclick=backup;ui.restoreBtn.onclick=()=>ui.restoreFile.click();ui.restoreFile.onchange=restore;ui.csv.onclick=()=>download(exportCSV(visible()),'psj-export.csv','text/csv');ui.geojson.onclick=()=>download(exportGeoJSON(visible()),'psj-export.geojson','application/geo+json');ui.dxf.onclick=()=>download(exportDXF(visible()),'psj-export.dxf','application/dxf');document.querySelectorAll('[data-entity]').forEach(b=>b.onclick=()=>{ui.cmdEntity.value=b.dataset.entity;updateActions();ui.ctxMenu.style.display='none';execute(app.cmd.contextLocal)});let down=null,last=null,pan=false;ui.canvas.addEventListener('pointerdown',e=>{ui.ctxMenu.style.display='none';down={x:e.clientX,y:e.clientY};last={x:e.clientX,y:e.clientY};pan=false;ui.canvas.setPointerCapture(e.pointerId)});ui.canvas.addEventListener('pointermove',e=>{if(!down)return;let dx=e.clientX-last.x,dy=e.clientY-last.y;if(Math.hypot(e.clientX-down.x,e.clientY-down.y)>6)pan=true;if(pan){app.cam.x-=dx/app.cam.z;app.cam.y+=dy/app.cam.z;draw()}last={x:e.clientX,y:e.clientY}});ui.canvas.addEventListener('pointerup',e=>{if(!down)return;let mv=Math.hypot(e.clientX-down.x,e.clientY-down.y),r=ui.canvas.getBoundingClientRect();if(mv<8&&ui.cmdMode.value==='then'){let local=s2l(e.clientX-r.left,e.clientY-r.top);app.cmd.contextLocal=local;execute(local)}down=null;pan=false});ui.canvas.addEventListener('contextmenu',e=>{e.preventDefault();let r=ui.canvas.getBoundingClientRect();app.cmd.contextLocal=s2l(e.clientX-r.left,e.clientY-r.top);ui.ctxMenu.style.left=e.clientX+'px';ui.ctxMenu.style.top=e.clientY+'px';ui.ctxMenu.style.display='block'})}function restartTimer(){if(app.timer)clearInterval(app.timer);app.timer=setInterval(refreshGps,app.settings.gnssSec*1000)}function boot(){load();setup();updateActions();renderSettings();resize();refreshGps().catch(()=>{});restartTimer();renderAll();requestAnimationFrame(animate);window.addEventListener('resize',resize);window.addEventListener('pagehide',save)}boot();
</script>
