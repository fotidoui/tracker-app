<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    .screen { display:none; }

    table {
      margin:10px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:5px;
      font-size:12px;
    }

    textarea { width:95%; height:40px; }
    #map { height:250px; margin:10px; }

    .eventBox {
      font-size:10px;
      border-top:1px solid #ddd;
    }

    .filters {
      margin:10px;
      font-size:12px;
    }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start Route</button>
  <button onclick="stopRoute()">Stop Route</button>
  <button onclick="saveWeekToDB()">💾 Save Week</button>

  <div class="filters">
    <b>Filter Days:</b>
    <span id="dayFilters"></span><br>

    <b>Types:</b>
    <label><input type="checkbox" checked onchange="toggleType('route-point')">Route</label>
    <label><input type="checkbox" checked onchange="toggleType('habit')">Habit</label>
    <label><input type="checkbox" checked onchange="toggleType('note')">Note</label>
  </div>

  <div id="map"></div>

  <table id="grid"></table>

  <div id="eventLog"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

// ===== STATE =====
let habits = Array(10).fill("").map((_,i)=>"Habit "+(i+1));

let liveEvents = JSON.parse(localStorage.getItem("liveEvents")) || [];
let database = JSON.parse(localStorage.getItem("database")) || [];

let currentWeek = null;
let selectedDay = null;

let routeSession = {active:false,id:null};
let watchId = null;

let map, layer;

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

let mapFilters = {
  days:[0,1,2,3,4,5,6],
  types:["route-point","habit","note"]
};

// ===== INIT =====
window.onload=()=>{
  show("home");
};

// ===== STORAGE =====
function save(){
  localStorage.setItem("liveEvents",JSON.stringify(liveEvents));
  localStorage.setItem("database",JSON.stringify(database));
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly"){
    setTimeout(initMap,100);
    renderDayFilters();
  }

  if(id==="db") renderDB();
}

// ===== MAP =====
function initMap(){
  if(map) return;

  map = L.map('map').setView([0,0],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  layer = L.layerGroup().addTo(map);
}

function updateMap(){

  layer.clearLayers();

  let evs = liveEvents.filter(e =>
    e.week===currentWeek &&
    e.lat &&
    mapFilters.days.includes(e.day) &&
    mapFilters.types.includes(e.type)
  );

  if(evs.length===0) return;

  let bounds=[];
  let routes={};

  evs.forEach(e=>{
    if(e.routeId){
      if(!routes[e.routeId]) routes[e.routeId]=[];
      routes[e.routeId].push([e.lat,e.lng]);
    }
  });

  Object.values(routes).forEach(coords=>{
    if(coords.length>1){
      L.polyline(coords,{color:"blue"}).addTo(layer);
    }
  });

  evs.forEach(e=>{
    L.circleMarker([e.lat,e.lng],{
      radius:5,
      color:
        e.type==="habit"?"green":
        e.type==="note"?"orange":"red"
    }).addTo(layer);

    bounds.push([e.lat,e.lng]);
  });

  map.fitBounds(bounds,{maxZoom:18});
}

// ===== GEO =====
function getPosition(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      }),
      ()=>resolve(null)
    );
  });
}

// ===== EVENTS =====
async function record(type, extra={}){

  if(currentWeek===null){
    alert("Enter week first");
    return;
  }

  let pos = await getPosition();

  let dayToUse = selectedDay!==null
    ? selectedDay
    : (new Date().getDay()+6)%7;

  liveEvents.push({
    type,
    time:Date.now(),
    lat:pos?.lat,
    lng:pos?.lng,
    week:currentWeek,
    day:dayToUse,
    routeId:routeSession.id,
    ...extra
  });

  save();
  renderWeek();
  updateMap();
}

// ===== ROUTES =====
function startRoute(){

  routeSession={active:true,id:Date.now()};

  watchId = navigator.geolocation.watchPosition(pos=>{
    liveEvents.push({
      type:"route-point",
      time:Date.now(),
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      week:currentWeek,
      day:selectedDay ?? (new Date().getDay()+6)%7,
      routeId:routeSession.id
    });

    save();
    updateMap();
  });

  record("route-start");
}

function stopRoute(){
  if(watchId!==null){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
  }

  record("route-end");
  routeSession.active=false;
}

// ===== WEEK =====
document.getElementById("weekInput").onchange=e=>{
  currentWeek=Number(e.target.value);
  renderWeek();
  updateMap();
};

function renderWeek(){

  let table=document.getElementById("grid");
  table.innerHTML="";

  let h=document.createElement("tr");
  h.appendChild(document.createElement("th"));

  days.forEach((d,i)=>{
    let th=document.createElement("th");
    th.innerText=d;
    th.onclick=()=>selectedDay=i;
    h.appendChild(th);
  });

  table.appendChild(h);

  for(let i=0;i<10;i++){

    let r=document.createElement("tr");

    let td=document.createElement("td");
    td.innerText=habits[i];
    r.appendChild(td);

    for(let d=0;d<7;d++){

      let cell=document.createElement("td");

      let ev = liveEvents.find(e=>
        e.type==="habit" &&
        e.week===currentWeek &&
        e.day===d &&
        e.habitIndex===i
      );

      let cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=!!ev;

      cb.onclick=()=>{
        if(ev){
          liveEvents.splice(liveEvents.indexOf(ev),1);
        } else {
          record("habit",{habitIndex:i});
        }
        save();
        renderWeek();
      };

      cell.appendChild(cb);
      r.appendChild(cell);
    }

    table.appendChild(r);
  }

  renderEventLog();
}

// ===== EVENT LOG =====
function renderEventLog(){

  let div=document.getElementById("eventLog");
  div.innerHTML="<h3>Events</h3>";

  let evs = liveEvents
    .filter(e=>e.week===currentWeek)
    .sort((a,b)=>b.time-a.time);

  evs.forEach(ev=>{

    let row=document.createElement("div");

    row.innerText =
      `${days[ev.day]} | ${ev.type} | ${new Date(ev.time).toLocaleString()}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      liveEvents.splice(liveEvents.indexOf(ev),1);
      save();
      renderWeek();
      updateMap();
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}

// ===== FILTERS =====
function renderDayFilters(){

  let div=document.getElementById("dayFilters");
  div.innerHTML="";

  days.forEach((d,i)=>{
    let label=document.createElement("label");

    let cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=true;

    cb.onchange=()=>{
      if(cb.checked) mapFilters.days.push(i);
      else mapFilters.days = mapFilters.days.filter(x=>x!==i);

      updateMap();
    };

    label.appendChild(cb);
    label.append(d+" ");
    div.appendChild(label);
  });
}

function toggleType(type){

  if(mapFilters.types.includes(type)){
    mapFilters.types = mapFilters.types.filter(t=>t!==type);
  } else {
    mapFilters.types.push(type);
  }

  updateMap();
}

// ===== DATABASE =====
function saveWeekToDB(){

  let weekEvents = liveEvents.filter(e=>e.week===currentWeek);

  let i = database.findIndex(w=>w.week===currentWeek);

  if(i!==-1){
    database[i].data = JSON.parse(JSON.stringify(weekEvents));
  } else {
    database.push({week:currentWeek,data:weekEvents});
  }

  save();
  alert("Saved");
}

function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  database.forEach(w=>{

    let table=document.createElement("table");

    let h=document.createElement("tr");
    ["Type","Day","Time","Lat","Lng","Route"].forEach(t=>{
      let th=document.createElement("th");
      th.innerText=t;
      h.appendChild(th);
    });

    table.appendChild(h);

    w.data.forEach(e=>{
      let tr=document.createElement("tr");

      tr.innerHTML=`
        <td>${e.type}</td>
        <td>${days[e.day]}</td>
        <td>${new Date(e.time).toLocaleString()}</td>
        <td>${e.lat||""}</td>
        <td>${e.lng||""}</td>
        <td>${e.routeId||""}</td>
      `;

      table.appendChild(tr);
    });

    div.appendChild(document.createTextNode("Week "+w.week));
    div.appendChild(table);
  });
}

</script>
</body>
</html>
