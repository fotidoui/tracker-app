<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FieldLog FIXED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#eef2f6;
}

#weekSelect{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  padding:20px;
}

.weekBox{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

#app{display:none;}

#header{
  display:flex;
  background:#111827;
  color:white;
}

#tabs{
  display:flex;
  flex:1;
}

#tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:#cbd5e1;
  font-size:11px;
}

#tabs button.active{
  background:#1f2937;
  color:white;
}

#back{
  padding:10px;
  background:#374151;
  color:white;
  border:none;
  font-size:11px;
}

#content{padding:10px;}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #ddd;
  font-size:10px;
  text-align:center;
  padding:2px;
}

textarea{
  width:100%;
  font-size:11px;
}

button{
  font-size:11px;
  margin:2px;
}
</style>
</head>

<body>

<div id="weekSelect"></div>

<div id="app">

<div id="header">
  <div id="tabs">
    <button onclick="tab('weekly')" id="t-weekly">Weekly</button>
    <button onclick="tab('routes')" id="t-routes">Routes</button>
    <button onclick="tab('db')" id="t-db">Database</button>
  </div>
  <button id="back" onclick="back()">Weeks</button>
</div>

<div id="content">

<div id="weekly"></div>
<div id="routes"></div>
<div id="db"></div>

<div id="map" style="height:300px;margin-top:10px;"></div>

</div>
</div>

<script>

/* ================= STATE ================= */
let state={
  week:null,
  data:JSON.parse(localStorage.getItem("data")||"{}")
};

let session=null;
let watch=null;
let map=null;
let marker=null;

/* ================= INIT WEEKS ================= */
function initWeeks(){
  let c=document.getElementById("weekSelect");
  c.innerHTML="<h2 style='grid-column:1/-1'>Select Week</h2>";

  for(let i=1;i<=52;i++){
    let d=new Date(2026,0,1+(i-1)*7);
    let m=d.toLocaleString('default',{month:'short'});

    let el=document.createElement("div");
    el.className="weekBox";
    el.innerHTML=`Week ${i}<br>${m}`;

    el.onclick=()=>{
      state.week=i;
      ensure();
      open();
    };

    c.appendChild(el);
  }
}
initWeeks();

/* ================= OPEN ================= */
function open(){
  document.getElementById("weekSelect").style.display="none";
  document.getElementById("app").style.display="block";
  tab("weekly");
}

function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("weekSelect").style.display="grid";
}

/* ================= DATA ================= */
function ensure(){
  if(!state.data[state.week]){
    state.data[state.week]={
      checks:Array(8).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

/* ================= TABS ================= */
function tab(t){

  ["weekly","routes","db"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });

  document.getElementById(t).style.display="block";

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("t-"+t).classList.add("active");

  if(t==="weekly") renderWeekly();
  if(t==="routes") renderRoutes();
  if(t==="db") renderDB();
}

/* ================= WEEKLY ================= */
function renderWeekly(){

  let w=state.data[state.week];

  let html="<div class='card'><b>Week "+state.week+"</b></div>";

  html+="<div class='card'><b>Habits</b><table><tr><th></th>";

  ["M","T","W","T","F","S","S"].forEach(d=>{
    html+="<th>"+d+"</th>";
  });

  html+="</tr>";

  for(let i=0;i<8;i++){
    html+="<tr><td>H"+(i+1)+"</td>";

    for(let j=0;j<7;j++){
      html+=`
      <td>
        <input type="checkbox"
        ${w.checks[i][j]?"checked":""}
        onchange="toggle(${i},${j})">
      </td>`;
    }

    html+="</tr>";
  }

  html+="</table></div>";

  /* ROUTES SUMMARY FIXED */
  html+="<div class='card'><b>Routes per day</b>";

  w.routes.forEach((d,i)=>{
    let total=0;
    d.forEach(r=>total+=r.totalKm||0);
    html+=`Day ${i+1}: ${total.toFixed(1)} km<br>`;
  });

  html+="</div>";

  html+="<div class='card'><b>Notes</b>";

  w.notes.forEach((n,i)=>{
    html+=`
    <textarea onchange="note(${i},this.value)">
${n}
</textarea>`;
  });

  html+="</div>";

  document.getElementById("weekly").innerHTML=html;
}

/* ================= ROUTES UI ================= */
function renderRoutes(){

  document.getElementById("routes").innerHTML=`
  <div class="card">
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="stop()">Stop</button>
    <div style="font-size:11px;color:#666">
      Start → begins GPS tracking<br>
      Pause → splits route<br>
      Stop → saves route
    </div>
  </div>`;
}

/* ================= GPS ================= */
function start(){

  session={
    seg:[[]],
    route:{segments:[],totalKm:0}
  };

  watch=navigator.geolocation.watchPosition(p=>{

    session.seg.at(-1).push({
      lat:p.coords.latitude,
      lng:p.coords.longitude
    });

    updateMap(p.coords.latitude,p.coords.longitude);

  },{enableHighAccuracy:true});
}

function pause(){
  session.seg.push([]);
}

function stop(){

  navigator.geolocation.clearWatch(watch);

  let w=state.data[state.week];
  let day=(new Date().getDay()+6)%7;

  session.seg.forEach(s=>{
    if(s.length<2) return;

    let km=calc(s);

    session.route.segments.push({
      points:s,
      distanceKm:km
    });

    session.route.totalKm+=km;
  });

  w.routes[day].push(session.route);

  save();
  renderWeekly();
}

/* ================= MAP FIXED ================= */
function initMap(){
  if(!map){
    map=L.map("map").setView([52.1,5.3],7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  }
}

function updateMap(lat,lng){
  initMap();

  if(!marker){
    marker=L.circleMarker([lat,lng],{radius:6,color:"red"}).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }
}

/* ================= DIST ================= */
function calc(a){
  let t=0;
  for(let i=1;i<a.length;i++){
    let x=a[i-1],y=a[i];
    t+=Math.hypot(y.lat-x.lat,y.lng-x.lng)*111;
  }
  return t;
}

/* ================= TOGGLE ================= */
function toggle(i,j){
  state.data[state.week].checks[i][j]=!state.data[state.week].checks[i][j];
  save();
}

/* ================= NOTES ================= */
function note(i,v){
  state.data[state.week].notes[i]=v;
  save();
}

/* ================= DB FIXED ================= */
function renderDB(){

  let html="<div class='card'><b>Database</b></div>";

  for(let w in state.data){

    html+=`<div class='card'><b>Week ${w}</b>`;

    let week=state.data[w];

    week.routes.forEach((d,i)=>{

      let total=0;
      d.forEach(r=>total+=r.totalKm||0);

      html+=`Day ${i+1}: ${total.toFixed(1)} km<br>`;
    });

    html+="</div>";
  }

  document.getElementById("db").innerHTML=html;
}

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("data",JSON.stringify(state.data));
}

</script>

</body>
</html>
