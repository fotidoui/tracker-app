<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FieldLog App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#eef2f6;
}

/* ===== WEEK SELECT ===== */
#weekSelect{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  padding:20px;
}

.weekBox{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* ===== APP ===== */
#app{display:none;}

/* HEADER */
#header{
  display:flex;
  background:#111827;
  color:white;
}

#tabs{
  display:flex;
  flex:1;
}

#tabs button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:#cbd5e1;
  cursor:pointer;
}

#tabs button.active{
  background:#1f2937;
  color:white;
}

#backBtn{
  padding:10px;
  background:#374151;
  border:none;
  color:white;
  cursor:pointer;
}

/* CONTENT */
#content{padding:12px;}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

/* GRID */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #e5e7eb;
  font-size:11px;
  text-align:center;
  padding:3px;
}

textarea{
  width:100%;
  font-size:11px;
}

/* MAP */
#map{
  height:400px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ===== WEEK SELECT ===== -->
<div id="weekSelect"></div>

<!-- ===== APP ===== -->
<div id="app">

<div id="header">
  <div id="tabs">
    <button onclick="setTab('weekly')" id="t-weekly">Weekly</button>
    <button onclick="setTab('routes')" id="t-routes">Routes</button>
    <button onclick="setTab('map')" id="t-map">Map</button>
    <button onclick="setTab('db')" id="t-db">DB</button>
  </div>
  <button id="backBtn" onclick="back()">Weeks</button>
</div>

<div id="content">

<div id="weekly"></div>

<div id="routes" style="display:none">
  <div class="card">
    <h3>Routes</h3>
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="resume()">Resume</button>
    <button onclick="stop()">Stop</button>
    <p id="gps"></p>
  </div>
</div>

<div id="map" style="display:none">
  <div class="card">
    <div id="mapBox" style="height:400px;"></div>
  </div>
</div>

<div id="db" style="display:none"></div>

</div>
</div>

<script>

/* ================= STATE ================= */
const APP = {
  state:{
    week:null,
    tab:"weekly",
    data:JSON.parse(localStorage.getItem("data")||"{}")
  }
};

let habits = Array.from({length:8},(_,i)=>"Habit "+(i+1));

let watch=null;
let session=null;
let map;

/* ================= WEEK SELECT ================= */
function initWeeks(){
  const c=document.getElementById("weekSelect");
  c.innerHTML="<h2 style='grid-column:1/-1'>Select Week</h2>";

  for(let i=1;i<=52;i++){
    let d=new Date(2026,0,1+(i-1)*7);
    let m=d.toLocaleString('default',{month:'short'});

    let el=document.createElement("div");
    el.className="weekBox";
    el.innerHTML=`Week ${i}<br>${m}`;

    el.onclick=()=>{
      APP.state.week=i;
      ensure();
      open();
    };

    c.appendChild(el);
  }
}

initWeeks();

/* ================= OPEN ================= */
function open(){
  document.getElementById("weekSelect").style.display="none";
  document.getElementById("app").style.display="block";
  setTab("weekly");
}

/* ================= BACK ================= */
function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("weekSelect").style.display="grid";
}

/* ================= DATA ================= */
function ensure(){
  if(!APP.state.data[APP.state.week]){
    APP.state.data[APP.state.week]={
      checks:Array(8).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

/* ================= TABS ================= */
function setTab(t){

  APP.state.tab=t;

  ["weekly","routes","map","db"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });

  document.getElementById(t).style.display="block";

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("t-"+t).classList.add("active");

  if(t==="weekly") renderWeekly();
  if(t==="db") renderDB();
  if(t==="map") initMap();
}

/* ================= WEEKLY ================= */
function renderWeekly(){

  let w=APP.state.data[APP.state.week];

  let html="<div class='card'><b>Week "+APP.state.week+"</b></div>";

  /* GRID */
  html+="<div class='card'><table><tr><th></th>";

  ["M","T","W","T","F","S","S"].forEach(d=>{
    html+="<th>"+d+"</th>";
  });

  html+="</tr>";

  habits.forEach((h,i)=>{
    html+="<tr><td>"+h+"</td>";

    for(let j=0;j<7;j++){
      html+=`
      <td>
        <input type="checkbox"
        ${w.checks[i][j]?"checked":""}
        onchange="toggle(${i},${j})">
      </td>`;
    }

    html+="</tr>";
  });

  html+="</table></div>";

  /* ROUTE SUMMARY */
  html+="<div class='card'><b>Routes</b><br>";

  w.routes.forEach((d,i)=>{
    let km=d.reduce((s,r)=>s+(r.km||0),0);
    html+=`Day ${i+1}: ${km.toFixed(1)} km<br>`;
  });

  html+="</div>";

  /* NOTES */
  html+="<div class='card'><b>Notes</b>";

  w.notes.forEach((n,i)=>{
    html+=`<textarea onchange="note(${i},this.value)">${n}</textarea>`;
  });

  html+="</div>";

  document.getElementById("weekly").innerHTML=html;
}

/* ================= CHECKS ================= */
function toggle(i,j){
  let w=APP.state.data[APP.state.week];
  w.checks[i][j]=!w.checks[i][j];
  save();
}

/* ================= NOTES ================= */
function note(i,v){
  APP.state.data[APP.state.week].notes[i]=v;
  save();
}

/* ================= ROUTES ================= */
function start(){
  session={seg:[[]],run:true};
  watch=navigator.geolocation.watchPosition(p=>{
    if(!session.run) return;
    session.seg.at(-1).push({
      lat:p.coords.latitude,
      lng:p.coords.longitude
    });
  });
}

function pause(){
  session.seg.push([]);
}

function resume(){
  session.run=true;
}

function stop(){
  navigator.geolocation.clearWatch(watch);

  let w=APP.state.data[APP.state.week];
  let day=(new Date().getDay()+6)%7;

  let route={seg:[],total:0};

  session.seg.forEach(s=>{
    if(s.length<2) return;
    let km=dist(s);
    route.seg.push({km});
    route.total+=km;
  });

  w.routes[day].push(route);
  save();
}

/* ================= MAP ================= */
function initMap(){
  if(map) return;

  map=L.map("mapBox").setView([52.1,5.3],7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
}

/* ================= DB ================= */
function renderDB(){
  let html="<div class='card'><b>Database</b><br>";

  for(let w in APP.state.data){
    html+="Week "+w+"<br>";
  }

  html+="</div>";

  document.getElementById("db").innerHTML=html;
}

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("data",JSON.stringify(APP.state.data));
}

/* ================= DIST ================= */
function dist(r){
  let t=0;
  for(let i=1;i<r.length;i++){
    let a=r[i-1],b=r[i];
    t+=Math.hypot(b.lat-a.lat,b.lng-a.lng)*111;
  }
  return t;
}

</script>
</body>
</html>
