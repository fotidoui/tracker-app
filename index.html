<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; }

    .screen { display:none; }

    table {
      margin:20px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:6px;
      min-width:80px;
      vertical-align: top;
    }

    textarea { width:100%; height:40px; }

    button { margin:6px; padding:10px; }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<!-- HOME -->
<div id="home" class="screen">
  <button onclick="showScreen('weekly')">Weekly</button>
  <button onclick="showScreen('routes')">Routes</button>
  <button onclick="showScreen('db')">Database</button>
</div>

<!-- WEEKLY -->
<div id="weekly" class="screen">
  <button onclick="showScreen('home')">⬅</button><br>
  <input id="weekInput" type="number" placeholder="Week">
  <table id="grid"></table>
</div>

<!-- ROUTES -->
<div id="routes" class="screen">
  <button onclick="showScreen('home')">⬅</button><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <p id="gpsStatus"></p>
</div>

<!-- DATABASE -->
<div id="db" class="screen">
  <button onclick="showScreen('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

let currentWeek=null;
let weekData={};
let habits=[];
let watchId=null;

let session={
  active:false,
  paused:false,
  segments:[]
};

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== NAV =====
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

window.onload=()=>{

  let saved=localStorage.getItem("weekData");
  if(saved) weekData=JSON.parse(saved);

  let h=localStorage.getItem("habits");
  habits = h ? JSON.parse(h) : Array(10).fill("").map((_,i)=>"Habit "+(i+1));

  showScreen("home");
};

// ===== WEEK INIT =====
document.getElementById("weekInput").addEventListener("change",e=>{
  currentWeek=Number(e.target.value);

  if(!weekData[currentWeek]){
    weekData[currentWeek]=createWeek();
  }

  render();
});

function createWeek(){
  return {
    checks:Array(10).fill().map(()=>Array(7).fill(false)),
    notes:Array(7).fill(""),
    routes:Array(7).fill().map(()=>[])
  };
}

// ===== GPS START =====
function startRoute(){

  if(!currentWeek){
    alert("Select week first");
    return;
  }

  session={
    active:true,
    paused:false,
    segments:[[]]
  };

  document.getElementById("gpsStatus").innerText="Tracking...";

  watchId=navigator.geolocation.watchPosition(pos=>{

    if(!session.active || session.paused) return;

    session.segments[session.segments.length-1].push({
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });

    document.getElementById("gpsStatus").innerText=
      "Points: "+session.segments[session.segments.length-1].length;

  },err=>{
    document.getElementById("gpsStatus").innerText=err.message;
  },
  {enableHighAccuracy:true});
}

// ===== PAUSE =====
function pauseRoute(){
  session.paused=true;
  session.segments.push([]);
  document.getElementById("gpsStatus").innerText="Paused";
}

// ===== RESUME =====
function resumeRoute(){
  session.paused=false;
  document.getElementById("gpsStatus").innerText="Resumed";
}

// ===== STOP =====
async function stopRoute(){

  session.active=false;
  navigator.geolocation.clearWatch(watchId);

  let day=(new Date().getDay()+6)%7;

  let finalRoute={
    segments:[],
    totalKm:0
  };

  for(let seg of session.segments){

    if(seg.length<2) continue;

    let km=calc(seg);
    if(km<0.02) continue;

    let start=await getAddr(seg[0]);
    let end=await getAddr(seg[seg.length-1]);

    finalRoute.segments.push({km:km.toFixed(2),start,end});
    finalRoute.totalKm+=km;
  }

  weekData[currentWeek].routes[day].push(finalRoute);

  save();
  render();
}

// ===== DISTANCE =====
function calc(r){
  let t=0;
  for(let i=1;i<r.length;i++) t+=dist(r[i-1],r[i]);
  return t;
}

function dist(a,b){
  let R=6371;
  let dLat=(b.lat-a.lat)*Math.PI/180;
  let dLon=(b.lng-a.lng)*Math.PI/180;

  let x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== ADDRESS =====
async function getAddr(c){
  try{
    let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.lat}&lon=${c.lng}`);
    let d=await r.json();
    return d.display_name || "Unknown";
  }catch{
    return "Unknown";
  }
}

// ===== SAVE =====
function save(){
  localStorage.setItem("weekData",JSON.stringify(weekData));
}

// ===== RENDER WEEK =====
function render(){

  if(!currentWeek) return;

  let table=document.getElementById("grid");
  table.innerHTML="";

  let w=weekData[currentWeek];

  let header=document.createElement("tr");
  header.appendChild(document.createElement("th"));

  for(let d of days){
    let th=document.createElement("th");
    th.innerText=d;
    header.appendChild(th);
  }

  table.appendChild(header);

  let rrow=document.createElement("tr");
  rrow.style.background="#eef";
  rrow.appendChild(Object.assign(document.createElement("td"),{innerText:"Routes"}));

  for(let i=0;i<7;i++){

    let routes=w.routes[i] || [];
    let total=0;

    routes.forEach(r=>{
      total += r.totalKm || 0;
    });

    let td=document.createElement("td");
    td.innerHTML=routes.length+"<br>"+total.toFixed(1)+" km";

    rrow.appendChild(td);
  }

  table.appendChild(rrow);
}

// ===== DATABASE =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  for(let w in weekData){

    let block=document.createElement("div");
    block.style.border="1px solid #aaa";
    block.style.margin="10px";
    block.style.padding="10px";

    block.innerHTML="<h3>Week "+w+"</h3>";

    let data=weekData[w];

    data.routes.forEach((day,i)=>{

      block.innerHTML+="<u>"+days[i]+"</u><br>";

      day.forEach(r=>{
        block.innerHTML+=
          "Total "+(r.totalKm||0).toFixed(2)+" km<br>";

        if(r.segments){
          r.segments.forEach(s=>{
            block.innerHTML+=s.km+" km | "+s.start+" → "+s.end+"<br>";
          });
        }

        block.innerHTML+="<br>";
      });
    });

    div.appendChild(block);
  }
}

</script>

</body>
</html>
