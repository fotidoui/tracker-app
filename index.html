<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Engine Upgrade</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; text-align:center; }
.screen { display:none; }

#map {
  width:100%;
  height:260px;
  border:1px solid #ccc;
}

.event {
  font-size:11px;
  border-bottom:1px solid #eee;
  padding:3px;
}

table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  border:1px solid #ccc;
  font-size:12px;
  padding:4px;
}
</style>
</head>

<body>

<h2>GIS Engine (Upgraded)</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('map')">Map</button>
  <button onclick="show('db')">Database</button>
</div>

<!-- WEEKLY -->
<div id="weekly" class="screen">

  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start Route</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="renderAll()">Refresh</button>

  <div id="events"></div>
</div>

<!-- MAP -->
<div id="mapScreen" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="map"></div>
</div>

<!-- DB -->
<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbView"></div>
</div>

<script>

// ================= STATE =================
let events = JSON.parse(localStorage.getItem("events") || "[]");

let week = null;

let route = null;
let watch = null;

let map, layer;

// ================= INIT =================
window.onload = () => {

  document.getElementById("weekInput").onchange = e=>{
    week = Number(e.target.value);
    renderAll();
  };

  show("home");
};

// ================= SAVE =================
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

// ================= DISTANCE (REAL GIS CORE) =================
function haversine(a,b){
  const R = 6371;

  const dLat = (b.lat-a.lat)*Math.PI/180;
  const dLng = (b.lng-a.lng)*Math.PI/180;

  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(a.lat*Math.PI/180) *
    Math.cos(b.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  return 2*R*Math.asin(Math.sqrt(x));
}

// ================= REVERSE GEOCODE =================
async function getAddress(lat,lng){
  try{
    let r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );
    let j = await r.json();
    return j.display_name;
  }catch(e){
    return "offline";
  }
}

// ================= ROUTE ENGINE =================
function startRoute(){

  route = {
    id:Date.now(),
    active:true,
    last:null,
    distance:0,
    points:[]
  };

  watch = navigator.geolocation.watchPosition(async p=>{

    if(!route.active) return;

    let point = {
      lat:p.coords.latitude,
      lng:p.coords.longitude,
      time:Date.now()
    };

    if(route.last){
      route.distance += haversine(route.last,point);
    }

    route.last = point;
    route.points.push(point);

    let address = await getAddress(point.lat,point.lng);

    events.push({
      id:Date.now()+Math.random(),
      type:"route-point",
      week,
      routeId:route.id,
      lat:point.lat,
      lng:point.lng,
      distance:route.distance,
      address
    });

    save();
    renderAll();
  });
}

function pauseRoute(){ if(route) route.active=false; }
function resumeRoute(){ if(route) route.active=true; }

function stopRoute(){
  navigator.geolocation.clearWatch(watch);
  route=null;
}

// ================= NAV =================
function show(id){

  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");

  if(id==="map"){
    document.getElementById("mapScreen").style.display="block";
    initMap();
    renderMap();
    return;
  }

  document.getElementById(id).style.display="block";
  renderAll();
}

// ================= MAP =================
function initMap(){

  if(map) return;

  map = L.map("map").setView([52,5],7);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
    .addTo(map);

  layer = L.layerGroup().addTo(map);
}

function renderMap(){

  if(!map || !week) return;

  layer.clearLayers();

  let pts = events.filter(e=>e.week===week && e.lat);

  let routes = {};

  pts.forEach(p=>{
    if(!routes[p.routeId]) routes[p.routeId]=[];
    routes[p.routeId].push([p.lat,p.lng]);
  });

  Object.values(routes).forEach(r=>{
    if(r.length>1)
      L.polyline(r,{color:"blue"}).addTo(layer);
  });

  pts.forEach(p=>{
    L.circleMarker([p.lat,p.lng]).addTo(layer);
  });
}

// ================= EVENTS =================
function renderEvents(){

  let div=document.getElementById("events");
  div.innerHTML="<h3>Events</h3>";

  events.filter(e=>e.week===week).forEach(e=>{

    let d=document.createElement("div");
    d.className="event";

    d.innerText =
      `${e.type} | ${e.lat},${e.lng} | ${e.address||""} | km:${(e.distance||0).toFixed(2)}`;

    div.appendChild(d);
  });
}

// ================= DB =================
function renderDB(){

  let div=document.getElementById("dbView");
  div.innerHTML="";

  let grouped={};

  events.forEach(e=>{
    grouped[e.week]=(grouped[e.week]||0)+1;
  });

  Object.keys(grouped).forEach(w=>{
    div.innerHTML += `<h3>Week ${w}</h3>Events: ${grouped[w]}<br>`;
  });
}

// ================= MASTER =================
function renderAll(){
  renderEvents();
  renderDB();
  renderMap();
}

</script>
</body>
</html>
