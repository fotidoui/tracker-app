<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline GIS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; text-align:center; }
.screen { display:none; }

#map { height:260px; width:100%; border:1px solid #ccc; margin:10px 0; }

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ccc; font-size:12px; padding:4px; }

textarea { width:95%; height:40px; }

.event { font-size:11px; border-bottom:1px solid #ddd; padding:2px; }
</style>
</head>
<body>

<h2>GIS Tracker</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">

  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeek()">Save Week</button>

  <div id="map"></div>

  <table id="grid"></table>

  <div id="events"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbView"></div>
</div>

<script>

// ===================== STATE =====================
let events = JSON.parse(localStorage.getItem("events")||"[]");
let db = JSON.parse(localStorage.getItem("db")||"[]");

let week = null;
let day = null;

let route = {active:false, paused:false, id:null};
let watch = null;

let map, layer;

// ===================== INIT =====================
window.onload = () => {

  document.getElementById("weekInput").onchange = e=>{
    week = Number(e.target.value);
    renderAll();
  };

  show("home");
};

// ===================== SAVE =====================
function save(){
  localStorage.setItem("events",JSON.stringify(events));
  localStorage.setItem("db",JSON.stringify(db));
}

// ===================== NAV =====================
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") initMap();
  if(id==="db") renderDB();
}

// ===================== MAP =====================
function initMap(){
  if(map) return;

  map = L.map("map").setView([52,5],7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  layer = L.layerGroup().addTo(map);
}

// ===================== CORE RENDER =====================
function renderAll(){
  renderTable();
  renderEvents();
  renderMap();
}

// ===================== GPS =====================
function gps(cb){
  navigator.geolocation.getCurrentPosition(
    p=>cb(p.coords),
    ()=>cb(null)
  );
}

// ===================== ADD EVENT =====================
function addEvent(type, extra={}){

  if(!Number.isFinite(week)) return;

  gps(c=>{
    events.push({
      id:Date.now()+Math.random(),
      type,
      time:Date.now(),
      week:Number(week),
      day:day ?? (new Date().getDay()+6)%7,
      lat:c?.latitude||null,
      lng:c?.longitude||null,
      routeId:route.id,
      ...extra
    });

    save();
    renderAll();
  });
}

// ===================== ROUTE =====================
function startRoute(){
  route={active:true,paused:false,id:Date.now()};
  addEvent("route-start");

  watch = navigator.geolocation.watchPosition(p=>{
    if(route.active && !route.paused){
      events.push({
        type:"route-point",
        time:Date.now(),
        week:Number(week),
        day:day ?? 0,
        lat:p.coords.latitude,
        lng:p.coords.longitude,
        routeId:route.id
      });

      save();
      renderAll();
    }
  });
}

function pauseRoute(){ route.paused=true; addEvent("pause"); }
function resumeRoute(){ route.paused=false; addEvent("resume"); }

function stopRoute(){
  navigator.geolocation.clearWatch(watch);
  addEvent("stop");
  route={active:false,paused:false,id:null};
}

// ===================== TABLE =====================
function renderTable(){

  if(!week) return;

  let t=document.getElementById("grid");
  t.innerHTML="";

  let h=document.createElement("tr");
  h.innerHTML="<th>Habit</th>" + Array(7).fill(0).map((_,i)=>`<th>${i}</th>`).join("");
  t.appendChild(h);

  for(let i=0;i<5;i++){
    let r=document.createElement("tr");

    r.innerHTML = `<td>Habit ${i+1}</td>` +
      Array(7).fill(0).map((_,d)=>
        `<td><button onclick="day=${d};addEvent('habit',{habitIndex:${i}})">+</button></td>`
      ).join("");

    t.appendChild(r);
  }
}

// ===================== EVENTS =====================
function renderEvents(){

  let div=document.getElementById("events");
  div.innerHTML="<h3>Events</h3>";

  let evs = events.filter(e=>e.week===week);

  evs.forEach(e=>{
    let d=document.createElement("div");
    d.className="event";

    d.innerText =
      `${e.type} | ${e.lat},${e.lng} | ${new Date(e.time).toLocaleString()}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      events = events.filter(x=>x.id!==e.id);
      save();
      renderAll();
    };

    d.appendChild(del);
    div.appendChild(d);
  });
}

// ===================== MAP =====================
function renderMap(){

  if(!map || !week) return;

  layer.clearLayers();

  let pts = events.filter(e=>e.week===week && e.lat);

  let routes={};

  pts.forEach(p=>{
    if(p.routeId){
      if(!routes[p.routeId]) routes[p.routeId]=[];
      routes[p.routeId].push([p.lat,p.lng]);
    }
  });

  Object.values(routes).forEach(r=>{
    if(r.length>1) L.polyline(r,{color:"blue"}).addTo(layer);
  });

  pts.forEach(p=>{
    L.circleMarker([p.lat,p.lng]).addTo(layer);
  });
}

// ===================== DB =====================
function saveWeek(){

  if(!Number.isFinite(week)) return;

  db = db.filter(w=>w.week!==week);

  db.push({
    week:Number(week),
    data:JSON.parse(JSON.stringify(events.filter(e=>e.week===week)))
  });

  save();
}

function renderDB(){

  let div=document.getElementById("dbView");
  div.innerHTML="";

  db.forEach(w=>{
    div.innerHTML += `<h3>Week ${w.week}</h3>`;

    w.data.forEach(e=>{
      let d=document.createElement("div");
      d.innerText=`${e.type} | ${e.lat},${e.lng}`;
      div.appendChild(d);
    });
  });
}

</script>
</body>
</html>
