<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline GIS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; text-align:center; }
.screen { display:none; }

#map, #vector {
  width:100%;
  height:260px;
  border:1px solid #ccc;
  margin:10px 0;
}

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ccc; font-size:12px; padding:4px; }

.event { font-size:11px; border-bottom:1px solid #ddd; padding:3px; }
button { margin:2px; }
</style>
</head>

<body>

<h2>Offline GIS Tracker</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">

  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeek()">Save Week</button>

  <button onclick="setMode('map')">Map</button>
  <button onclick="setMode('vector')">Vector</button>

  <div id="map"></div>
  <canvas id="vector"></canvas>

  <table id="table"></table>

  <div id="events"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbView"></div>
</div>

<script>

// ===================== CONSTANTS =====================
const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===================== STATE =====================
let events = JSON.parse(localStorage.getItem("events") || "[]");
let db = JSON.parse(localStorage.getItem("db") || "[]");

let week = null;
let day = null;
let mode = "map";

let route = {active:false, paused:false, id:null};
let watch = null;

let map, layer;

// ===================== INIT =====================
window.onload = () => {

  document.getElementById("weekInput").onchange = e=>{
    week = Number(e.target.value);
    renderAll();
  };

  show("home");
};

// ===================== STORAGE =====================
function save(){
  localStorage.setItem("events",JSON.stringify(events));
  localStorage.setItem("db",JSON.stringify(db));
}

// ===================== WEEKDAY FIX =====================
function getWeekday(date=new Date()){
  return (date.getDay()+6)%7;
}

// ===================== NAV =====================
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") initMap();
  if(id==="db") renderDB();
}

// ===================== MODE =====================
function setMode(m){
  mode = m;
  document.getElementById("map").style.display = m==="map"?"block":"none";
  document.getElementById("vector").style.display = m==="vector"?"block":"none";
  renderAll();
}

// ===================== MAP =====================
function initMap(){
  if(map) return;

  map = L.map("map").setView([52,5],7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  layer = L.layerGroup().addTo(map);
}

// ===================== RENDER MASTER =====================
function renderAll(){
  renderTable();
  renderEvents();
  renderMap();
  renderVector();
}

// ===================== GPS WRAPPER =====================
function gps(cb){
  navigator.geolocation.getCurrentPosition(
    p=>cb(p.coords),
    ()=>cb(null)
  );
}

// ===================== ADD EVENT =====================
function addEvent(type, extra={}){

  if(!Number.isFinite(week)) return;

  gps(c=>{
    const now = new Date();

    events.push({
      id:Date.now()+Math.random(),
      type,
      time:now.getTime(),
      week:Number(week),
      day:getWeekday(now),
      lat:c?.latitude||null,
      lng:c?.longitude||null,
      routeId:route.id,
      ...extra
    });

    save();
    renderAll();
  });
}

// ===================== ROUTE SYSTEM =====================
function startRoute(){
  route={active:true,paused:false,id:Date.now()};
  addEvent("route-start");

  watch = navigator.geolocation.watchPosition(p=>{
    if(route.active && !route.paused){

      events.push({
        id:Date.now()+Math.random(),
        type:"route-point",
        time:Date.now(),
        week:Number(week),
        day:getWeekday(new Date()),
        lat:p.coords.latitude,
        lng:p.coords.longitude,
        routeId:route.id
      });

      save();
      renderAll();
    }
  });
}

function pauseRoute(){ route.paused=true; addEvent("pause"); }
function resumeRoute(){ route.paused=false; addEvent("resume"); }

function stopRoute(){
  navigator.geolocation.clearWatch(watch);
  addEvent("stop");
  route={active:false,paused:false,id:null};
}

// ===================== TABLE =====================
function renderTable(){

  if(!week) return;

  let t=document.getElementById("table");
  t.innerHTML="";

  let header = "<th>Habit</th>" + days.map(d=>`<th>${d}</th>`).join("");
  t.innerHTML += "<tr>"+header+"</tr>";

  for(let i=0;i<10;i++){
    let row = "<td>Habit "+(i+1)+"</td>";

    for(let d=0;d<7;d++){
      row += `<td><button onclick="day=${d};addEvent('habit',{habitIndex:${i}})">+</button></td>`;
    }

    t.innerHTML += "<tr>"+row+"</tr>";
  }
}

// ===================== EVENTS =====================
function renderEvents(){

  let div=document.getElementById("events");
  div.innerHTML="<h3>Events</h3>";

  let evs = events.filter(e=>e.week===week);

  evs.forEach(e=>{
    let d=document.createElement("div");
    d.className="event";

    d.innerText =
      `${e.type} | ${days[e.day]} | ${new Date(e.time).toLocaleString()} | ${e.lat},${e.lng}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      events = events.filter(x=>x.id!==e.id);
      save();
      renderAll();
    };

    d.appendChild(del);
    div.appendChild(d);
  });
}

// ===================== MAP =====================
function renderMap(){

  if(!map || mode!=="map" || !week) return;

  layer.clearLayers();

  let pts = events.filter(e=>e.week===week && e.lat);

  let routes={};

  pts.forEach(p=>{
    if(p.routeId){
      if(!routes[p.routeId]) routes[p.routeId]=[];
      routes[p.routeId].push([p.lat,p.lng]);
    }
  });

  Object.values(routes).forEach(r=>{
    if(r.length>1) L.polyline(r,{color:"blue"}).addTo(layer);
  });

  pts.forEach(p=>{
    L.circleMarker([p.lat,p.lng]).addTo(layer);
  });
}

// ===================== VECTOR =====================
function renderVector(){

  if(mode!=="vector" || !week) return;

  let c=document.getElementById("vector");
  c.width=c.offsetWidth;
  c.height=260;

  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  let pts = events.filter(e=>e.week===week && e.lat);
  if(pts.length<2) return;

  let minLat=Math.min(...pts.map(p=>p.lat));
  let maxLat=Math.max(...pts.map(p=>p.lat));
  let minLng=Math.min(...pts.map(p=>p.lng));
  let maxLng=Math.max(...pts.map(p=>p.lng));

  const proj = p => [
    (p.lng-minLng)/(maxLng-minLng)*c.width,
    c.height-(p.lat-minLat)/(maxLat-minLat)*c.height
  ];

  ctx.beginPath();

  pts.forEach((p,i)=>{
    let [x,y]=proj(p);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });

  ctx.stroke();
}

// ===================== DB =====================
function saveWeek(){

  if(!week) return;

  db = db.filter(w=>w.week!==week);

  db.push({
    week:Number(week),
    data:JSON.parse(JSON.stringify(events.filter(e=>e.week===week)))
  });

  save();
}

function renderDB(){

  let div=document.getElementById("dbView");
  div.innerHTML="";

  db.forEach(w=>{
    div.innerHTML += `<h3>Week ${w.week}</h3>`;

    w.data.forEach(e=>{
      let d=document.createElement("div");
      d.innerText = `${e.type} | ${days[e.day]} | ${e.lat},${e.lng}`;
      div.appendChild(d);
    });
  });
}

</script>
</body>
</html>
