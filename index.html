<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }

    .screen { display:none; }

    table {
      margin:10px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:5px;
      font-size:12px;
    }

    textarea { width:95%; height:40px; }

    #map { height:250px; margin:10px; }

    .eventBox {
      font-size:10px;
      border-top:1px solid #ddd;
    }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeekToDB()">💾 Save Week</button>

  <div id="map"></div>

  <table id="grid"></table>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

let habits = Array(10).fill("").map((_,i)=>"Habit "+(i+1));

let liveEvents = [];
let database = [];

let currentWeek = null;

let lastPos = null;
let routeSession = {active:false,id:null};

let map, layer;

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== INIT =====
window.onload=()=>{
  liveEvents = JSON.parse(localStorage.getItem("liveEvents")) || [];
  database = JSON.parse(localStorage.getItem("database")) || [];

  navigator.geolocation.watchPosition(pos=>{
    lastPos = {
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    };
  });

  show("home");
};

function save(){
  localStorage.setItem("liveEvents",JSON.stringify(liveEvents));
  localStorage.setItem("database",JSON.stringify(database));
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") setTimeout(initMap,100);
  if(id==="db") renderDB();
}

// ===== MAP =====
function initMap(){
  if(map) return;

  map = L.map('map').setView([0,0],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  layer = L.layerGroup().addTo(map);
}

function updateMap(){

  layer.clearLayers();

  let evs = liveEvents.filter(e=>e.week===currentWeek && e.lat);

  if(evs.length===0) return;

  let bounds=[];

  evs.forEach(e=>{
    let m = L.marker([e.lat,e.lng]).addTo(layer);
    m.bindPopup(e.type+"<br>"+new Date(e.time).toLocaleString());
    bounds.push([e.lat,e.lng]);
  });

  map.fitBounds(bounds,{maxZoom:18});
}

// ===== EVENTS =====
function record(type, extra={}){
  liveEvents.push({
    type,
    time:Date.now(),
    lat:lastPos?.lat,
    lng:lastPos?.lng,
    week:currentWeek,
    day:(new Date().getDay()+6)%7,
    routeId:routeSession.id,
    ...extra
  });

  save();
  updateMap();
}

function startRoute(){
  routeSession={active:true,id:Date.now()};
  record("route-start");
}

function stopRoute(){
  record("route-end");
  routeSession.active=false;
}

// ===== SAVE WEEK =====
function saveWeekToDB(){

  let weekEvents = liveEvents.filter(e=>e.week===currentWeek);

  database.push({
    week:currentWeek,
    data:JSON.parse(JSON.stringify(weekEvents))
  });

  save();
  alert("Saved to database");
}

// ===== TABLE =====
document.getElementById("weekInput").onchange=e=>{
  currentWeek=Number(e.target.value);
  renderWeek();
  updateMap();
};

function renderWeek(){

  let table=document.getElementById("grid");
  table.innerHTML="";

  let h=document.createElement("tr");
  h.appendChild(document.createElement("th"));

  days.forEach(d=>{
    let th=document.createElement("th");
    th.innerText=d;
    h.appendChild(th);
  });

  table.appendChild(h);

  // HABITS
  for(let i=0;i<10;i++){

    let r=document.createElement("tr");

    let td=document.createElement("td");
    td.innerText=habits[i];
    r.appendChild(td);

    for(let d=0;d<7;d++){

      let cell=document.createElement("td");

      let evs = liveEvents.filter(e=>
        e.type==="habit" &&
        e.week===currentWeek &&
        e.day===d &&
        e.habitIndex===i
      );

      let cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=evs.length>0;

      cb.onclick=()=>{
        record("habit",{habitIndex:i});
        renderWeek();
      };

      cell.appendChild(cb);

      evs.forEach(ev=>{
        let div=document.createElement("div");
        div.className="eventBox";

        div.innerText=new Date(ev.time).toLocaleTimeString();

        let del=document.createElement("button");
        del.innerText="X";
        del.onclick=()=>{
          liveEvents.splice(liveEvents.indexOf(ev),1);
          save();
          renderWeek();
          updateMap();
        };

        div.appendChild(del);
        cell.appendChild(div);
      });

      r.appendChild(cell);
    }

    table.appendChild(r);
  }

  // NOTES
  let r=document.createElement("tr");
  r.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let d=0;d<7;d++){

    let td=document.createElement("td");

    let ta=document.createElement("textarea");

    let btn=document.createElement("button");
    btn.innerText="✔";

    btn.onclick=()=>{
      record("note",{text:ta.value});
      ta.value="";
      renderWeek();
    };

    td.appendChild(ta);
    td.appendChild(btn);

    let evs = liveEvents.filter(e=>
      e.type==="note" &&
      e.week===currentWeek &&
      e.day===d
    );

    evs.forEach(ev=>{
      let div=document.createElement("div");
      div.className="eventBox";

      div.innerText=ev.text;

      let del=document.createElement("button");
      del.innerText="X";
      del.onclick=()=>{
        liveEvents.splice(liveEvents.indexOf(ev),1);
        save();
        renderWeek();
        updateMap();
      };

      div.appendChild(del);
      td.appendChild(div);
    });

    r.appendChild(td);
  }

  table.appendChild(r);
}

// ===== DATABASE =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  if(database.length===0){
    div.innerHTML="No data";
    return;
  }

  database.forEach(w=>{

    let table=document.createElement("table");

    let h=document.createElement("tr");
    ["Type","Day","Time","Lat","Lng","Route"].forEach(t=>{
      let th=document.createElement("th");
      th.innerText=t;
      h.appendChild(th);
    });

    table.appendChild(h);

    w.data.forEach(e=>{
      let tr=document.createElement("tr");

      tr.innerHTML=`
        <td>${e.type}</td>
        <td>${days[e.day]}</td>
        <td>${new Date(e.time).toLocaleString()}</td>
        <td>${e.lat||""}</td>
        <td>${e.lng||""}</td>
        <td>${e.routeId||""}</td>
      `;

      table.appendChild(tr);
    });

    div.appendChild(document.createTextNode("Week "+w.week));
    div.appendChild(table);
  });
}

</script>

</body>
</html>
