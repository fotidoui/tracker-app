<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Personal Spatial Journal v3 Core</title>
<style>
:root{--bg:#fbf6ea;--paper:#fffaf0;--ink:#24333b;--muted:#6f7b82;--line:#d8ccb2;--sea:#2f6f7e;--green:#718455;--red:#d95d5d;--orange:#c57449;--shadow:0 12px 30px rgba(36,51,59,.18)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink)}
button,input,select,textarea{font:inherit;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:8px 10px}button{cursor:pointer;touch-action:manipulation}.primary{background:var(--sea);border-color:var(--sea);color:#fff}.warn{background:#fff1e7}.danger{background:#fff0ef}.hidden{display:none!important}
#app{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(#fffaf2,#f6efdf)}#map{position:absolute;inset:0;z-index:1;touch-action:none}
#hud{position:absolute;z-index:15;left:10px;right:10px;top:10px;background:rgba(255,250,240,.94);border:1px solid var(--line);border-radius:18px;padding:9px 10px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:center}
#status{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.orb{position:absolute;z-index:24;width:54px;height:54px;border-radius:999px;display:grid;place-items:center;background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow);font-size:24px;padding:0}
#book{left:12px;top:78px}#compass{left:12px;top:140px}
#dock{position:absolute;z-index:20;left:10px;right:10px;bottom:10px;background:rgba(255,250,240,.96);border:1px solid var(--line);border-radius:20px;padding:10px;box-shadow:var(--shadow)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;background:#fff;padding:4px 9px;font-size:12px}.small{font-size:12px}.muted{color:var(--muted)}
#panel{position:absolute;z-index:34;right:0;top:0;width:min(96vw,840px);height:100dvh;background:var(--paper);border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(105%);transition:.22s;display:flex;flex-direction:column}#panel.open{transform:translateX(0)}
.head,.tabs{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px;border-bottom:1px solid var(--line)}.head{justify-content:space-between}.tabs button.active{outline:2px solid var(--sea)}.body{overflow:auto;padding:12px;flex:1}.sec{display:none}.sec.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:14px;margin:8px 0;padding:10px}.draft{border-style:dashed;border-color:var(--orange);background:#fff8ea}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tablewrap{max-height:62dvh;overflow:auto}table{border-collapse:collapse;width:100%;background:#fff}th,td{border:1px solid var(--line);padding:7px;font-size:13px;vertical-align:top}th{background:#f8f0df;position:sticky;top:0}td.c{text-align:center}
pre{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;max-height:260px;overflow:auto}
dialog{width:min(94vw,760px);border:1px solid var(--line);border-radius:18px;background:var(--paper);box-shadow:0 18px 42px rgba(36,51,59,.25);padding:0;color:var(--ink)}dialog::backdrop{background:rgba(36,51,59,.25)}.dh,.db,.df{padding:14px;border-bottom:1px solid var(--line)}.df{border:0;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
#ctx{position:absolute;z-index:40;background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:8px;display:none;min-width:220px}#ctx button{display:block;width:100%;margin:4px 0;text-align:left}
@media(max-width:760px){.grid2{grid-template-columns:1fr}#panel{width:100vw}.orb{width:50px;height:50px}#book{top:76px}#compass{top:134px}#hud{left:8px;right:8px;top:8px}#dock{left:6px;right:6px;bottom:6px;padding:8px}th,td{font-size:12px;padding:5px}}
</style>
</head>
<body>
<div id="app">
<canvas id="map"></canvas>
<div id="hud"><b style="color:var(--sea)">Spatial Journal v3</b><span id="status">εκκίνηση...</span></div>
<button id="book" class="orb">📘</button><button id="compass" class="orb">🧭</button>
<div id="dock">
 <div class="row"><b>Ενεργή εντολή</b>
  <label>Mode <select id="mode"><option value="then">Add Then</option><option value="now">Add Now</option></select></label>
  <label>Οντότητα <select id="entity"><option value="point">Σημείο</option><option value="line">Γραμμή</option><option value="area">Περιοχή</option><option value="current">Παρούσα τοποθεσία</option></select></label>
  <label>Action <select id="action"></select></label>
  <button id="exec" class="primary">Εφαρμογή</button><button id="undo">Undo</button>
 </div>
 <div class="row"><button id="refreshMap">Refresh Map</button><button id="refreshAddr">Refresh Addresses</button><button id="fit">Fit</button><button id="zin">+</button><button id="zout">−</button><span id="hint" class="pill"></span></div>
</div>
<div id="ctx"><button data-ctx="point">Σημείο εδώ</button><button data-ctx="line">Γραμμή εδώ</button><button data-ctx="area">Περιοχή εδώ</button><button data-ctx="current">Καταγραφή παρούσας τοποθεσίας</button></div>
<aside id="panel">
 <div class="head"><b id="ptitle">📘 Βιβλίο</b><button id="close">Κλείσιμο</button></div>
 <div id="bookTabs" class="tabs"><button data-tab="weekly" class="active">Weekly</button><button data-tab="database">Database</button><button data-tab="drafts">Drafts</button><button data-tab="settings">Settings</button><button data-tab="backup">Backup/Export</button></div>
 <div id="toolTabs" class="tabs hidden"><button data-tab="gps" class="active">GPS</button><button data-tab="layers">Layers</button><button data-tab="coord">Coordinates</button><button data-tab="hidden">Hidden DBs</button></div>
 <div class="body">
  <section id="weekly" class="sec active"><div class="row"><button id="prevW">←</button><button id="thisW">Τρέχουσα</button><button id="nextW">→</button><span id="weekLab" class="pill"></span><span id="draftLab" class="pill"></span><button id="validate" class="primary">Επικύρωση εβδομάδας</button></div><div id="weeklyGrid"></div><h3>Records / Drafts εβδομάδας</h3><div id="weeklyRecords"></div></section>
  <section id="database" class="sec"><div class="row"><select id="dbScope"><option value="all">All</option><option value="day">Day</option><option value="week">Week</option><option value="month">Month</option></select><input id="dbDate" type="date"><select id="dbType"><option value="">All</option><option value="point">point</option><option value="route">route</option><option value="area">area</option></select><button id="applyDb">Filter</button></div><div class="tablewrap"><table id="dbTable"></table></div></section>
  <section id="drafts" class="sec"><h3>Προσωρινές εγγραφές</h3><div id="draftList"></div></section>
  <section id="settings" class="sec"><h3>Editable habits/categories</h3><div id="catEditor" class="grid2"></div><button id="saveCats" class="primary">Save categories</button><h3>Intervals</h3><label>Route samples sec <input id="routeSec" type="number" min="1" value="5"></label><label>Hidden GNSS sec <input id="gnssSec" type="number" min="1" value="5"></label><label>Hidden GNSS cap <input id="gnssCap" type="number" min="50" value="1000"></label></section>
  <section id="backup" class="sec"><button id="backupBtn" class="primary">Backup JSON</button><button id="restoreBtn">Restore JSON</button><input id="restoreFile" class="hidden" type="file" accept=".json,application/json"><h3>Export visible</h3><button id="exCsv">CSV</button><button id="exJson">GeoJSON</button><button id="exDxf">DXF</button></section>
  <section id="gps" class="sec"><button id="gpsBtn">Refresh GPS</button><button id="wake">Keep awake</button><pre id="gpsStatus"></pre></section>
  <section id="layers" class="sec"><label><input type="checkbox" data-layer="points" checked> Points</label><label><input type="checkbox" data-layer="routes" checked> Routes</label><label><input type="checkbox" data-layer="areas" checked> Areas</label><label><input type="checkbox" data-layer="drafts" checked> Drafts</label><label><input type="checkbox" data-layer="rings" checked> Accuracy/scale rings</label><label><input type="checkbox" data-layer="gnss" checked> Hidden GNSS/control</label></section>
  <section id="coord" class="sec"><pre id="coordStatus"></pre></section>
  <section id="hidden" class="sec"><button id="rebuild">Rebuild caches</button><pre id="hiddenStatus"></pre></section>
 </div>
</aside>
</div>
<dialog id="recDlg"><div class="dh"><b id="recTitle">Record</b></div><div class="db" id="recBody"></div><div class="df"><button id="cancelRec">Cancel</button><button id="saveRec" class="primary">Save draft</button></div></dialog>
<script>
"use strict";
const $=id=>document.getElementById(id), canvas=$("map"), c=canvas.getContext("2d"), R=6378137;
const ui = {
  status:$("status"), hint:$("hint"), ctx:$("ctx"), panel:$("panel"),
  ptitle:$("ptitle"), bookTabs:$("bookTabs"), toolTabs:$("toolTabs"),
  mode:$("mode"), entity:$("entity"), action:$("action"),
  recDlg:$("recDlg"), recTitle:$("recTitle"), recBody:$("recBody"),
  cancelRec:$("cancelRec"), saveRec:$("saveRec"),
  weekLab:$("weekLab"), draftLab:$("draftLab"), weeklyGrid:$("weeklyGrid"),
  weeklyRecords:$("weeklyRecords"), dbTable:$("dbTable"), dbScope:$("dbScope"),
  dbDate:$("dbDate"), dbType:$("dbType"), draftList:$("draftList"),
  catEditor:$("catEditor"), routeSec:$("routeSec"), gnssSec:$("gnssSec"),
  gnssCap:$("gnssCap"), gpsStatus:$("gpsStatus"), coordStatus:$("coordStatus"),
  hiddenStatus:$("hiddenStatus"), restoreFile:$("restoreFile")
};
const DB="PSJ_v3_real_core";
const app={db:null,records:[],drafts:[],gnss:[],control:[],cats:["Π/φια","Αλκ","Σορτς","Τσιγαρο","Γυμναστικη","Βασιλικο Πολτο","Ασταθεια","Habit 8","Habit 9","Habit 10"],settings:{routeSec:5,gnssSec:5,gnssCap:1000},layers:{points:true,routes:true,areas:true,drafts:true,rings:true,gnss:true},view:{mode:"week",date:new Date()},cmd:{activeRoute:null,activeArea:null},crs:{origin:{lat:50,lng:10,alt:0},falseEasting:5000000,falseNorthing:5000000,falseUp:10000,scale:1},cam:{x:5000000,y:5000000,z:.8},live:null,wake:null,gnssTimer:null,ctxLocal:null};
function id(p){return p+"-"+Date.now()+"-"+Math.random().toString(36).slice(2,7)}
function ymd(d){d=new Date(d);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function weekStart(d){d=new Date(d);const n=(d.getDay()+6)%7;d.setDate(d.getDate()-n);d.setHours(0,0,0,0);return d}
function addDays(d,n){d=new Date(d);d.setDate(d.getDate()+n);return d}
function weekKey(d){return ymd(weekStart(d))}
function weekNo(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}
function esc(s=""){return String(s??"").replace(/[&<>"']/g,x=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[x]))}
function dateOf(r){return (r.time?.calcTimestamp||r.createdAt||"").slice(0,10)}
function wkOf(r){return weekKey(dateOf(r))}
function openDb(){return new Promise((res,rej)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=e=>{const d=e.target.result;["main","drafts","gnss","coord","settings","mapCache","weeklyCache"].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"})})};q.onsuccess=()=>{app.db=q.result;res()};q.onerror=()=>rej(q.error)})}
function st(s,m="readonly"){return app.db.transaction(s,m).objectStore(s)}
function put(s,v){return new Promise((res,rej)=>{const q=st(s,"readwrite").put(v);q.onsuccess=()=>res(v);q.onerror=()=>rej(q.error)})}
function del(s,k){return new Promise((res,rej)=>{const q=st(s,"readwrite").delete(k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error)})}
function all(s){return new Promise((res,rej)=>{const q=st(s).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error)})}
function clear(s){return new Promise((res,rej)=>{const q=st(s,"readwrite").clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error)})}
function wgsToLocal(lat,lng,alt=0){const o=app.crs.origin,k=app.crs.scale;return{x:app.crs.falseEasting+R*(lng-o.lng)*Math.PI/180*Math.cos(o.lat*Math.PI/180)*k,y:app.crs.falseNorthing+R*(lat-o.lat)*Math.PI/180*k,z:app.crs.falseUp+((alt||0)-(o.alt||0))}}
function localToWgs(x,y,z=app.crs.falseUp){const o=app.crs.origin,k=app.crs.scale;return{lat:o.lat+((y-app.crs.falseNorthing)/(R*k))*180/Math.PI,lng:o.lng+((x-app.crs.falseEasting)/(R*Math.cos(o.lat*Math.PI/180)*k))*180/Math.PI,alt:(z-app.crs.falseUp)+(o.alt||0)}}
function l2s(x,y){const r=canvas.getBoundingClientRect();return{x:(x-app.cam.x)*app.cam.z+r.width/2,y:r.height/2-(y-app.cam.y)*app.cam.z}}
function s2l(px,py){const r=canvas.getBoundingClientRect();return{x:app.cam.x+(px-r.width/2)/app.cam.z,y:app.cam.y+(r.height/2-py)/app.cam.z,z:app.crs.falseUp}}
function hav(a,b){const rad=x=>x*Math.PI/180,dlat=rad(b.lat-a.lat),dlng=rad(b.lng-a.lng),q=Math.sin(dlat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dlng/2)**2;return 6371000*2*Math.asin(Math.sqrt(q))}
function dist2(v){let s=0;for(let i=1;i<v.length;i++)s+=hav(v[i-1].wgs,v[i].wgs);return s}
function dist3(v){let s=0;for(let i=1;i<v.length;i++){const d=hav(v[i-1].wgs,v[i].wgs),dz=(v[i].wgs.alt||0)-(v[i-1].wgs.alt||0);s+=Math.sqrt(d*d+dz*dz)}return s}
function areaM(v){if(v.length<3)return 0;let a=0;for(let i=0;i<v.length;i++){const p=v[i].local,q=v[(i+1)%v.length].local;a+=p.x*q.y-q.x*p.y}return Math.abs(a/2)}
function centroid(v){const l={x:v.reduce((s,p)=>s+p.local.x,0)/v.length,y:v.reduce((s,p)=>s+p.local.y,0)/v.length,z:v.reduce((s,p)=>s+p.local.z,0)/v.length};return{local:l,wgs:localToWgs(l.x,l.y,l.z)}}
function postal(a=""){const m=String(a).match(/\b[A-Z]?\d{4,6}\s?[A-Z]{0,2}\b/i);return m?m[0]:""}
function city(a=""){const p=String(a||"").split(",").map(x=>x.trim()).filter(Boolean);if(!p.length)return"";const c=p.find(x=>!/^\d/.test(x)&&!/\d{4,}/.test(x)&&!/\b(netherlands|nederland|greece|germany|france|italy|spain|belgium|usa|united states)\b/i.test(x));return c||postal(a)||p[0]}
async function rev(lat,lng){if(!navigator.onLine)return"";try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);if(!r.ok)return"";const j=await r.json();return j.display_name||""}catch{return""}}
function vertexFromWgs(w,meta={}){return{id:id("V"),wgs:{lat:w.lat,lng:w.lng,alt:w.alt||0,accuracy:w.accuracy??null},local:wgsToLocal(w.lat,w.lng,w.alt||0),timestamp:new Date().toISOString(),address:meta.address||"",city:meta.city||"",event:meta.event||"vertex",segment:meta.segment||1}}
function vertexFromLocal(l,meta={}){return vertexFromWgs(localToWgs(l.x,l.y,l.z),meta)}
function process(r){if(r.type==="route")r.metrics={distance2dM:dist2(r.vertices),distance3dM:dist3(r.vertices),vertexCount:r.vertices.length,routeCities:routeCities(r)};if(r.type==="area"){r.center=centroid(r.vertices);r.metrics={areaM2:areaM(r.vertices),vertexCount:r.vertices.length}};if(r.type==="point")r.metrics={quality:r.wgs.accuracy!=null?Math.max(5,100-r.wgs.accuracy*4):20};return r}
function routeCities(r){const cs=[];(r.vertices||[]).forEach(v=>{const x=v.city||city(v.address);if(x&&!cs.includes(x))cs.push(x)});return cs.join(" → ")}
function pointDraft(mode,cat,text,wgs,local,calc,address=""){if(!local)local=wgsToLocal(wgs.lat,wgs.lng,wgs.alt||0);if(!wgs)wgs=localToWgs(local.x,local.y,local.z);return process({id:id("DRF"),type:"point",status:"draft",mode,category:cat,text,wgs,local,time:{createdAt:new Date().toISOString(),calcTimestamp:calc,timeSource:mode==="now"?"live":"manual",timeConfidence:mode==="now"?"exact":"estimated"},address,city:city(address),metrics:{}})}
function routeDraft(mode,rid,verts,calc){return process({id:id("DRF"),type:"route",status:"draft",mode,routeId:rid,vertices:verts,time:{createdAt:new Date().toISOString(),calcTimestamp:calc,timeSource:mode==="now"?"live":"manual",timeConfidence:mode==="now"?"exact":"estimated"},metrics:{}})}
function areaDraft(mode,aid,verts,calc){return process({id:id("DRF"),type:"area",status:"draft",mode,areaId:aid,vertices:verts,time:{createdAt:new Date().toISOString(),calcTimestamp:calc,timeSource:mode==="now"?"live":"manual",timeConfidence:mode==="now"?"exact":"estimated"},metrics:{}})}
async function saveDraft(r){const ws=[...new Set(app.drafts.map(wkOf))],nw=wkOf(r);if(ws.length&&!ws.includes(nw)){openPanel("book","weekly");alert("Υπάρχουν drafts σε άλλη εβδομάδα. Επικύρωσε ή διέγραψέ τα πριν συνεχίσεις.");return false}await put("drafts",r);app.drafts.push(r);renderAll();return true}
async function validateWeek(){const wk=weekKey(app.view.date),rows=app.drafts.filter(r=>wkOf(r)===wk);if(!rows.length)return alert("Δεν υπάρχουν drafts σε αυτή την εβδομάδα.");for(const d of rows){await put("main",{...d,id:id("REC"),status:"validated",validatedAt:new Date().toISOString()});await del("drafts",d.id)}await reload();renderAll()}
async function reload(){app.records=await all("main");app.drafts=await all("drafts");app.gnss=await all("gnss");app.control=await all("coord")}
function scoped(){const rows=[...app.records,...app.drafts];if(app.view.mode==="day")return rows.filter(r=>dateOf(r)===ymd(app.view.date));if(app.view.mode==="week")return rows.filter(r=>wkOf(r)===weekKey(app.view.date));if(app.view.mode==="month")return rows.filter(r=>dateOf(r).startsWith(ymd(app.view.date).slice(0,7)));return rows}
async function getGps(){return new Promise((res,rej)=>navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>res(p.coords),rej,{enableHighAccuracy:true,timeout:15000,maximumAge:0}):rej(new Error("GPS unavailable")))}
async function refreshGps(){try{const c=await getGps();app.live={lat:c.latitude,lng:c.longitude,alt:c.altitude||0,accuracy:c.accuracy,altitudeAccuracy:c.altitudeAccuracy,speed:c.speed,heading:c.heading,timestamp:new Date().toISOString()};await hiddenGnss(app.live);renderAll()}catch(e){ui.gpsStatus.textContent="GPS error: "+e.message}}
async function hiddenGnss(o){const item={id:id("GNSS"),wgs:o,local:wgsToLocal(o.lat,o.lng,o.alt||0),createdAt:new Date().toISOString()};await put("gnss",item);app.gnss.push(item);while(app.gnss.length>app.settings.gnssCap){const old=app.gnss.shift();await del("gnss",old.id)}}
function draw(){const r=canvas.getBoundingClientRect();c.clearRect(0,0,r.width,r.height);c.strokeStyle="rgba(36,51,59,.06)";for(let x=0;x<r.width;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,r.height);c.stroke()}for(let y=0;y<r.height;y+=40){c.beginPath();c.moveTo(0,y);c.lineTo(r.width,y);c.stroke()}if(app.layers.gnss)app.control.forEach(cp=>drawPoint(cp.local,"#6f3fb0",4));for(const rec of scoped()){const draft=rec.status==="draft";if(rec.type==="point"&&app.layers.points)drawPoint(rec.local,draft?"#d09a4b":"#718455",draft?7:5);if(rec.type==="route"&&app.layers.routes)drawLine(rec.vertices,draft?"#d09a4b":"#c57449",3);if(rec.type==="area"&&app.layers.areas)drawPoly(rec.vertices,draft?"#d09a4b":"#4d8c95")}if(app.cmd.activeRoute)drawLine(app.cmd.activeRoute.vertices,"#c57449",3);if(app.cmd.activeArea)drawPoly(app.cmd.activeArea.vertices,"#4d8c95");if(app.live)drawAvatar(app.live)}
function drawPoint(l,col,rad=5){const p=l2s(l.x,l.y);c.beginPath();c.arc(p.x,p.y,rad,0,7);c.fillStyle=col;c.fill()}
function drawLine(v,col,w){if(!v?.length)return;c.beginPath();v.forEach((a,i)=>{const p=l2s(a.local.x,a.local.y);i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y)});c.strokeStyle=col;c.lineWidth=w;c.stroke()}
function drawPoly(v,col){if(!v?.length)return;c.beginPath();v.forEach((a,i)=>{const p=l2s(a.local.x,a.local.y);i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y)});if(v.length>2)c.closePath();c.fillStyle="rgba(77,140,149,.18)";c.fill();c.strokeStyle=col;c.lineWidth=2;c.stroke()}
function drawAvatar(w){const l=wgsToLocal(w.lat,w.lng,w.alt||0),p=l2s(l.x,l.y);if(app.layers.rings){c.beginPath();c.arc(p.x,p.y,(w.accuracy||0)*app.cam.z,0,7);c.strokeStyle="rgba(217,93,93,.35)";c.lineWidth=2;c.stroke();c.beginPath();c.arc(p.x,p.y,10*app.cam.z,0,7);c.setLineDash([6,4]);c.strokeStyle="rgba(47,111,126,.45)";c.stroke();c.setLineDash([])}c.beginPath();c.arc(p.x,p.y,8,0,7);c.fillStyle="#2f6f7e";c.fill()}
function fitView(){const pts=[];for(const r of scoped()){if(r.type==="point")pts.push(r.local);else r.vertices?.forEach(v=>pts.push(v.local))}if(app.live)pts.push(wgsToLocal(app.live.lat,app.live.lng,app.live.alt||0));if(!pts.length)return;const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),rect=canvas.getBoundingClientRect();const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);app.cam.x=(minX+maxX)/2;app.cam.y=(minY+maxY)/2;app.cam.z=Math.max(.002,Math.min(10,Math.min((rect.width-100)/Math.max(1,maxX-minX),(rect.height-190)/Math.max(1,maxY-minY))));draw()}
function updateActions(){const opts={point:[["record","record point"]],current:[["record","record current location"]],line:[["start","start line"],["vertex","add vertex"],["pause","pause"],["resume","resume"],["end","end line"]],area:[["start","start area"],["vertex","add vertex"],["close","close area"]]}[ui.entity.value];ui.action.innerHTML=opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join("");if(ui.entity.value==="line"&&app.cmd.activeRoute)ui.action.value="vertex";if(ui.entity.value==="area"&&app.cmd.activeArea)ui.action.value="vertex"}
async function execute(local=null){const m=ui.mode.value,e=ui.entity.value,a=ui.action.value;if(m==="now"){await refreshGps();if(!app.live)return alert("Δεν υπάρχει GPS.");const v=vertexFromWgs(app.live,{event:a});if(e==="point"||e==="current")return pointEditor(m,v);if(e==="line")return lineCmd(m,v,a);if(e==="area")return areaCmd(m,v,a)}else{local=local||app.ctxLocal;if(!local)return alert("Πάτησε πρώτα στον χάρτη.");const v=vertexFromLocal(local,{event:a});if(e==="point"||e==="current")return pointEditor(m,v);if(e==="line")return lineCmd(m,v,a);if(e==="area")return areaCmd(m,v,a)}}
function pointEditor(m,v){ui.recTitle.textContent=m==="now"?"Add Now point":"Add Then point";const locked=m==="now";ui.recBody.innerHTML=`<div class="grid2"><label>Category<select id="edCat">${app.cats.map(x=>`<option>${esc(x)}</option>`).join("")}<option>object</option><option>note</option></select></label><label>Calc timestamp<input id="edTime" type="datetime-local" value="${(m==="now"?new Date():new Date(app.view.date)).toISOString().slice(0,16)}"></label></div><label>Text<textarea id="edText" rows="3"></textarea></label><div class="grid2"><label>Lat<input id="edLat" type="number" step="any" value="${v.wgs.lat}" ${locked?"readonly":""}></label><label>Lng<input id="edLng" type="number" step="any" value="${v.wgs.lng}" ${locked?"readonly":""}></label><label>Altitude<input id="edAlt" type="number" step="any" value="${v.wgs.alt||0}" ${locked?"readonly":""}></label><label>Address<input id="edAddr" value="${esc(v.address||"")}"></label></div>`;ui.cancelRec.onclick=()=>ui.recDlg.close();ui.saveRec.onclick=async()=>{const w={lat:+edLat.value,lng:+edLng.value,alt:+edAlt.value,accuracy:v.wgs.accuracy};await saveDraft(pointDraft(m,edCat.value,edText.value,w,null,new Date(edTime.value).toISOString(),edAddr.value));ui.recDlg.close()};ui.recDlg.showModal()}
async function lineCmd(m,v,a){if(a==="start"||!app.cmd.activeRoute){app.cmd.activeRoute={id:id(m==="now"?"ROUTE":"MROUTE"),mode:m,segment:1,vertices:[]};v.event="start";app.cmd.activeRoute.vertices.push(v);ui.action.value="vertex";renderAll();return}if(a==="pause"){v.event="pause";v.segment=app.cmd.activeRoute.segment;app.cmd.activeRoute.vertices.push(v);renderAll();return}if(a==="resume"){app.cmd.activeRoute.segment++;v.event="resume";v.segment=app.cmd.activeRoute.segment;app.cmd.activeRoute.vertices.push(v);renderAll();return}if(a==="vertex"){v.event="vertex";v.segment=app.cmd.activeRoute.segment;app.cmd.activeRoute.vertices.push(v);renderAll();return}if(a==="end"){v.event="end";v.segment=app.cmd.activeRoute.segment;app.cmd.activeRoute.vertices.push(v);const rec=routeDraft(m,app.cmd.activeRoute.id,[...app.cmd.activeRoute.vertices],(m==="now"?new Date():new Date(app.view.date)).toISOString());app.cmd.activeRoute=null;await saveDraft(rec);updateActions()}}
async function areaCmd(m,v,a){if(a==="start"||!app.cmd.activeArea){app.cmd.activeArea={id:id(m==="now"?"AREA":"MAREA"),mode:m,vertices:[]};v.event="start";app.cmd.activeArea.vertices.push(v);ui.action.value="vertex";renderAll();return}if(a==="vertex"){v.event="vertex";app.cmd.activeArea.vertices.push(v);renderAll();return}if(a==="close"){if(app.cmd.activeArea.vertices.length<3)return alert("Χρειάζονται τουλάχιστον 3 κορυφές.");const rec=areaDraft(m,app.cmd.activeArea.id,[...app.cmd.activeArea.vertices],(m==="now"?new Date():new Date(app.view.date)).toISOString());app.cmd.activeArea=null;await saveDraft(rec);updateActions()}}
function undo(){if(app.cmd.activeRoute?.vertices.length){app.cmd.activeRoute.vertices.pop();renderAll();return}if(app.cmd.activeArea?.vertices.length){app.cmd.activeArea.vertices.pop();renderAll()}}
function renderAll(){draw();ui.status.textContent=`${app.view.mode.toUpperCase()} · ${ymd(app.view.date)} · W${weekNo(app.view.date)} · drafts ${app.drafts.length} · ${ui.mode.value}/${ui.entity.value}/${ui.action.value}`;ui.hint.textContent=`${ui.mode.value==="now"?"GPS locked":"Canvas/manual"} · ${ui.entity.value} · ${ui.action.value}`;renderWeekly();renderDb();renderDrafts();renderSettings();renderTools()}
function renderWeekly(){const st=weekStart(app.view.date),days=Array.from({length:7},(_,i)=>addDays(st,i)),wk=weekKey(app.view.date),rows=[...app.records,...app.drafts].filter(r=>wkOf(r)===wk);ui.weekLab.textContent=`W${weekNo(app.view.date)} ${ymd(days[0])} → ${ymd(days[6])}`;ui.draftLab.textContent=app.drafts.length?`draft weeks: ${[...new Set(app.drafts.map(wkOf))].join(", ")}`:"no drafts";let h="<div class='tablewrap'><table><thead><tr><th>Category</th>"+days.map((d,i)=>`<th>${["Δε","Τρ","Τε","Πε","Πα","Σα","Κυ"][i]}<br>${d.getDate()}</th>`).join("")+"</tr></thead><tbody>";for(const cat of app.cats)h+=`<tr><th>${esc(cat)}</th>`+days.map(d=>`<td class="c">${rows.filter(r=>r.type==="point"&&r.category===cat&&dateOf(r)===ymd(d)).length||""}</td>`).join("")+"</tr>";h+="<tr><th>Total route km</th>"+days.map(d=>`<td class="c">${(rows.filter(r=>r.type==="route"&&dateOf(r)===ymd(d)).reduce((s,r)=>s+(r.metrics?.distance2dM||0),0)/1000).toFixed(2)}</td>`).join("")+"</tr>";h+="<tr><th>Total area m²</th>"+days.map(d=>`<td class="c">${rows.filter(r=>r.type==="area"&&dateOf(r)===ymd(d)).reduce((s,r)=>s+(r.metrics?.areaM2||0),0).toFixed(1)}</td>`).join("")+"</tr>";h+="<tr><th>Drafts</th>"+days.map(d=>`<td class="c">${app.drafts.filter(r=>dateOf(r)===ymd(d)).length||""}</td>`).join("")+"</tr></tbody></table></div>";ui.weeklyGrid.innerHTML=h;ui.weeklyRecords.innerHTML=rows.map(card).join("")||"<p class='muted'>Δεν υπάρχουν εγγραφές.</p>";bindRecordButtons()}
function card(r){const t=r.type==="route"?`Route ${r.routeId} · ${((r.metrics.distance2dM||0)/1000).toFixed(3)} km · ${r.metrics.routeCities||"-"}`:r.type==="area"?`Area ${r.areaId} · ${(r.metrics.areaM2||0).toFixed(1)} m²`:`${r.category} · ${esc(r.text||"")}`;return`<div class="card ${r.status==="draft"?"draft":""}"><span class="pill">${r.status}</span> <span class="pill">${r.type}</span> <b>${esc(t)}</b><br><span class="small muted">${esc(r.time.calcTimestamp)}</span><div class="row"><button data-show="${r.id}">Show on map</button>${r.status==="draft"?`<button data-del="${r.id}" class="danger">Delete draft</button>`:""}</div></div>`}
function bindRecordButtons(){document.querySelectorAll("[data-show]").forEach(b=>b.onclick=()=>showMap(b.dataset.show));document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{await del("drafts",b.dataset.del);await reload();renderAll()})}
function renderDb(){let rows=[...app.records],scope=ui.dbScope.value,d=new Date(ui.dbDate.value||ymd(app.view.date));if(scope==="day")rows=rows.filter(r=>dateOf(r)===ymd(d));if(scope==="week")rows=rows.filter(r=>wkOf(r)===weekKey(d));if(scope==="month")rows=rows.filter(r=>dateOf(r).startsWith(ymd(d).slice(0,7)));if(ui.dbType.value)rows=rows.filter(r=>r.type===ui.dbType.value);ui.dbTable.innerHTML="<thead><tr><th>Type</th><th>Time</th><th>Name</th><th>Coordinates</th><th>Metrics</th></tr></thead><tbody>"+rows.map(r=>`<tr><td>${r.type}</td><td>${esc(r.time.calcTimestamp)}<br>${r.time.timeSource}/${r.time.timeConfidence}</td><td>${esc(r.category||r.routeId||r.areaId||"")}</td><td>${coords(r)}</td><td>${metrics(r)}</td></tr>`).join("")+"</tbody>"}
function coords(r){if(r.type==="point")return`${r.wgs.lat.toFixed(6)}, ${r.wgs.lng.toFixed(6)}, z${(r.wgs.alt||0).toFixed(1)}<br>${r.local.x.toFixed(2)}, ${r.local.y.toFixed(2)}`;return r.vertices.map((v,i)=>`${i+1}: ${v.wgs.lat.toFixed(6)},${v.wgs.lng.toFixed(6)} | ${v.local.x.toFixed(2)},${v.local.y.toFixed(2)}`).join("<br>")}
function metrics(r){return r.type==="route"?`${(r.metrics.distance2dM||0).toFixed(1)}m 2D<br>${(r.metrics.distance3dM||0).toFixed(1)}m 3D`:r.type==="area"?`${(r.metrics.areaM2||0).toFixed(1)} m²`:`quality ${r.metrics.quality||""}`}
function renderDrafts(){ui.draftList.innerHTML=app.drafts.map(card).join("")||"<p>No drafts.</p>";bindRecordButtons()}
function renderSettings(){ui.catEditor.innerHTML=app.cats.map((x,i)=>`<label>Category ${i+1}<input data-cat="${i}" value="${esc(x)}"></label>`).join("");ui.routeSec.value=app.settings.routeSec;ui.gnssSec.value=app.settings.gnssSec;ui.gnssCap.value=app.settings.gnssCap}
function renderTools(){ui.gpsStatus.textContent=JSON.stringify(app.live,null,2);ui.coordStatus.textContent=JSON.stringify(app.crs,null,2);ui.hiddenStatus.textContent=JSON.stringify({main:app.records.length,drafts:app.drafts.length,hiddenGnss:app.gnss.length,control:app.control.length},null,2)}
function showMap(idv){const r=[...app.records,...app.drafts].find(x=>x.id===idv);if(!r)return;app.view.date=new Date(r.time.calcTimestamp);app.view.mode="week";const p=r.type==="point"?r.local:r.type==="area"?r.center.local:r.vertices[0].local;app.cam.x=p.x;app.cam.y=p.y;app.cam.z=Math.max(app.cam.z,2);ui.panel.classList.remove("open");renderAll()}
async function refreshAddresses(){for(const r of [...app.records,...app.drafts]){if(r.type==="point"&&!r.address){r.address=await rev(r.wgs.lat,r.wgs.lng);r.city=city(r.address)}if(r.vertices){for(const v of r.vertices){if(!v.address){v.address=await rev(v.wgs.lat,v.wgs.lng);v.city=city(v.address)}}process(r)}await put(r.status==="draft"?"drafts":"main",r)}await reload();renderAll();alert("Addresses refreshed.")}
async function validate(){const wk=weekKey(app.view.date),rows=app.drafts.filter(r=>wkOf(r)===wk);if(!rows.length)return alert("Δεν υπάρχουν drafts σε αυτή την εβδομάδα.");for(const d of rows){await put("main",{...d,id:id("REC"),status:"validated",validatedAt:new Date().toISOString()});await del("drafts",d.id)}await reload();renderAll()}
async function saveSettings(){app.cats=[...document.querySelectorAll("[data-cat]")].map((i,n)=>i.value||`Category ${n+1}`);app.settings.routeSec=Math.max(1,+ui.routeSec.value||5);app.settings.gnssSec=Math.max(1,+ui.gnssSec.value||5);app.settings.gnssCap=Math.max(50,+ui.gnssCap.value||1000);await put("settings",{id:"settings",cats:app.cats,settings:app.settings,layers:app.layers,crs:app.crs,cam:app.cam});restartGnss();renderAll()}
async function loadSettings(){const s=(await all("settings")).find(x=>x.id==="settings");if(s){app.cats=s.cats||app.cats;app.settings=s.settings||app.settings;app.layers=s.layers||app.layers;app.crs=s.crs||app.crs;app.cam=s.cam||app.cam}}
function openPanel(kind,tab){ui.ptitle.textContent=kind==="book"?"📘 Βιβλίο":"🧭 Πυξίδα";ui.bookTabs.classList.toggle("hidden",kind!=="book");ui.toolTabs.classList.toggle("hidden",kind!=="tools");ui.panel.classList.add("open");showTab(tab)}
function showTab(idv){document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===idv));document.querySelectorAll(".sec").forEach(s=>s.classList.toggle("active",s.id===idv));renderAll()}
async function backup(){download(JSON.stringify({version:3,main:app.records,drafts:app.drafts,gnss:app.gnss,coord:app.control,cats:app.cats,settings:app.settings,crs:app.crs,cam:app.cam},null,2),"psj-v3-backup.json","application/json")}
async function restore(){const f=ui.restoreFile.files[0];if(!f)return;const j=JSON.parse(await f.text());if(!confirm("Restore backup?"))return;for(const s of ["main","drafts","gnss","coord"])await clear(s);for(const x of j.main||[])await put("main",x);for(const x of j.drafts||[])await put("drafts",x);for(const x of j.gnss||[])await put("gnss",x);for(const x of j.coord||[])await put("coord",x);app.cats=j.cats||app.cats;app.settings=j.settings||app.settings;app.crs=j.crs||app.crs;app.cam=j.cam||app.cam;await saveSettings();await reload();renderAll()}
function exportCSV(rows){const h=["id","status","type","category","calcTimestamp","coords","metrics"];return h.join(",")+"\n"+rows.map(r=>[r.id,r.status,r.type,r.category||r.routeId||r.areaId,r.time.calcTimestamp,JSON.stringify(r.type==="point"?r.wgs:r.vertices).replaceAll('"','""'),JSON.stringify(r.metrics).replaceAll('"','""')].map(x=>`"${x??""}"`).join(",")).join("\n")}
function exportGeoJSON(rows){return JSON.stringify({type:"FeatureCollection",features:rows.map(r=>{let geometry;if(r.type==="point")geometry={type:"Point",coordinates:[r.wgs.lng,r.wgs.lat,r.wgs.alt||0]};else{const cs=r.vertices.map(v=>[v.wgs.lng,v.wgs.lat,v.wgs.alt||0]);geometry={type:r.type==="area"?"Polygon":"LineString",coordinates:r.type==="area"?[cs.concat([cs[0]])]:cs}}return{type:"Feature",geometry,properties:{id:r.id,status:r.status,type:r.type,category:r.category,metrics:r.metrics,time:r.time}}})},null,2)}
function exportDXF(rows){const out=["0","SECTION","2","ENTITIES"];for(const r of rows){if(r.type==="point")out.push("0","POINT","8",r.type,"10",String(r.local.x),"20",String(r.local.y),"30",String(r.local.z||0));else{out.push("0","LWPOLYLINE","8",r.type,"90",String(r.vertices.length),"70",r.type==="area"?"1":"0");for(const v of r.vertices)out.push("10",String(v.local.x),"20",String(v.local.y))}}out.push("0","ENDSEC","0","EOF");return out.join("\n")}
function download(t,n,type){const a=document.createElement("a"),u=URL.createObjectURL(new Blob([t],{type}));a.href=u;a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
function safeWeek(n){if(app.drafts.length){openPanel("book","weekly");alert("Υπάρχουν μη επικυρωμένα drafts. Επικύρωσε ή διέγραψέ τα πριν αλλάξεις εβδομάδα.");return}app.view.date=addDays(weekStart(app.view.date),n*7);renderAll()}
function restartGnss(){if(app.gnssTimer)clearInterval(app.gnssTimer);app.gnssTimer=setInterval(refreshGps,app.settings.gnssSec*1000)}
function setup(){$("book").onclick=()=>openPanel("book","weekly");$("compass").onclick=()=>openPanel("tools","gps");$("close").onclick=()=>ui.panel.classList.remove("open");document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));ui.entity.onchange=()=>{updateActions();renderAll()};ui.mode.onchange=renderAll;ui.action.onchange=renderAll;$("exec").onclick=()=>execute();$("undo").onclick=undo;$("refreshMap").onclick=renderAll;$("refreshAddr").onclick=refreshAddresses;$("fit").onclick=fitView;$("zin").onclick=()=>{app.cam.z*=1.25;draw()};$("zout").onclick=()=>{app.cam.z/=1.25;draw()};$("validate").onclick=validate;$("prevW").onclick=()=>safeWeek(-1);$("thisW").onclick=()=>{if(app.drafts.length){openPanel("book","weekly");alert("Επικύρωσε/διέγραψε drafts πρώτα.");return}app.view.date=new Date();renderAll()};$("nextW").onclick=()=>safeWeek(1);$("applyDb").onclick=renderDb;$("gpsBtn").onclick=refreshGps;$("wake").onclick=async()=>{try{if(app.wake){await app.wake.release();app.wake=null;wake.textContent="Keep awake"}else{app.wake=await navigator.wakeLock.request("screen");wake.textContent="Awake on"}}catch(e){alert(e.message)}};$("saveCats").onclick=saveSettings;ui.routeSec.onchange=saveSettings;ui.gnssSec.onchange=saveSettings;ui.gnssCap.onchange=saveSettings;$("backupBtn").onclick=backup;$("restoreBtn").onclick=()=>restoreFile.click();ui.restoreFile.onchange=restore;$("exCsv").onclick=()=>download(exportCSV(scoped()),"psj.csv","text/csv");$("exJson").onclick=()=>download(exportGeoJSON(scoped()),"psj.geojson","application/geo+json");$("exDxf").onclick=()=>download(exportDXF(scoped()),"psj.dxf","application/dxf");$("rebuild").onclick=async()=>{await put("mapCache",{id:"visible",rows:scoped(),date:new Date().toISOString()});await put("weeklyCache",{id:"weekly",week:weekKey(app.view.date),rows:scoped(),date:new Date().toISOString()});alert("Caches rebuilt.")};document.querySelectorAll("[data-layer]").forEach(cb=>cb.onchange=()=>{app.layers[cb.dataset.layer]=cb.checked;draw()});document.querySelectorAll("[data-ctx]").forEach(b=>b.onclick=()=>{ui.entity.value=b.dataset.ctx;updateActions();ui.ctx.style.display="none";execute(app.ctxLocal)});let down=null,last=null,pan=false;canvas.addEventListener("pointerdown",e=>{ui.ctx.style.display="none";down={x:e.clientX,y:e.clientY};last={x:e.clientX,y:e.clientY};pan=false;canvas.setPointerCapture(e.pointerId)});canvas.addEventListener("pointermove",e=>{if(!down)return;const dx=e.clientX-last.x,dy=e.clientY-last.y;if(Math.hypot(e.clientX-down.x,e.clientY-down.y)>6)pan=true;if(pan){app.cam.x-=dx/app.cam.z;app.cam.y+=dy/app.cam.z;draw()}last={x:e.clientX,y:e.clientY}});canvas.addEventListener("pointerup",e=>{if(!down)return;const mv=Math.hypot(e.clientX-down.x,e.clientY-down.y),r=canvas.getBoundingClientRect();if(mv<8&&ui.mode.value==="then"){app.ctxLocal=s2l(e.clientX-r.left,e.clientY-r.top);execute(app.ctxLocal)}down=null;pan=false});canvas.addEventListener("contextmenu",e=>{e.preventDefault();const r=canvas.getBoundingClientRect();app.ctxLocal=s2l(e.clientX-r.left,e.clientY-r.top);ui.ctx.style.left=e.clientX+"px";ui.ctx.style.top=e.clientY+"px";ui.ctx.style.display="block"})}
function resize(){const dpr=devicePixelRatio||1,r=canvas.getBoundingClientRect();canvas.width=Math.floor(r.width*dpr);canvas.height=Math.floor(r.height*dpr);c.setTransform(dpr,0,0,dpr,0,0);draw()}
async function boot(){await openDb();await loadSettings();await reload();setup();updateActions();resize();await refreshGps();restartGnss();renderAll();window.addEventListener("resize",resize);window.addEventListener("pagehide",saveSettings)}
boot().catch(e=>alert("Startup error: "+e.message));
</script>
</body>
