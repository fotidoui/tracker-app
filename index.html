<script>
'use strict';
const $=id=>document.getElementById(id);
const ui={canvas:$('map'),info1:$('infoLine1'),info2:$('infoLine2'),scaleLabel:$('scaleLabel'),viewBtn:$('viewBtn'),addBtn:$('addBtn'),designBtn:$('designBtn'),selectBtn:$('selectBtn'),followBtn:$('followBtn'),zoomIn:$('zoomInBtn'),zoomOut:$('zoomOutBtn'),fit:$('fitBtn'),fitSel:$('fitSelBtn'),layersBtn:$('layersBtn'),viewPop:$('viewPop'),addPop:$('addPop'),designPop:$('designPop'),selectPop:$('selectPop'),layersPop:$('layersPop'),hub:$('compassHub'),arcBase:$('arcBase'),arcWeekly:$('arcWeekly'),arcSettings:$('arcSettings'),northNeedle:$('northNeedle'),headingNeedle:$('headingNeedle'),bubble:$('levelBubble'),panel:$('panel'),panelTitle:$('panelTitle'),panelBody:$('panelBody'),panelClose:$('panelClose'),dialog:$('recordDialog'),recordTitle:$('recordTitle'),recordBody:$('recordBody'),recordCancel:$('recordCancelBtn'),recordSave:$('recordSaveBtn')};
const ctx=ui.canvas.getContext('2d');
const R=6378137, DB_NAME='PSJ_v65_leonardo_personal_crs';
const app={db:null,base:[],tempGnss:[],controlPoints:[],correctionLog:[],avatarView:{id:'avatar',rawLocal:null,estimatedLocal:{x:5000000,y:5000000,z:10000},correctedLocal:{x:5000000,y:5000000,z:10000},rawWgs:null,correctedWgs:null,accuracy:null,confidence:.1,heading:0,solver:'fallback',updatedAt:new Date().toISOString()},mapView:[],weeklyView:[],settings:{selectedAt:new Date().toISOString(),viewMode:'week',gnssInterval:5,routeInterval:10,scaleRing:10},crs:{origin:{lat:50,lng:10,alt:0},falseEasting:5000000,falseNorthing:5000000,falseUp:10000,scale:1},camera:{x:5000000,y:5000000,z:1},follow:true,layers:{trail:true,controls:true,objects:true,routes:true,areas:true},active:null,mode:null,selectMode:null,selected:new Set(),pointer:null,arcOpen:false,stationary:{samples:[],locked:null},lastSolved:null,lastGoodHeading:0,orientation:{alpha:null,beta:0,gamma:0,source:'none'},addressQueue:[],renderDbDirty:true};
function esc(s=''){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function id(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,8)}
function safeDate(v){const d=v instanceof Date?v:new Date(v||Date.now());return Number.isFinite(d.getTime())?d:new Date()}
function ymd(v){const d=safeDate(v);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function weekStart(v){const d=safeDate(v);const n=(d.getDay()+6)%7;d.setDate(d.getDate()-n);d.setHours(0,0,0,0);return d}
function addDays(v,n){const d=safeDate(v);d.setDate(d.getDate()+n);return d}
function weekNo(v){const d=new Date(Date.UTC(safeDate(v).getFullYear(),safeDate(v).getMonth(),safeDate(v).getDate()));d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}
function isoLocal(v){const d=safeDate(v);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}
function recDate(r){return (r.time?.eventAt||r.createdAt||'').slice(0,10)}
function recWeek(r){return ymd(weekStart(recDate(r)))}
function wgsToLocal(lat,lng,alt=0){const o=app.crs.origin,s=app.crs.scale;return{x:app.crs.falseEasting+R*(lng-o.lng)*Math.PI/180*Math.cos(o.lat*Math.PI/180)*s,y:app.crs.falseNorthing+R*(lat-o.lat)*Math.PI/180*s,z:app.crs.falseUp+((alt||0)-(o.alt||0))}}
function localToWgs(x,y,z=app.crs.falseUp){const o=app.crs.origin,s=app.crs.scale;return{lat:o.lat+((y-app.crs.falseNorthing)/(R*s))*180/Math.PI,lng:o.lng+((x-app.crs.falseEasting)/(R*Math.cos(o.lat*Math.PI/180)*s))*180/Math.PI,alt:(z-app.crs.falseUp)+(o.alt||0)}}
function localToScreen(x,y){const r=ui.canvas.getBoundingClientRect();return{x:(x-app.camera.x)*app.camera.z+r.width/2,y:r.height/2-(y-app.camera.y)*app.camera.z}}
function screenToLocal(px,py){const r=ui.canvas.getBoundingClientRect();return{x:app.camera.x+(px-r.width/2)/app.camera.z,y:app.camera.y+(r.height/2-py)/app.camera.z,z:app.crs.falseUp}}
function distanceLocal(a,b){const dx=(b.x-a.x),dy=(b.y-a.y),dz=(b.z||0)-(a.z||0);return Math.sqrt(dx*dx+dy*dy+dz*dz)}
function distanceM(a,b){const rad=x=>x*Math.PI/180;const dlat=rad(b.lat-a.lat),dlng=rad(b.lng-a.lng),q=Math.sin(dlat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dlng/2)**2;return 6371000*2*Math.asin(Math.sqrt(q))}
function bearingWgs(a,b){const φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180,λ=(b.lng-a.lng)*Math.PI/180;const y=Math.sin(λ)*Math.cos(φ2),x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(λ);return (Math.atan2(y,x)*180/Math.PI+360)%360}
function angleLerp(a,b,t){let d=((b-a+540)%360)-180;return (a+d*t+360)%360}
function fmtM(m){if(m<1)return `${Math.round(m*100)} cm`;if(m<1000)return `${m.toFixed(m<10?1:0)} m`;return `${(m/1000).toFixed(1)} km`}
function typePrefix(t){return({point:'01',route:'03',area:'04',control:'07'}[t]||'99')}
function makeCode(t,dt=new Date().toISOString()){const d=safeDate(dt),mm=String(d.getMonth()+1).padStart(2,'0'),yy=String(d.getFullYear()).slice(-2);const n=app.base.filter(r=>r.type===t&&safeDate(r.time?.eventAt).getMonth()===d.getMonth()&&safeDate(r.time?.eventAt).getFullYear()===d.getFullYear()).length+1;return `${typePrefix(t)}-${String(n).padStart(3,'0')}-${mm}-${yy}`}
async function openDb(){return new Promise((res,rej)=>{const q=indexedDB.open(DB_NAME,1);q.onupgradeneeded=e=>{const db=e.target.result;['base','tempGnss','controlPoints','correctionLog','avatarView','mapView','weeklyView','settings'].forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'})})};q.onsuccess=()=>{app.db=q.result;res()};q.onerror=()=>rej(q.error)})}
function store(n,m='readonly'){return app.db.transaction(n,m).objectStore(n)}
function all(n){return new Promise((res,rej)=>{const q=store(n).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error)})}
function put(n,v){if(!app.db)return Promise.resolve(v);return new Promise((res,rej)=>{const q=store(n,'readwrite').put(v);q.onsuccess=()=>res(v);q.onerror=()=>rej(q.error)})}
function del(n,k){return new Promise((res,rej)=>{const q=store(n,'readwrite').delete(k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error)})}
function clearStore(n){return new Promise((res,rej)=>{const q=store(n,'readwrite').clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error)})}
async function loadDb(){app.base=await all('base');app.tempGnss=await all('tempGnss');app.controlPoints=await all('controlPoints');app.correctionLog=await all('correctionLog');const av=(await all('avatarView'))[0];if(av)app.avatarView={...app.avatarView,...av};const s=(await all('settings'))[0];if(s){app.settings={...app.settings,...s.settings};app.crs=s.crs||app.crs;app.camera=s.camera||app.camera}buildViews()}
function solvePosition(raw){const local=raw.rawLocal;let sx=0,sy=0,sz=0,sw=0,used=[];for(const cp of app.controlPoints){const d=Math.max(1,distanceLocal(local,cp.personalLocal||cp.correctedLocal||cp.local));const sigma=Math.max(0.5,cp.sigmaM||cp.sigma||5);const radius=cp.influenceRadius||Math.max(20,80/(cp.confidence||.3));if(d>radius)continue;const w=(cp.confidence||.5)/(sigma*sigma*d*d);const dx=cp.weightedDelta?.dx||cp.delta?.dx||0,dy=cp.weightedDelta?.dy||cp.delta?.dy||0,dz=cp.weightedDelta?.dz||cp.delta?.dz||0;sx+=dx*w;sy+=dy*w;sz+=dz*w;sw+=w;used.push({id:cp.id,w,d,sigma})}

function rejectOutlier(raw){const last=app.tempGnss.at(-1);if(!last)return false;const dt=(new Date(raw.capturedAt)-new Date(last.capturedAt))/1000;if(dt<=0)return true;const d=distanceLocal(raw.rawLocal,last.rawLocal||last.local);const speed=d/dt;return (raw.accuracy&&last.accuracy&&raw.accuracy>Math.max(80,last.accuracy*4))||speed>80||(app.stationary.locked&&d>30)}

function vertexFromLocal(local,source='design'){const w=localToWgs(local.x,local.y,local.z);return{id:id('V'),source,local,correctedLocal:{...local},rawWgs:w,correctedWgs:w,capturedAt:new Date().toISOString()}}
function vertexFromAvatar(){const l=app.avatarView.correctedLocal,w=app.avatarView.correctedWgs||localToWgs(l.x,l.y,l.z);return{id:id('V'),source:'add-avatar',local:{...l},correctedLocal:{...l},rawWgs:app.avatarView.rawWgs||w,correctedWgs:w,capturedAt:new Date().toISOString()}}
function openPointDialog(source,local){const w=localToWgs(local.x,local.y,local.z);ui.recordTitle.textContent=source==='add'?'Add point at avatar':'Design point';ui.recordBody.innerHTML=`<div class="grid2"><label>Name<input id="edName" value="Point"></label><label>Icon<select id="edIcon"><option>✦</option><option>⛪</option><option>🏟️</option><option>⚒️</option><option>🏛️</option><option>✎</option></select></label></div><label>Comment<textarea id="edComment"></textarea></label><div class="grid3"><label>X<input id="edX" type="number" step="any" value="${local.x.toFixed(3)}"></label><label>Y<input id="edY" type="number" step="any" value="${local.y.toFixed(3)}"></label><label>Z<input id="edZ" type="number" step="any" value="${local.z.toFixed(3)}"></label></div><div class="grid2"><label>Event date/time<input id="edAt" type="datetime-local" value="${isoLocal(app.settings.selectedAt)}"></label><label>Address<input id="edAddr" placeholder="auto/optional"></label></div><p class="small muted">WGS preview: ${w.lat.toFixed(6)}, ${w.lng.toFixed(6)}, z ${(w.alt||0).toFixed(1)}</p>`;ui.recordCancel.onclick=()=>ui.dialog.close();ui.recordSave.onclick=async()=>{const l={x:Number($('edX').value),y:Number($('edY').value),z:Number($('edZ').value)},cw=localToWgs(l.x,l.y,l.z),dt=safeDate($('edAt').value).toISOString();const rec={id:id('REC'),code:makeCode('point',dt),type:'point',source,geometryStatus:app.avatarView.confidence>.45?'corrected':'provisional',name:$('edName').value,icon:$('edIcon').value,iconScale:1,comment:$('edComment').value,address:$('edAddr').value||'',local:l,correctedLocal:l,wgs:cw,correctedWgs:cw,time:{eventAt:dt,capturedAt:new Date().toISOString()},createdAt:new Date().toISOString()};app.base.push(rec);await put('base',rec);buildViews();ui.dialog.close();renderAll()};ui.dialog.showModal()}
function startElement(type,source,local=null){if(type==='point'){openPointDialog(source,source==='add'?app.avatarView.correctedLocal:local);return}const v=source==='add'?vertexFromAvatar():vertexFromLocal(local,source);app.active={id:id(type.toUpperCase()),type,source,vertices:[v],eventAt:safeDate(app.settings.selectedAt).toISOString()}}
function finishActive(local=null){if(!app.active)return;const a=app.active;if(local&&(a.source==='design'))a.vertices.push(vertexFromLocal(local,'design-end'));if(a.source==='add')a.vertices.push(vertexFromAvatar());const type=a.type,dt=a.eventAt;const rec={id:id('REC'),code:makeCode(type,dt),type,source:a.source,geometryStatus:app.avatarView.confidence>.45?'corrected':'provisional',[type==='route'?'routeId':'areaId']:a.id,vertices:a.vertices,time:{eventAt:dt,capturedAt:new Date().toISOString()},createdAt:new Date().toISOString(),metrics:type==='route'?metricsRoute(a.vertices):{areaM2:areaM2(a.vertices),vertexCount:a.vertices.length}};app.base.push(rec);put('base',rec);app.active=null;buildViews();renderAll()}
function addVertex(local){if(!app.active)return;if(app.active.source==='add')app.active.vertices.push(vertexFromAvatar());else app.active.vertices.push(vertexFromLocal(local,'design'))}
function sampleActiveFromAvatar(){if(!app.active||app.active.source!=='add')return;const last=app.active.vertices.at(-1);const now=new Date();if(last&&(now-new Date(last.capturedAt))/1000<app.settings.routeInterval)return;const v=vertexFromAvatar();if(!last||distanceLocal(last.correctedLocal,v.correctedLocal)>0.5)app.active.vertices.push(v)}
function setTool(kind,type){closePops();app.mode=kind;app.active=null;if(kind==='add')startElement(type,'add');else app.mode=kind+'-'+type}
async function saveSettings(){await put('settings',{id:'settings',settings:app.settings,crs:app.crs,camera:app.camera})}
function showSelectedDateStep(dir){const m=app.settings.viewMode,d=safeDate(app.settings.selectedAt);if(m==='day')d.setDate(d.getDate()+dir);else if(m==='week')d.setDate(d.getDate()+7*dir);else if(m==='month')d.setMonth(d.getMonth()+dir);else d.setFullYear(d.getFullYear()+dir);app.settings.selectedAt=d.toISOString();buildViews();renderAll()}
async function reverse(lat,lng){if(!navigator.onLine)return'';try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`);if(!r.ok)return'';const j=await r.json();return j.display_name||''}catch{return''}}
async function refreshAddresses(){for(const r of app.base){if(r.type==='point'&&!r.address){const w=r.correctedWgs||r.wgs||localToWgs(r.correctedLocal.x,r.correctedLocal.y,r.correctedLocal.z);r.address=await reverse(w.lat,w.lng);await put('base',r)}}buildViews();renderAll();alert('Address refresh complete where possible.')}
function inRangeRecords(range){const old=app.settings.viewMode;app.settings.viewMode=range;const rows=visibleRecords();app.settings.viewMode=old;return rows}
function exportGeoJSON(range,mode){const rows=inRangeRecords(range);return JSON.stringify({type:'FeatureCollection',metadata:{range,mode,exportedAt:new Date().toISOString()},features:rows.map(r=>featureOf(r,mode))},null,2)}
function featureOf(r,mode){const pointCoord=(l)=>{const w=mode==='historical'?(r.wgs||r.rawWgs||localToWgs(l.x,l.y,l.z)):(r.correctedWgs||localToWgs(l.x,l.y,l.z));return[w.lng,w.lat,w.alt||0]};let geom;if(r.type==='point')geom={type:'Point',coordinates:pointCoord(r.correctedLocal||r.local)};else{const cs=r.vertices.map(v=>{const l=mode==='historical'?(v.local||v.correctedLocal):(v.correctedLocal||v.local);const w=mode==='historical'?(v.rawWgs||v.wgs||localToWgs(l.x,l.y,l.z)):(v.correctedWgs||localToWgs(l.x,l.y,l.z));return[w.lng,w.lat,w.alt||0]});geom={type:r.type==='area'?'Polygon':'LineString',coordinates:r.type==='area'?[cs.concat([cs[0]])]:cs}}return{type:'Feature',geometry:geom,properties:{id:r.id,code:r.code,type:r.type,name:r.name,address:r.address,metrics:r.metrics,time:r.time,mode}}}
function exportKML(range,mode){const gj=JSON.parse(exportGeoJSON(range,mode));return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${gj.features.map(f=>`<Placemark><name>${esc(f.properties.name||f.properties.code||f.properties.id)}</name><description>${esc(f.properties.address||'')}</description>${kmlGeom(f.geometry)}</Placemark>`).join('')}</Document></kml>`}
function kmlGeom(g){if(g.type==='Point')return`<Point><coordinates>${g.coordinates.join(',')}</coordinates></Point>`;const coords=(g.type==='Polygon'?g.coordinates[0]:g.coordinates).map(c=>c.join(',')).join(' ');return g.type==='Polygon'?`<Polygon><outerBoundaryIs><LinearRing><coordinates>${coords}</coordinates></LinearRing></outerBoundaryIs></Polygon>`:`<LineString><coordinates>${coords}</coordinates></LineString>`}
function download(txt,name,type){const a=document.createElement('a'),u=URL.createObjectURL(new Blob([txt],{type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
function renderAll(dbDirty=true){if(dbDirty)buildViews();draw()}
function setup(){window.addEventListener('resize',resize);ui.viewBtn.onclick=()=>clampPopover(ui.viewPop,ui.viewBtn);ui.addBtn.onclick=()=>clampPopover(ui.addPop,ui.addBtn);ui.designBtn.onclick=()=>clampPopover(ui.designPop,ui.designBtn);ui.selectBtn.onclick=()=>clampPopover(ui.selectPop,ui.selectBtn);ui.layersBtn.onclick=()=>clampPopover(ui.layersPop,ui.layersBtn);ui.followBtn.onclick=()=>{app.follow=!app.follow;ui.followBtn.classList.toggle('active',app.follow)};ui.zoomIn.onclick=()=>{app.camera.z*=1.25};ui.zoomOut.onclick=()=>{app.camera.z/=1.25};ui.fit.onclick=fitAll;ui.fitSel.onclick=fitSelected;document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{app.settings.viewMode=b.dataset.view;closePops();buildViews();renderAll()});$('prevDateBtn').onclick=()=>showSelectedDateStep(-1);$('nextDateBtn').onclick=()=>showSelectedDateStep(1);$('todayDateBtn').onclick=()=>{app.settings.selectedAt=new Date().toISOString();buildViews();renderAll()};document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>setTool('add',b.dataset.add));document.querySelectorAll('[data-design]').forEach(b=>b.onclick=()=>setTool('design',b.dataset.design));document.querySelectorAll('[data-select]').forEach(b=>b.onclick=()=>{app.selectMode=b.dataset.select;closePops()});['Trail','Controls','Objects','Routes','Areas'].forEach(n=>{$('layer'+n).onchange=e=>{app.layers[n.toLowerCase()]=e.target.checked;renderAll()}});ui.hub.onclick=e=>{if(e.detail===0)return;toggleArc()};let lp;ui.hub.addEventListener('pointerdown',()=>{lp=setTimeout(()=>setPanel('compass'),650)});ui.hub.addEventListener('pointerup',()=>clearTimeout(lp));ui.hub.addEventListener('contextmenu',e=>{e.preventDefault();setPanel('compass')});ui.arcBase.onclick=()=>setPanel('base');ui.arcWeekly.onclick=()=>setPanel('weekly');ui.arcSettings.onclick=()=>setPanel('settings');ui.panelClose.onclick=()=>ui.panel.classList.remove('open');document.querySelectorAll('[data-panel]').forEach(b=>b.onclick=()=>setPanel(b.dataset.panel));ui.canvas.addEventListener('pointerdown',canvasDown);ui.canvas.addEventListener('pointermove',canvasMove);ui.canvas.addEventListener('pointerup',canvasUp);ui.canvas.addEventListener('contextmenu',e=>{e.preventDefault();if(app.active)finishActive(screenToLocal(e.offsetX,e.offsetY))});document.addEventListener('click',e=>{if(!e.target.closest('.popover')&&!e.target.closest('#bottomToolbar'))closePops();if(ui.panel.classList.contains('open')&&e.target===ui.canvas)ui.panel.classList.remove('open')});document.addEventListener('click',e=>{const cell=e.target.closest('.expandCell');if(cell)cell.classList.toggle('open')});window.addEventListener('deviceorientation',e=>{app.orientation={alpha:e.alpha,beta:e.beta||0,gamma:e.gamma||0,source:'deviceorientation'};if(e.alpha!==null){app.avatarView.heading=computeHeading({heading:null,speed:0},app.avatarView.correctedLocal)}});window.addEventListener('pagehide',saveSettings)}
function toggleArc(){app.arcOpen=!app.arcOpen;document.querySelectorAll('.arcIcon').forEach(b=>b.classList.toggle('open',app.arcOpen))}
function canvasDown(e){ui.canvas.setPointerCapture(e.pointerId);app.pointer={x:e.clientX,y:e.clientY,lastX:e.clientX,lastY:e.clientY,drag:false}}
function canvasMove(e){const p=app.pointer;if(!p)return;const dx=e.clientX-p.lastX,dy=e.clientY-p.lastY;if(Math.hypot(e.clientX-p.x,e.clientY-p.y)>6)p.drag=true;if(p.drag&&!app.selectMode){app.follow=false;ui.followBtn.classList.remove('active');app.camera.x-=dx/app.camera.z;app.camera.y+=dy/app.camera.z}p.lastX=e.clientX;p.lastY=e.clientY}
function canvasUp(e){const p=app.pointer;if(!p)return;const r=ui.canvas.getBoundingClientRect(),l=screenToLocal(e.clientX-r.left,e.clientY-r.top);if(!p.drag){if(app.mode==='design-point'){openPointDialog('design',l);app.mode=null}else if(app.mode==='design-route'||app.mode==='design-area'){const t=app.mode.split('-')[1];if(!app.active)startElement(t,'design',l);else addVertex(l)}else if(app.selectMode==='one'){selectNearest(l)}else if(app.active&&app.active.source==='design')addVertex(l)}app.pointer=null}
function selectNearest(l){let best=null,bd=1e9;for(const r of app.base){const ll=r.correctedLocal||r.local||r.vertices?.[0]?.correctedLocal;if(!ll)continue;const d=distanceLocal(l,ll);if(d<bd){bd=d;best=r}}if(best&&bd<30/app.camera.z){app.selected.clear();app.selected.add(best.id);setPanel('weekly')}}
function fitAll(){const pts=[];visibleRecords().forEach(r=>{if(r.type==='point')pts.push(r.correctedLocal||r.local);else r.vertices.forEach(v=>pts.push(v.correctedLocal||v.local))});pts.push(app.avatarView.correctedLocal);fitPts(pts)}
function fitSelected(){const pts=[...app.selected].map(id=>app.base.find(r=>r.id===id)).filter(Boolean).flatMap(r=>r.type==='point'?[r.correctedLocal||r.local]:r.vertices.map(v=>v.correctedLocal||v.local));fitPts(pts.length?pts:[app.avatarView.correctedLocal])}
function fitPts(pts){if(!pts.length)return;const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),r=ui.canvas.getBoundingClientRect();const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);app.camera.x=(minX+maxX)/2;app.camera.y=(minY+maxY)/2;app.camera.z=Math.max(.002,Math.min(20,Math.min((r.width-100)/Math.max(1,maxX-minX),(r.height-160)/Math.max(1,maxY-minY))))}
async function boot(){resize();setup();draw();renderLoop();try{await openDb();await loadDb()}catch(e){console.warn('DB startup failed, fallback active',e)}resize();startGpsLoop()}
boot().catch(e=>alert('Startup error: '+(e.message||e)));
</script>
