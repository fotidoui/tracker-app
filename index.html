<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.css"></script>

<style>
body {
  margin:0;
  font-family: system-ui, Arial;
  background:#eef2f6;
}

/* ===== WEEK SELECT ===== */
#weekSelect {
  padding:20px;
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:10px;
}

.weekBox {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.weekBox:hover {
  background:#e0ecff;
}

/* ===== APP ===== */
#app {
  display:none;
}

/* TOP NAV */
#tabs {
  display:flex;
  background:#111827;
}

#tabs button {
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:#cbd5e1;
  cursor:pointer;
}

#tabs button.active {
  background:#1f2937;
  color:white;
}

/* CONTENT */
#content {
  padding:15px;
}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

/* TABLE */
table {
  width:100%;
  border-collapse: collapse;
}

td, th {
  border:1px solid #e5e7eb;
  padding:6px;
}

th {
  background:#f1f5f9;
}

/* INPUTS */
input, textarea {
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #d1d5db;
}

textarea {
  min-height:60px;
}

/* MAP */
#map {
  height:400px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- ===== WEEK SELECT ===== -->
<div id="weekSelect"></div>

<!-- ===== APP ===== -->
<div id="app">

<!-- TABS -->
<div id="tabs">
  <button onclick="showTab('weekly')" id="t-weekly">Weekly</button>
  <button onclick="showTab('routes')" id="t-routes">Routes</button>
  <button onclick="showTab('map')" id="t-map">Map</button>
</div>

<div id="content">

<!-- WEEKLY -->
<div id="weekly"></div>

<!-- ROUTES -->
<div id="routes" style="display:none">
  <div class="card">
    <h3>Routes</h3>
    <button onclick="startRoute()">Start</button>
    <button onclick="pauseRoute()">Pause</button>
    <button onclick="resumeRoute()">Resume</button>
    <button onclick="stopRoute()">Stop</button>
    <p id="gpsStatus"></p>
  </div>
</div>

<!-- MAP -->
<div id="mapTab" style="display:none">
  <div class="card">
    <h3>Map</h3>
    <div id="map"></div>
  </div>
</div>

</div>
</div>

<script>

// ================= STATE =================
let weekData = JSON.parse(localStorage.getItem("weekData")||"{}");
let habits = JSON.parse(localStorage.getItem("habits")||"[]");

// FORCE 8 HABITS ALWAYS
habits = Array.from({length:8}, (_,i)=>habits[i]||"Habit "+(i+1));

let selectedWeek = null;
let currentTab = "weekly";

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ================= INIT =================
renderWeekSelector();

// ================= WEEK SELECT =================
function renderWeekSelector(){

  let container = document.getElementById("weekSelect");
  container.innerHTML = "<h2 style='grid-column:1/-1'>Select Week</h2>";

  for(let i=1;i<=52;i++){

    let date = new Date(2026,0,1+(i-1)*7);
    let month = date.toLocaleString('default',{month:'short'});

    let div = document.createElement("div");
    div.className="weekBox";
    div.innerHTML=`<b>Week ${i}</b><br>${month}`;

    div.onclick=()=>{
      selectedWeek=i;
      ensureWeek();
      openApp();
    };

    container.appendChild(div);
  }
}

// ================= OPEN APP =================
function openApp(){
  document.getElementById("weekSelect").style.display="none";
  document.getElementById("app").style.display="block";
  renderWeekly();
}

// ================= WEEK INIT =================
function ensureWeek(){
  if(!weekData[selectedWeek]){
    weekData[selectedWeek]={
      checks:Array(8).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

// ================= NAV =================
function showTab(tab){

  currentTab=tab;

  ["weekly","routes","mapTab"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });

  document.getElementById(tab==="map"?"mapTab":tab).style.display="block";

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("t-"+tab).classList.add("active");

  if(tab==="weekly") renderWeekly();
  if(tab==="map") initMap();
}

// ================= WEEKLY =================
function renderWeekly(){

  let w = weekData[selectedWeek];

  let html = `<div class="card"><h3>Week ${selectedWeek}</h3></div>`;

  // HABITS
  html += `<div class="card"><h3>Habits</h3>`;

  habits.forEach((h,i)=>{
    html += `<b>${h}</b><br>`;
    for(let j=0;j<7;j++){
      html += `
        <label>
          <input type="checkbox"
          ${w.checks[i][j]?"checked":""}
          onchange="toggle(${i},${j})">
          ${days[j]}
        </label>
      `;
    }
    html += "<br><br>";
  });

  html += `</div>`;

  // NOTES (FIXED)
  html += `<div class="card"><h3>Notes per day</h3>`;

  w.notes.forEach((n,i)=>{
    html += `
      <b>${days[i]}</b>
      <textarea onchange="setNote(${i},this.value)">${n}</textarea>
    `;
  });

  html += `</div>`;

  document.getElementById("weekly").innerHTML = html;
}

// ================= NOTES =================
function setNote(i,val){
  weekData[selectedWeek].notes[i]=val;
  save();
}

// ================= HABITS =================
function toggle(i,j){
  let w=weekData[selectedWeek];
  w.checks[i][j]=!w.checks[i][j];
  save();
}

// ================= ROUTES =================
let session=null;

function startRoute(){
  session={segments:[[]],paused:false};
  navigator.geolocation.watchPosition(p=>{
    if(session.paused) return;
    session.segments.at(-1).push({lat:p.coords.latitude,lng:p.coords.longitude});
  });
}

function pauseRoute(){
  session.paused=true;
  session.segments.push([]);
}

function resumeRoute(){
  session.paused=false;
}

function stopRoute(){
  navigator.geolocation.clearWatch();

  let day=(new Date().getDay()+6)%7;

  let route={segments:[],totalKm:0};

  session.segments.forEach(s=>{
    if(s.length<2) return;
    let km=calc(s);
    route.segments.push({km,coords:s});
    route.totalKm+=km;
  });

  weekData[selectedWeek].routes[day].push(route);
  save();
}

// ================= MAP =================
let map,layer;

function initMap(){
  if(map) return;

  map=L.map('map').setView([52.1,5.3],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// ================= SAVE =================
function save(){
  localStorage.setItem("weekData",JSON.stringify(weekData));
  localStorage.setItem("habits",JSON.stringify(habits));
}

// ================= DIST =================
function calc(r){
  let t=0;
  for(let i=1;i<r.length;i++){
    let a=r[i-1],b=r[i];
    t+=Math.hypot(b.lat-a.lat,b.lng-a.lng)*111;
  }
  return t;
}

</script>

</body>
</html>
