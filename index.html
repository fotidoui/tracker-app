<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; }

    .screen { display:none; }

    table {
      margin:15px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:5px;
      font-size:12px;
      vertical-align: top;
    }

    textarea { width:95%; height:40px; }

    button { margin:3px; padding:6px; }

    .eventBox {
      border-top:1px solid #ddd;
      margin-top:5px;
      font-size:10px;
      text-align:left;
    }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<!-- HOME -->
<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<!-- WEEKLY -->
<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>
  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <p id="gpsStatus"></p>

  <table id="grid"></table>
</div>

<!-- DATABASE -->
<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

let weekData = {};
let habits = [];
let events = [];
let currentWeek = null;

let lastPos = null;
let watchId = null;

let routeSession = {
  active:false,
  id:null
};

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="db") renderDB();
}

// ===== INIT =====
window.onload = () => {

  weekData = JSON.parse(localStorage.getItem("weekData")) || {};
  habits = JSON.parse(localStorage.getItem("habits")) || [];
  events = JSON.parse(localStorage.getItem("events")) || [];

  if(habits.length === 0){
    habits = Array(10).fill("").map((_,i)=>"Habit "+(i+1));
  }

  startGPS();
  show("home");
};

// ===== GPS =====
function startGPS(){

  if(!navigator.geolocation) return;

  watchId = navigator.geolocation.watchPosition(pos=>{
    lastPos = {
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    };

    document.getElementById("gpsStatus").innerText = "GPS active";

  }, ()=>{}, {
    enableHighAccuracy:false,
    maximumAge:10000,
    timeout:5000
  });
}

// ===== WEEK =====
document.getElementById("weekInput").addEventListener("change", e=>{
  currentWeek = Number(e.target.value);

  renderWeek();
});

// ===== DATE CALC =====
function getWeekDates(week){

  let year = new Date().getFullYear();
  let simple = new Date(year,0,1 + (week-1)*7);

  let dow = simple.getDay();
  let ISOweekStart = simple;

  if(dow <= 4)
    ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
  else
    ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());

  let dates=[];

  for(let i=0;i<7;i++){
    let d = new Date(ISOweekStart);
    d.setDate(d.getDate()+i);
    dates.push(d);
  }

  return dates;
}

// ===== SAVE =====
function save(){
  localStorage.setItem("events", JSON.stringify(events));
  localStorage.setItem("habits", JSON.stringify(habits));
}

// ===== EVENT =====
function recordEvent(type, extra={}){

  let day = (new Date().getDay()+6)%7;

  events.push({
    type,
    timestamp:Date.now(),
    lat:lastPos?.lat || null,
    lng:lastPos?.lng || null,
    week:currentWeek,
    day,
    routeId:routeSession.id,
    ...extra
  });

  save();
}

// ===== ROUTES =====
function startRoute(){
  routeSession = {active:true,id:Date.now()};
  recordEvent("route-start");
}
function pauseRoute(){ recordEvent("route-pause"); }
function resumeRoute(){ recordEvent("route-resume"); }
function stopRoute(){ recordEvent("route-end"); routeSession.active=false; }

// ===== RENDER =====
function renderWeek(){

  if(!currentWeek) return;

  let dates = getWeekDates(currentWeek);

  let table = document.getElementById("grid");
  table.innerHTML="";

  let header=document.createElement("tr");
  header.appendChild(document.createElement("th"));

  dates.forEach((d,i)=>{
    let th=document.createElement("th");
    th.innerText = days[i] + " " + d.getDate();
    header.appendChild(th);
  });

  table.appendChild(header);

  // HABITS
  for(let i=0;i<10;i++){

    let row=document.createElement("tr");

    let name=document.createElement("td");
    let inp=document.createElement("input");
    inp.value=habits[i];

    inp.onchange=()=>{
      habits[i]=inp.value;
      save();
    };

    name.appendChild(inp);
    row.appendChild(name);

    for(let d=0;d<7;d++){

      let td=document.createElement("td");

      let evs = events.filter(e =>
        e.type==="habit" &&
        e.week===currentWeek &&
        e.day===d &&
        e.habitIndex===i
      );

      let cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked = evs.length>0;

      cb.onclick=()=>{
        recordEvent("habit",{habitIndex:i});
        renderWeek();
      };

      td.appendChild(cb);

      evs.forEach(ev=>{
        let div=document.createElement("div");
        div.className="eventBox";

        div.innerText =
          new Date(ev.timestamp).toLocaleTimeString() +
          " | " +
          (ev.lat ? ev.lat.toFixed(3)+","+ev.lng.toFixed(3) : "noGPS");

        let del=document.createElement("button");
        del.innerText="X";
        del.onclick=()=>{
          if(confirm("Delete?")){
            events.splice(events.indexOf(ev),1);
            save();
            renderWeek();
          }
        };

        div.appendChild(del);
        td.appendChild(div);
      });

      row.appendChild(td);
    }

    table.appendChild(row);
  }

  // NOTES
  let row=document.createElement("tr");
  row.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let d=0;d<7;d++){

    let td=document.createElement("td");

    let ta=document.createElement("textarea");

    let btn=document.createElement("button");
    btn.innerText="✔";

    btn.onclick=()=>{
      recordEvent("note",{text:ta.value});
      ta.value="";
      renderWeek();
    };

    td.appendChild(ta);
    td.appendChild(btn);

    let evs = events.filter(e =>
      e.type==="note" &&
      e.week===currentWeek &&
      e.day===d
    );

    evs.forEach(ev=>{
      let div=document.createElement("div");
      div.className="eventBox";

      div.innerText =
        ev.text + " | " +
        new Date(ev.timestamp).toLocaleTimeString();

      let del=document.createElement("button");
      del.innerText="X";
      del.onclick=()=>{
        if(confirm("Delete?")){
          events.splice(events.indexOf(ev),1);
          save();
          renderWeek();
        }
      };

      div.appendChild(del);
      td.appendChild(div);
    });

    row.appendChild(td);
  }

  table.appendChild(row);
}

// ===== DATABASE =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  events.forEach(ev=>{

    let box=document.createElement("div");
    box.style.border="1px solid #ccc";
    box.style.margin="5px";
    box.style.padding="5px";

    box.innerHTML = `
      <b>${ev.type}</b><br>
      Week: ${ev.week} | Day: ${days[ev.day]}<br>
      Time: ${new Date(ev.timestamp).toLocaleString()}<br>
      GPS: ${ev.lat ? ev.lat.toFixed(5)+", "+ev.lng.toFixed(5) : "No GPS"}<br>
      Route: ${ev.routeId || "-"}<br>
      ${ev.text ? "Note: "+ev.text : ""}
    `;

    div.appendChild(box);
  });
}

</script>

</body>
</html>
