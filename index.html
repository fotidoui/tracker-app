<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Tracker Restored</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; text-align:center; }
.screen { display:none; }

#map { height:260px; width:100%; border:1px solid #ccc; }

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ccc; font-size:12px; padding:4px; }

.event { font-size:11px; border-bottom:1px solid #eee; padding:3px; }
textarea { width:90%; height:40px; }
</style>
</head>

<body>

<h2>GIS Tracker Restored</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('map')">Map</button>
  <button onclick="show('db')">Database</button>
</div>

<!-- WEEKLY -->
<div id="weekly" class="screen">

  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeek()">Save Week</button>

  <div id="weeklyTable"></div>
</div>

<!-- MAP -->
<div id="mapScreen" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="map"></div>
</div>

<!-- DB -->
<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbView"></div>
</div>

<script>

// ================= STATE =================
let events = JSON.parse(localStorage.getItem("events") || "[]");
let database = JSON.parse(localStorage.getItem("database") || "[]");

let week = null;
let route = null;
let watch = null;

let map, layer;

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ================= INIT =================
window.onload = () => {

  document.getElementById("weekInput").onchange = e=>{
    week = Number(e.target.value);
    renderAll();
  };

  show("home");
};

// ================= SAVE =================
function save(){
  localStorage.setItem("events",JSON.stringify(events));
  localStorage.setItem("database",JSON.stringify(database));
}

// ================= NAV =================
function show(id){

  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");

  if(id==="map"){
    document.getElementById("mapScreen").style.display="block";
    initMap();
    renderMap();
    return;
  }

  document.getElementById(id).style.display="block";
  renderAll();
}

// ================= ROUTE =================
function startRoute(){

  route = {id:Date.now(),active:true,last:null};

  watch = navigator.geolocation.watchPosition(p=>{

    if(!route.active) return;

    let pt = {
      lat:p.coords.latitude,
      lng:p.coords.longitude,
      time:Date.now()
    };

    events.push({
      id:Date.now()+Math.random(),
      type:"route-point",
      week,
      routeId:route.id,
      lat:pt.lat,
      lng:pt.lng
    });

    save();
    renderAll();
  });
}

function pauseRoute(){ if(route) route.active=false; }
function resumeRoute(){ if(route) route.active=true; }

function stopRoute(){
  navigator.geolocation.clearWatch(watch);
  route=null;
}

// ================= WEEKLY TABLE =================
function renderWeekly(){

  let div=document.getElementById("weeklyTable");
  div.innerHTML="";

  if(!week) return;

  let table=document.createElement("table");

  let header="<th>Type</th>"+days.map(d=>`<th>${d}</th>`).join("");
  table.innerHTML="<tr>"+header+"</tr>";

  let evs = events.filter(e=>e.week===week);

  evs.forEach(e=>{
    let row=document.createElement("tr");

    row.innerHTML = `
      <td>${e.type}</td>
      <td colspan="7">${e.lat||""}, ${e.lng||""}</td>
    `;

    table.appendChild(row);
  });

  div.appendChild(table);
}

// ================= SAVE WEEK (FIXED - NO DUPLICATES) =================
function saveWeek(){

  if(!week) return;

  database = database.filter(w=>w.week!==week);

  database.push({
    week,
    data:JSON.parse(JSON.stringify(events.filter(e=>e.week===week)))
  });

  save();
  alert("Week saved (deduplicated)");
}

// ================= MAP =================
function initMap(){

  if(map) return;

  map = L.map("map").setView([52,5],7);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
    .addTo(map);

  layer = L.layerGroup().addTo(map);
}

function renderMap(){

  if(!map || !week) return;

  layer.clearLayers();

  let pts = events.filter(e=>e.week===week && e.lat);

  let routes = {};

  pts.forEach(p=>{
    if(!routes[p.routeId]) routes[p.routeId]=[];
    routes[p.routeId].push([p.lat,p.lng]);
  });

  Object.values(routes).forEach(r=>{
    if(r.length>1)
      L.polyline(r,{color:"blue"}).addTo(layer);
  });

  pts.forEach(p=>{
    L.circleMarker([p.lat,p.lng]).addTo(layer);
  });
}

// ================= DB =================
function renderDB(){

  let div=document.getElementById("dbView");
  div.innerHTML="";

  database.forEach(w=>{
    div.innerHTML += `<h3>Week ${w.week}</h3>`;
    div.innerHTML += `<div>Events: ${w.data.length}</div>`;
  });
}

// ================= MASTER =================
function renderAll(){
  renderWeekly();
  renderDB();
  renderMap();
}

</script>
</body>
</html>
