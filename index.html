<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    .screen { display:none; }

    table { margin:10px auto; border-collapse: collapse; width:100%; }
    td, th { border:1px solid #ccc; padding:5px; font-size:12px; }

    textarea { width:95%; height:40px; }

    #map, #vectorCanvas {
      width:100%;
      height:260px;
      margin:10px 0;
      border:1px solid #ccc;
    }

    .eventBox { font-size:11px; border-bottom:1px solid #ddd; padding:3px; }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeekToDB()">💾 Save Week</button>

  <br>
  <button onclick="setMode('map')">Map</button>
  <button onclick="setMode('vector')">Vector</button>

  <div id="map"></div>
  <canvas id="vectorCanvas"></canvas>

  <table id="grid"></table>

  <div id="eventLog"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

// ===== STATE =====
let habits = JSON.parse(localStorage.getItem("habits")) ||
  Array.from({length:10},(_,i)=>"Habit "+(i+1));

let liveEvents = JSON.parse(localStorage.getItem("liveEvents")) || [];
let database = JSON.parse(localStorage.getItem("database")) || [];

let currentWeek = null;
let selectedDay = null;
let mode = "map";

let routeSession = {active:false, paused:false, id:null};
let watchId = null;

let map, layer;

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== INIT =====
window.onload = ()=>{
  document.getElementById("weekInput").onchange = e=>{
    currentWeek = Number(e.target.value);
    renderAll();
  };

  setMode("map"); // FIX double view bug
  show("home");
};

// ===== CORE RENDER =====
function renderAll(){
  renderWeek();
  updateMap();
  drawVectors();
  renderEventLog();
}

// ===== STORAGE =====
function save(){
  localStorage.setItem("liveEvents",JSON.stringify(liveEvents));
  localStorage.setItem("database",JSON.stringify(database));
  localStorage.setItem("habits",JSON.stringify(habits));
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") setTimeout(initMap,100);
  if(id==="db") renderDB();
}

// ===== MODE =====
function setMode(m){
  mode = m;
  document.getElementById("map").style.display = m==="map"?"block":"none";
  document.getElementById("vectorCanvas").style.display = m==="vector"?"block":"none";
}

// ===== MAP =====
function initMap(){
  if(map) return;

  map = L.map('map').setView([52,5],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  layer = L.layerGroup().addTo(map);
}

function updateMap(){
  if(mode!=="map" || !map || !currentWeek) return;

  layer.clearLayers();

  let evs = liveEvents.filter(e=>e.week===currentWeek && e.lat);

  let routes={};

  evs.forEach(e=>{
    if(e.routeId){
      if(!routes[e.routeId]) routes[e.routeId]=[];
      routes[e.routeId].push([e.lat,e.lng]);
    }
  });

  Object.values(routes).forEach(r=>{
    if(r.length>1) L.polyline(r,{color:"blue"}).addTo(layer);
  });

  evs.forEach(e=>{
    let m=L.circleMarker([e.lat,e.lng],{radius:4}).addTo(layer);
    m.bindPopup(JSON.stringify(e,null,1));
  });
}

// ===== VECTOR =====
function drawVectors(){
  if(mode!=="vector" || !currentWeek) return;

  let c=document.getElementById("vectorCanvas");
  c.width=c.offsetWidth;
  c.height=260;

  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  let evs=liveEvents.filter(e=>e.week===currentWeek && e.lat);
  if(evs.length<2) return;

  let minLat=Math.min(...evs.map(e=>e.lat));
  let maxLat=Math.max(...evs.map(e=>e.lat));
  let minLng=Math.min(...evs.map(e=>e.lng));
  let maxLng=Math.max(...evs.map(e=>e.lng));

  function proj(e){
    return [
      (e.lng-minLng)/(maxLng-minLng)*c.width,
      c.height-(e.lat-minLat)/(maxLat-minLat)*c.height
    ];
  }

  ctx.beginPath();
  evs.forEach((e,i)=>{
    let [x,y]=proj(e);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.stroke();
}

// ===== EVENT PIPELINE =====
function addEvent(ev){
  liveEvents.push(ev);
  save();
  renderAll();
}

function record(type, extra={}){

  if(!Number.isFinite(currentWeek)){
    alert("Set week");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    addEvent({
      type,
      time:Date.now(),
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      week:Number(currentWeek),
      day:selectedDay ?? (new Date().getDay()+6)%7,
      routeId:routeSession.id,
      ...extra
    });
  });
}

// ===== ROUTES =====
function startRoute(){
  routeSession={active:true,paused:false,id:Date.now()};
  record("route-start");

  watchId = navigator.geolocation.watchPosition(pos=>{
    if(routeSession.active && !routeSession.paused){
      addEvent({
        type:"route-point",
        time:Date.now(),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        week:Number(currentWeek),
        day:selectedDay ?? 0,
        routeId:routeSession.id
      });
    }
  });
}

function pauseRoute(){ routeSession.paused=true; record("route-pause"); }
function resumeRoute(){ routeSession.paused=false; record("route-resume"); }

function stopRoute(){
  navigator.geolocation.clearWatch(watchId);
  record("route-end");
  routeSession={active:false,paused:false,id:null};
}

// ===== WEEK =====
function renderWeek(){

  let table=document.getElementById("grid");
  table.innerHTML="";

  let h=document.createElement("tr");
  h.appendChild(document.createElement("th"));

  days.forEach((d,i)=>{
    let th=document.createElement("th");
    th.innerText=d;
    th.onclick=()=>selectedDay=i;
    h.appendChild(th);
  });

  table.appendChild(h);

  for(let i=0;i<10;i++){

    let r=document.createElement("tr");

    let td=document.createElement("td");

    let input=document.createElement("input");
    input.value=habits[i];

    input.onchange=()=>{
      habits[i]=input.value;
      save();
    };

    td.appendChild(input);
    r.appendChild(td);

    for(let d=0;d<7;d++){
      let cell=document.createElement("td");

      let btn=document.createElement("button");
      btn.innerText="+";
      btn.onclick=()=>{selectedDay=d;record("habit",{habitIndex:i});};

      cell.appendChild(btn);
      r.appendChild(cell);
    }

    table.appendChild(r);
  }

  // NOTES
  let r=document.createElement("tr");
  r.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let d=0;d<7;d++){
    let td=document.createElement("td");

    let ta=document.createElement("textarea");
    let btn=document.createElement("button");

    btn.innerText="✔";
    btn.onclick=()=>{
      if(!ta.value.trim()) return;
      selectedDay=d;
      record("note",{text:ta.value});
      ta.value="";
    };

    td.appendChild(ta);
    td.appendChild(btn);
    r.appendChild(td);
  }

  table.appendChild(r);
}

// ===== EVENTS =====
function renderEventLog(){

  let div=document.getElementById("eventLog");
  div.innerHTML="<h3>Events</h3>";

  let evs = liveEvents.filter(e=>e.week===currentWeek);

  evs.forEach(ev=>{
    let row=document.createElement("div");
    row.className="eventBox";

    row.innerText =
      `${days[ev.day]} | ${ev.type} | ${new Date(ev.time).toLocaleString()}
Lat:${ev.lat} Lng:${ev.lng}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      liveEvents.splice(liveEvents.indexOf(ev),1);
      save();
      renderAll();
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}

// ===== DATABASE =====
function saveWeekToDB(){

  if(!Number.isFinite(currentWeek)) return;

  database = database.filter(w=>Number(w.week)!==currentWeek);

  database.push({
    week:Number(currentWeek),
    data:JSON.parse(JSON.stringify(
      liveEvents.filter(e=>e.week===currentWeek)
    ))
  });

  save();
}

function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  database.forEach(w=>{
    div.append("Week "+w.week);

    let table=document.createElement("table");

    w.data.forEach(e=>{
      let tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${e.type}</td>
        <td>${e.day}</td>
        <td>${e.lat||""}</td>
        <td>${e.lng||""}</td>
        <td>${e.text||""}</td>
      `;
      table.appendChild(tr);
    });

    div.appendChild(table);
  });
}

</script>

</body>
</html>
