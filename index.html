<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker App</title>

<style>
body { font-family: Arial; text-align:center; }

.screen { display:none; }

table {
  margin:10px auto;
  border-collapse: collapse;
  width:100%;
}

td, th {
  border:1px solid #ccc;
  padding:5px;
}

textarea { width:100%; height:50px; }
button { margin:5px; padding:10px; }

</style>
</head>
<body>

<h2>Tracker App</h2>

<!-- NAV -->
<div>
<button onclick="show('weekly')">Weekly</button>
<button onclick="show('routes')">Routes</button>
<button onclick="show('db')">Database</button>
</div>

<!-- WEEKLY -->
<div id="weekly" class="screen">
<input id="weekInput" type="number" placeholder="Week" value="1">
<table id="grid"></table>
</div>

<!-- ROUTES -->
<div id="routes" class="screen">
<button onclick="startRoute()">Start</button>
<button onclick="pauseRoute()">Pause</button>
<button onclick="resumeRoute()">Resume</button>
<button onclick="stopRoute()">Stop</button>
<p id="gpsStatus"></p>
</div>

<!-- DATABASE -->
<div id="db" class="screen">
<button onclick="exportData()">Export</button>
<input type="file" onchange="importData(event)">
<div id="dbContent"></div>
</div>

<script>

// ===== STATE =====
let weekData = JSON.parse(localStorage.getItem("weekData")||"{}");
let habits = JSON.parse(localStorage.getItem("habits")||"null") 
  || Array(5).fill("").map((_,i)=>"Habit "+(i+1));

let currentWeek = 1;

// ROUTE SESSION
let session = null;
let watchId = null;

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== INIT =====
window.onload = () => {
  document.getElementById("weekInput").value = currentWeek;
  ensureWeek();
  render();
  show("weekly");
};

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  if(id==="db") renderDB();
}

// ===== WEEK =====
document.getElementById("weekInput").onchange = function(){
  currentWeek = Number(this.value)||1;
  ensureWeek();
  render();
};

function ensureWeek(){
  if(!weekData[currentWeek]){
    weekData[currentWeek] = {
      checks:Array(habits.length).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

// ===== RENDER WEEK =====
function render(){

  let table = document.getElementById("grid");
  table.innerHTML = "";

  let w = weekData[currentWeek];

  // HEADER
  let tr = document.createElement("tr");
  tr.appendChild(document.createElement("th"));

  days.forEach(d=>{
    let th=document.createElement("th");
    th.innerText=d;
    tr.appendChild(th);
  });
  table.appendChild(tr);

  // ROUTES ROW
  let rrow=document.createElement("tr");
  rrow.appendChild(Object.assign(document.createElement("td"),{innerText:"KM"}));

  for(let j=0;j<7;j++){
    let total = w.routes[j].reduce((s,r)=>s+r.totalKm,0);
    let td=document.createElement("td");
    td.innerText=total.toFixed(1);
    rrow.appendChild(td);
  }
  table.appendChild(rrow);

  // HABITS
  habits.forEach((h,i)=>{
    let row=document.createElement("tr");

    let name=document.createElement("td");
    let input=document.createElement("input");
    input.value=h;

    input.onchange=()=>{
      habits[i]=input.value;
      saveAll();
    };

    name.appendChild(input);
    row.appendChild(name);

    for(let j=0;j<7;j++){
      let td=document.createElement("td");
      let cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=w.checks[i][j];

      cb.onchange=()=>{
        w.checks[i][j]=cb.checked;
        saveAll();
      };

      td.appendChild(cb);
      row.appendChild(td);
    }

    table.appendChild(row);
  });

  // NOTES
  let nrow=document.createElement("tr");
  nrow.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let j=0;j<7;j++){
    let td=document.createElement("td");
    let t=document.createElement("textarea");
    t.value=w.notes[j];

    t.onchange=()=>{
      w.notes[j]=t.value;
      saveAll();
    };

    td.appendChild(t);
    nrow.appendChild(td);
  }

  table.appendChild(nrow);
}

// ===== ROUTES =====
function startRoute(){

  ensureWeek();

  session = {
    active:true,
    paused:false,
    segments:[[]]
  };

  watchId = navigator.geolocation.watchPosition(pos=>{
    if(!session.active || session.paused) return;

    let p={lat:pos.coords.latitude,lng:pos.coords.longitude};
    session.segments[session.segments.length-1].push(p);

    document.getElementById("gpsStatus").innerText=
      "Tracking points: "+session.segments.flat().length;

  }, err=>{
    document.getElementById("gpsStatus").innerText=err.message;
  }, {enableHighAccuracy:true});
}

function pauseRoute(){
  if(!session) return;
  session.paused=true;
  session.segments.push([]);
}

function resumeRoute(){
  if(!session) return;
  session.paused=false;
}

async function stopRoute(){

  if(!session) return;

  session.active=false;
  navigator.geolocation.clearWatch(watchId);

  let day=(new Date().getDay()+6)%7;

  let route={segments:[], totalKm:0};

  for(let seg of session.segments){

    if(seg.length<2) continue;

    let km = calc(seg);

    let start = await getAddr(seg[0]);
    let end = await getAddr(seg[seg.length-1]);

    route.segments.push({km,start,end});
    route.totalKm+=km;
  }

  weekData[currentWeek].routes[day].push(route);

  saveAll();
  render();

  alert("Route saved");
}

// ===== DISTANCE =====
function calc(r){
  let t=0;
  for(let i=1;i<r.length;i++) t+=dist(r[i-1],r[i]);
  return t;
}

function dist(a,b){
  let R=6371;
  let dLat=(b.lat-a.lat)*Math.PI/180;
  let dLon=(b.lng-a.lng)*Math.PI/180;

  let x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== ADDRESS =====
async function getAddr(c){
  try{
    let r=await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.lat}&lon=${c.lng}`
    );
    let d=await r.json();
    return d.display_name || "Unknown";
  }catch{
    return "Unknown";
  }
}

// ===== DATABASE =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  for(let w in weekData){

    let block=document.createElement("div");
    block.innerHTML="<h3>Week "+w+"</h3>";

    weekData[w].routes.forEach((day,i)=>{
      block.innerHTML+="<b>"+days[i]+"</b><br>";

      day.forEach(r=>{
        block.innerHTML+="Total "+r.totalKm.toFixed(2)+" km<br>";
        r.segments.forEach(s=>{
          block.innerHTML+=s.start+" → "+s.end+" ("+s.km.toFixed(2)+" km)<br>";
        });
        block.innerHTML+="<br>";
      });
    });

    div.appendChild(block);
  }
}

// ===== SAVE =====
function saveAll(){
  localStorage.setItem("weekData",JSON.stringify(weekData));
  localStorage.setItem("habits",JSON.stringify(habits));
}

// ===== EXPORT =====
function exportData(){
  let data=JSON.stringify(weekData);
  let blob=new Blob([data],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tracker_backup.json";
  a.click();
}

// ===== IMPORT =====
function importData(e){
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=()=>{
    weekData=JSON.parse(reader.result);
    saveAll();
    render();
  };

  reader.readAsText(file);
}

</script>
</body>
</html>
