<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    .screen { display:none; }

    table { margin:10px auto; border-collapse: collapse; width:100%; }
    td, th { border:1px solid #ccc; padding:5px; font-size:12px; }

    textarea { width:95%; height:40px; }

    #map { height:250px; margin:10px; }
    #vectorCanvas { border:1px solid #ccc; margin:10px; }

    .eventBox { font-size:10px; border-top:1px solid #ddd; }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveWeekToDB()">💾 Save</button>

  <button onclick="setMode('map')">Map</button>
  <button onclick="setMode('vector')">Vector</button>

  <div id="filters"></div>

  <div id="map"></div>
  <canvas id="vectorCanvas" width="300" height="250"></canvas>

  <table id="grid"></table>
  <div id="eventLog"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

// ===== STATE =====
let liveEvents = JSON.parse(localStorage.getItem("liveEvents")) || [];
let database = JSON.parse(localStorage.getItem("database")) || [];

let currentWeek = null;
let selectedDay = null;

let mode = "map";

let routeSession = {active:false, paused:false, id:null};
let watchId = null;

let map, layer, userMarker;

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

let filters = {
  days:[0,1,2,3,4,5,6],
  types:["route-point","habit","note"]
};

// ===== INIT =====
window.onload = ()=>{
  document.getElementById("weekInput").onchange = e=>{
    currentWeek = Number(e.target.value);
    renderWeek();
    updateMap();
    drawVectors();
  };
  renderFilters();
  show("home");
};

// ===== STORAGE =====
function save(){
  localStorage.setItem("liveEvents",JSON.stringify(liveEvents));
  localStorage.setItem("database",JSON.stringify(database));
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") setTimeout(initMap,100);
  if(id==="db") renderDB();
}

// ===== MODE =====
function setMode(m){
  mode = m;
  document.getElementById("map").style.display = m==="map"?"block":"none";
  document.getElementById("vectorCanvas").style.display = m==="vector"?"block":"none";

  updateMap();
  drawVectors();
}

// ===== MAP =====
function initMap(){
  if(map) return;

  map = L.map('map').setView([52,5],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  layer = L.layerGroup().addTo(map);
}

function updateMap(){
  if(mode!=="map" || !map) return;

  layer.clearLayers();

  let evs = liveEvents.filter(e =>
    e.week===currentWeek &&
    e.lat &&
    filters.days.includes(e.day)
  );

  let routes={};

  evs.forEach(e=>{
    if(e.routeId){
      if(!routes[e.routeId]) routes[e.routeId]=[];
      routes[e.routeId].push([e.lat,e.lng]);
    }
  });

  Object.values(routes).forEach(coords=>{
    if(coords.length>1){
      L.polyline(coords,{color:"blue"}).addTo(layer);
    }
  });

  evs.forEach(e=>{
    let m=L.circleMarker([e.lat,e.lng],{radius:4}).addTo(layer);
    m.bindPopup(`${e.type} ${days[e.day]}`);
  });
}

// ===== VECTOR MODE =====
function drawVectors(){
  if(mode!=="vector") return;

  let canvas = document.getElementById("vectorCanvas");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let evs = liveEvents.filter(e=>e.week===currentWeek && e.lat);

  if(evs.length===0) return;

  let lats = evs.map(e=>e.lat);
  let lngs = evs.map(e=>e.lng);

  let minLat=Math.min(...lats), maxLat=Math.max(...lats);
  let minLng=Math.min(...lngs), maxLng=Math.max(...lngs);

  function proj(lat,lng){
    let x = (lng-minLng)/(maxLng-minLng)*canvas.width;
    let y = canvas.height - (lat-minLat)/(maxLat-minLat)*canvas.height;
    return [x,y];
  }

  let routes={};

  evs.forEach(e=>{
    if(e.routeId){
      if(!routes[e.routeId]) routes[e.routeId]=[];
      routes[e.routeId].push(e);
    }
  });

  Object.values(routes).forEach(route=>{
    ctx.beginPath();
    route.forEach((p,i)=>{
      let [x,y]=proj(p.lat,p.lng);
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

// ===== FILTERS =====
function renderFilters(){
  let div=document.getElementById("filters");
  div.innerHTML="";

  days.forEach((d,i)=>{
    let cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=true;

    cb.onchange=()=>{
      if(cb.checked) filters.days.push(i);
      else filters.days = filters.days.filter(x=>x!==i);
      updateMap(); drawVectors();
    };

    div.appendChild(cb);
    div.append(d+" ");
  });
}

// ===== EVENTS =====
function record(type, extra={}){
  if(!Number.isFinite(currentWeek)){
    alert("Set week");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    liveEvents.push({
      type,
      time:Date.now(),
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      week:currentWeek,
      day:selectedDay ?? (new Date().getDay()+6)%7,
      routeId:routeSession.id,
      ...extra
    });

    save();
    renderWeek();
    updateMap();
    drawVectors();
  });
}

// ===== ROUTES =====
function startRoute(){
  routeSession={active:true,paused:false,id:Date.now()};
  record("route-start");

  watchId = navigator.geolocation.watchPosition(pos=>{
    if(routeSession.active && !routeSession.paused){
      liveEvents.push({
        type:"route-point",
        time:Date.now(),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        week:currentWeek,
        day:selectedDay ?? 0,
        routeId:routeSession.id
      });
      save();
      updateMap();
      drawVectors();
    }
  });
}

function pauseRoute(){ routeSession.paused=true; record("route-pause"); }
function resumeRoute(){ routeSession.paused=false; record("route-resume"); }

function stopRoute(){
  navigator.geolocation.clearWatch(watchId);
  record("route-end");
  routeSession={active:false,paused:false,id:null};
}

// ===== WEEK =====
function renderWeek(){
  let table=document.getElementById("grid");
  table.innerHTML="";

  let h=document.createElement("tr");
  h.appendChild(document.createElement("th"));

  days.forEach((d,i)=>{
    let th=document.createElement("th");
    th.innerText=d;
    th.onclick=()=>selectedDay=i;
    h.appendChild(th);
  });

  table.appendChild(h);

  for(let i=0;i<5;i++){
    let r=document.createElement("tr");
    let td=document.createElement("td");
    td.innerText="Habit "+(i+1);
    r.appendChild(td);

    for(let d=0;d<7;d++){
      let cell=document.createElement("td");

      let btn=document.createElement("button");
      btn.innerText="+";
      btn.onclick=()=>{selectedDay=d;record("habit",{habitIndex:i});};

      cell.appendChild(btn);
      r.appendChild(cell);
    }
    table.appendChild(r);
  }

  renderEventLog();
}

// ===== EVENT LOG =====
function renderEventLog(){
  let div=document.getElementById("eventLog");
  div.innerHTML="<h3>Events (delete here)</h3>";

  let evs = liveEvents.filter(e=>e.week===currentWeek);

  evs.forEach(ev=>{
    let row=document.createElement("div");

    row.innerText = `${days[ev.day]} ${ev.type}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      liveEvents.splice(liveEvents.indexOf(ev),1);
      save();
      renderWeek();
      updateMap();
      drawVectors();
    };

    row.appendChild(del);
    div.appendChild(row);
  });
}

// ===== DATABASE =====
function saveWeekToDB(){
  if(!Number.isFinite(currentWeek)) return;

  let i = database.findIndex(w=>Number(w.week)===currentWeek);

  let data = JSON.parse(JSON.stringify(
    liveEvents.filter(e=>e.week===currentWeek)
  ));

  if(i!==-1) database[i].data=data;
  else database.push({week:currentWeek,data});

  save();
}

function renderDB(){
  let div=document.getElementById("dbContent");
  div.innerHTML="";

  database.forEach(w=>{
    if(!Number.isFinite(w.week)) return;

    div.append("Week "+w.week);
    let table=document.createElement("table");

    w.data.forEach(e=>{
      let tr=document.createElement("tr");
      tr.innerHTML=`<td>${e.type}</td><td>${e.lat||""}</td>`;
      table.appendChild(tr);
    });

    div.appendChild(table);
  });
}

</script>
</body>
</html>
