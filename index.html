/* v75 cyber-voronoi UI refinement */
:root{--cyber:#62e6ff;--violet:#8f7bff;--acid:#d7ff74;--inkglass:rgba(4,10,16,.46)}
#bottomToolbar{height:48px;bottom:calc(10px + env(safe-area-inset-bottom));width:min(88vw,650px)}
.papyrusRoll{height:46px;border-radius:18px;background:linear-gradient(135deg,rgba(8,18,28,.58),rgba(66,220,255,.11));border:1px solid rgba(98,230,255,.32);clip-path:polygon(2% 18%,7% 0,93% 0,98% 18%,100% 74%,94% 100%,6% 100%,0 74%);transform:perspective(700px) rotateX(0deg);}

.papyrusRoll:after{display:none}.papyrusRoll.open{height:58px;transform:perspective(700px) rotateX(16deg) translateY(-3px)}
.papyrusRoll.pulse{animation:rollTap .28s ease-out}@keyframes rollTap{0%{transform:perspective(700px) rotateX(16deg) scale(1)}45%{transform:perspective(700px) rotateX(24deg) scale(.985)}100%{transform:perspective(700px) rotateX(16deg) scale(1)}}
.rollTools{padding:8px 10px;gap:6px;justify-content:center}.floatBtn{height:31px;min-width:50px;border-radius:10px;background:linear-gradient(135deg,rgba(0,20,30,.42),rgba(100,230,255,.13));border:1px solid rgba(98,230,255,.30);clip-path:polygon(12% 0,88% 0,100% 38%,90% 100%,10% 100%,0 38%);font-size:11px;color:#f4fdff;text-shadow:0 0 8px rgba(98,230,255,.55)}.floatBtn.smallBtn{width:38px;min-width:38px}.floatBtn:hover,.floatBtn.active{background:linear-gradient(135deg,rgba(98,230,255,.26),rgba(143,123,255,.22));box-shadow:0 0 20px rgba(98,230,255,.22)}
.popover{border-radius:16px;background:rgba(5,13,22,.88);border:1px solid rgba(98,230,255,.34);clip-path:polygon(4% 0,96% 0,100% 8%,100% 92%,96% 100%,4% 100%,0 92%,0 8%)}.popover button{clip-path:polygon(8% 0,92% 0,100% 32%,92% 100%,8% 100%,0 32%);background:linear-gradient(135deg,rgba(98,230,255,.13),rgba(143,123,255,.12));border-color:rgba(98,230,255,.30)}
.viewPanel{width:min(92vw,380px)}.viewModeRow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.viewModeRow button.active{background:rgba(98,230,255,.30);color:white}.dateChooser{margin-top:8px;border-top:1px solid rgba(98,230,255,.18);padding-top:8px;color:#f6fcff}.dateHead{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:8px}.dateHead b{font-size:12px;text-align:center;flex:1}.dateGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.dateGrid.months{grid-template-columns:repeat(3,1fr)}.dateGrid.years{grid-template-columns:repeat(4,1fr)}.dateGrid button{padding:6px 4px;text-align:center;font-size:12px}.dateGrid button.selected{background:rgba(215,255,116,.24);border-color:rgba(215,255,116,.58)}.dateGrid .dow{font-size:10px;color:rgba(246,252,255,.65);text-align:center;padding:2px}.dateGrid button.mutedDay{opacity:.45}
.arcIcon,.toolArcIcon{clip-path:polygon(16% 0,84% 0,100% 28%,100% 72%,84% 100%,16% 100%,0 72%,0 28%);background:linear-gradient(135deg,rgba(7,18,28,.72),rgba(98,230,255,.18));border:1px solid rgba(98,230,255,.32);box-shadow:0 18px 26px rgba(0,0,0,.26),0 0 22px rgba(98,230,255,.16);}
#compassHub,#levelerHub{filter:drop-shadow(0 18px 28px rgba(0,0,0,.42)) drop-shadow(0 0 16px rgba(98,230,255,.20))}.compass3d,.orb{background:radial-gradient(circle at 35% 28%,rgba(255,255,255,.96),rgba(98,230,255,.48) 28%,rgba(10,22,32,.92) 72%)}

<body>
<div id="app">
<canvas id="map"></canvas>
<div id="infoText"><div class="line" id="infoLine1">Loading spatial canvas...</div><div class="line" id="infoLine2">-</div></div>
<div id="commandHud" class="commandHud">
  <div class="hudTop"><strong id="hudCommand">Idle</strong><span id="hudPhase" class="phase">phase idle</span></div>
  <div class="hudStats">
    <div class="hudStat"><span>Vertices</span><b id="hudVertices">0</b></div>
    <div class="hudStat"><span>Segments</span><b id="hudSegments">0</b></div>
    <div class="hudStat"><span>Selected</span><b id="hudSelected">0</b></div>
  </div>
</div>
<div id="scaleLegend"><div class="scaleBox"><div class="scaleCircle"></div><div class="scaleRad"></div><div class="scaleLabel" id="scaleLabel">r = 10 m</div></div></div>
<div id="bottomToolbar">
  <div id="papyrusRoll" class="papyrusRoll" title="Papyrus tools">
    <div class="rollTools">
      <button id="viewBtn" class="floatBtn carved">View</button>
      <button id="zoomInBtn" class="floatBtn smallBtn carved">+</button>
      <button id="zoomOutBtn" class="floatBtn smallBtn carved">-</button>
      <button id="fitBtn" class="floatBtn carved">Fit</button>
      <button id="fitSelBtn" class="floatBtn carved">Fit Sel</button>
      <button id="followBtn" class="floatBtn carved active">Follow</button>
      <button id="pinBtn" class="floatBtn carved">Pin</button>
      <button id="layersBtn" class="floatBtn carved">Layers</button>
    </div>
  </div>
</div>
<div id="viewPop" class="popover vertical viewPanel">
  <div class="viewModeRow"><button data-view="day">Day</button><button data-view="week">Week</button><button data-view="month">Month</button><button data-view="year">Year</button></div>
  <div id="dateChooser" class="dateChooser"></div>
</div>
