async function openDb(){return new Promise((res,rej)=>{const q=indexedDB.open(DB_NAME,1);q.onupgradeneeded=e=>{const db=e.target.result;['base','tempGnss','controlPoints','correctionLog','avatarView','mapView','weeklyView','settings'].forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'})})};q.onsuccess=()=>{app.db=q.result;res()};q.onerror=()=>rej(q.error)})}

function all(n){return new Promise((res,rej)=>{const q=store(n).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error)})}

function del(n,k){return new Promise((res,rej)=>{const q=store(n,'readwrite').delete(k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error)})}
function clearStore(n){return new Promise((res,rej)=>{const q=store(n,'readwrite').clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error)})}
async function loadDb(){app.base=await all('base');app.tempGnss=await all('tempGnss');app.controlPoints=await all('controlPoints');app.correctionLog=await all('correctionLog');const av=(await all('avatarView'))[0];if(av)app.avatarView={...app.avatarView,...av};const s=(await all('settings'))[0];if(s){app.settings={...app.settings,...s.settings};app.crs=s.crs||app.crs;app.camera=s.camera||app.camera;app.calibration=s.calibration||app.calibration}buildViews()}
function solvePosition(raw){const local=raw.rawLocal;let sx=0,sy=0,sz=0,sw=0,used=[];for(const cp of app.controlPoints){const d=Math.max(1,distanceLocal(local,cp.personalLocal||cp.correctedLocal||cp.local));const sigma=Math.max(0.5,cp.sigmaM||cp.sigma||5);const radius=cp.influenceRadius||Math.max(20,80/(cp.confidence||.3));if(d>radius)continue;const w=(cp.confidence||.5)/(sigma*sigma*d*d);const dx=cp.weightedDelta?.dx||cp.delta?.dx||0,dy=cp.weightedDelta?.dy||cp.delta?.dy||0,dz=cp.weightedDelta?.dz||cp.delta?.dz||0;sx+=dx*w;sy+=dy*w;sz+=dz*w;sw+=w;used.push({id:cp.id,w,d,sigma})}
 const corrected=sw?{x:local.x-sx/sw,y:local.y-sy/sw,z:local.z-sz/sw}:{...local};const confidence=sw?Math.min(1,.35+Math.log10(1+sw)*.25):Math.max(.05,1/(1+(raw.accuracy||50)/8));return{rawLocal:{...local},estimatedLocal:{...corrected},correctedLocal:{...corrected},correctedWgs:localToWgs(corrected.x,corrected.y,corrected.z),confidence,usedControls:used,solver:sw?'weighted-control-field':'raw-fallback'}}
function rejectOutlier(raw){const last=app.tempGnss.at(-1);if(!last)return false;const dt=(new Date(raw.capturedAt)-new Date(last.capturedAt))/1000;if(dt<=0)return true;const d=distanceLocal(raw.rawLocal,last.rawLocal||last.local);const speed=d/dt;return (raw.accuracy&&last.accuracy&&raw.accuracy>Math.max(80,last.accuracy*4))||speed>80||(app.stationary.locked&&d>30)}
async function ingestGps(c){const rawWgs={lat:c.latitude,lng:c.longitude,alt:normalizedPhoneAlt(c.altitude),phoneAlt:normalizedPhoneAlt(c.altitude),groundAlt:normalizedPhoneAlt(c.altitude)-PHONE_HEIGHT_OFFSET_M,accuracy:c.accuracy??null,altitudeAccuracy:c.altitudeAccuracy??null,speed:c.speed??null,heading:c.heading??null};const rawLocal=wgsToLocal(rawWgs.lat,rawWgs.lng,rawWgs.alt);const raw={id:id('GPS'),rawWgs,rawLocal,wgs:rawWgs,local:rawLocal,accuracy:rawWgs.accuracy,altitudeAccuracy:rawWgs.altitudeAccuracy,capturedAt:new Date().toISOString(),quality:'raw',usedInSolver:true};if(rejectOutlier(raw)){raw.quality='outlier';raw.usedInSolver=false;app.tempGnss.push(raw);await put('tempGnss',raw);return}

 app.avatarView={...app.avatarView,id:'avatar',rawWgs,rawLocal,estimatedLocal:sol.estimatedLocal,correctedLocal:sol.correctedLocal,correctedWgs:sol.correctedWgs,accuracy:rawWgs.accuracy,altitudeAccuracy:rawWgs.altitudeAccuracy,confidence:sol.confidence,solver:sol.solver,usedControls:sol.usedControls,updatedAt:raw.capturedAt,heading:computeHeading(rawWgs,sol.correctedLocal)};raw.solver=sol;raw.displayLocal=sol.correctedLocal;app.tempGnss.push(raw);while(app.tempGnss.length>1200)app.tempGnss.shift();await put('tempGnss',raw);await put('avatarView',app.avatarView);learnStationary(raw,sol);collectControlCapture(raw,sol);sampleActiveFromAvatar();buildViews();renderAll(false)}
function computeHeading(rawWgs,loc){let h=app.lastGoodHeading||0;if(typeof rawWgs.heading==='number'&&rawWgs.speed>.8)h=rawWgs.heading;else if(app.orientation.alpha!==null)h=(360-app.orientation.alpha+360)%360;else{const last=app.tempGnss.filter(g=>g.displayLocal).at(-1);if(last&&distanceLocal(last.displayLocal,loc)>1){const a=last.displayLocal,b=loc;h=(Math.atan2(b.x-a.x,b.y-a.y)*180/Math.PI+360)%360}}

function renderBasePanel(){const groups=[];groups.push(["Βάσεις απεικόνισης",[["avatarView",[app.avatarView]],["mapView",app.mapView],["weeklyView",app.weeklyView]]]);groups.push(["Μόνιμη καταγραφή",[["base",app.base],["controlPoints",app.controlPoints]]]);groups.push(["Προσωρινές",[["tempGnss",app.tempGnss.slice(-300)]]]);groups.push(["Υπολογισμών",[["correctionLog",app.correctionLog.slice(-300)],["solver",[{formula:"correctedXYZ = rawXYZ - weightedMean(deltaXYZ from nearby control points)",weights:"w = confidence / (sigma^2 * distance^2)",truth:"raw data never mutated; current-best correction is a view/export mode; Z is ground estimate from GNSS altitude minus 1m phone-height offset"}]]]]);ui.panelBody.innerHTML=groups.map(([g,items])=>`<details open><summary>${g}</summary>${items.map(([n,rows])=>dbSection(n,rows)).join("")}</details>`).join("")}
function dbSection(name,rows){return `<details><summary>${name} · ${rows.length}</summary><div class="row"><span class="pill">Table</span><span class="pill">Formula/model</span></div>${tableFor(rows)}<pre>${esc(JSON.stringify(rows.slice(0,60),null,2))}</pre></details>`}
function tableFor(rows){if(!rows.length)return '<p class="muted">No rows.</p>';const keys=Array.from(new Set(rows.flatMap(r=>Object.keys(r)).slice(0,12))).slice(0,8);return `<div class="tableWrap"><table><thead><tr>${keys.map(k=>`<th>${esc(k)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${keys.map(k=>`<td class="expandCell"><div class="clip">${esc(typeof r[k]==='object'?JSON.stringify(r[k]):r[k])}</div></td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function renderWeeklyPanel(){const st=weekStart(app.settings.selectedAt),days=Array.from({length:7},(_,i)=>addDays(st,i)),rows=app.base.filter(r=>recWeek(r)===ymd(st));ui.panelBody.innerHTML=`<div class="row"><button id="prevWeekBtn">←</button><b>W${weekNo(st)} · ${ymd(days[0])} → ${ymd(days[6])}</b><button id="nextWeekBtn">→</button></div><details open><summary>Πίνακας εβδομάδας</summary>${weeklyTable(days,rows)}</details><details><summary>Κάρτες στοιχείων (${rows.length})</summary>${rows.map(weeklyCard).join('')||'<p>No records.</p>'}</details>`;setTimeout(()=>{ $('prevWeekBtn').onclick=()=>{app.settings.selectedAt=addDays(st,-7).toISOString();buildViews();renderWeeklyPanel()}; $('nextWeekBtn').onclick=()=>{app.settings.selectedAt=addDays(st,7).toISOString();buildViews();renderWeeklyPanel()}; },0)}
function weeklyTable(days,rows){return `<div class="tableWrap"><table><thead><tr><th>Ημέρα</th><th>Objects</th><th>Routes km</th><th>Areas m²</th><th>Notes</th></tr></thead><tbody>${days.map(d=>{const day=ymd(d),dr=rows.filter(r=>recDate(r)===day);return `<tr><th>${day}</th><td>${dr.filter(r=>r.type==='point').length}</td><td>${(dr.filter(r=>r.type==='route').reduce((s,r)=>s+(r.metrics?.distanceM||0),0)/1000).toFixed(3)}</td><td>${dr.filter(r=>r.type==='area').reduce((s,r)=>s+(r.metrics?.areaM2||0),0).toFixed(1)}</td><td>${dr.filter(r=>r.comment).length}</td></tr>`}).join('')}</tbody></table></div>`}
function weeklyCard(r){return `<div class="card"><span class="pill">${esc(r.type)}</span> <b>${esc(r.name||r.code||r.id)}</b><br><span class="small muted">${esc(r.time?.eventAt)} · ${esc(r.address||'no address')}</span><p>${esc(r.comment||'')}</p><button onclick="window.PSJ_show('${r.id}')">Show on map</button></div>`}
window.PSJ_show=(rid)=>{const r=app.base.find(x=>x.id===rid);if(!r)return;const l=r.correctedLocal||r.local||r.vertices?.[0]?.correctedLocal;if(l){app.camera.x=l.x;app.camera.y=l.y;app.camera.z=Math.max(app.camera.z,2);ui.panel.classList.remove('open')}};

  '<details open><summary>GPS / Solver</summary><label>GNSS interval sec<input id="setGnss" type="number" value="'+app.settings.gnssInterval+'"></label><label>Route interval sec<input id="setRoute" type="number" value="'+app.settings.routeInterval+'"></label><button id="saveSet" class="primary">Save settings</button></details>'+
  '<details open><summary>🜃 Αρχικοποίηση προσωπικού CRS</summary><div class="calStep"><b>Κατάσταση:</b> '+cal+'</div><p class="small muted">Για υψηλή ακρίβεια, χτίσε πρώτα σταθερά σημεία. Μπορείς πάντα να σχεδιάζεις χωρίς αυτά· τότε οι εγγραφές μένουν provisional και δεν επηρεάζουν το αυτοβελτιούμενο γεωγραφικό σύστημα.</p><div class="row"><button id="calIntro">Οδηγός calibration</button><button id="calLocal">Τοπικό 3 σημείων</button><button id="calBaseline">Baseline 2 τριγώνων</button><button id="manualCp">Χειροκίνητο Control Point 60s</button></div><div class="row"><button id="setCrsOrigin" class="danger">Δήλωση αρχικού CRS εδώ</button></div><p class="small muted"><b>CRS origin:</b> ορίζει το τρέχον WGS ως αρχική αναφορά για μελλοντικούς μετασχηματισμούς. Δεν αλλοιώνει raw δεδομένα, αλλά αλλάζει τον τρόπο που προβάλλονται/υπολογίζονται μελλοντικές θέσεις.</p></details>'+
  '<details><summary>Export</summary><div class="row"><select id="exportRange"><option>day</option><option selected>week</option><option>month</option><option>year</option></select><select id="exportMode"><option value="historical">Historical</option><option value="current">Current best correction</option></select><button id="exportGeojson">GeoJSON</button><button id="exportKml">KML</button></div></details><details><summary>Address refresh</summary><button id="addrRefresh">Refresh missing addresses</button><p class="small muted">Uses online reverse geocoding when internet exists.</p></details>';
  ui.panelBody.querySelectorAll('[data-v]').forEach(btn=>btn.onclick=()=>{app.settings.viewMode=btn.dataset.v;buildViews();renderSettingsPanel()});
  $('saveSet').onclick=async()=>{app.settings.gnssInterval=Math.max(1,Number($('setGnss').value)||5);app.settings.routeInterval=Math.max(1,Number($('setRoute').value)||10);await saveSettings();renderSettingsPanel()};
  $('exportGeojson').onclick=()=>download(exportGeoJSON($('exportRange').value,$('exportMode').value),'psj.geojson','application/geo+json');
  $('exportKml').onclick=()=>download(exportKML($('exportRange').value,$('exportMode').value),'psj.kml','application/vnd.google-earth.kml+xml');
  $('addrRefresh').onclick=refreshAddresses;$('calIntro').onclick=showCalibrationIntro;$('calLocal').onclick=()=>startCalibration('local');$('calBaseline').onclick=()=>startCalibration('baseline');$('manualCp').onclick=()=>beginManualControlPoint('manual');$('setCrsOrigin').onclick=setCrsOriginHere;
}
function calibrationSummaryHtml(){const c=app.calibration||{};const base=c.baseline?'<span class="calGood">baseline ready</span>':'<span class="calWarn">baseline not ready</span>';return esc(c.mode||'auto')+' · '+esc(c.status||'not-started')+' · local CP '+(c.localCpIds?.length||0)+'/3 · remote CP '+(c.remoteCpIds?.length||0)+'/3 · '+base}
function showCalibrationIntro(){ui.calBody.innerHTML='<div class="calStep"><b>Τρεις τρόποι αρχικοποίησης</b><br>1. <b>Τοπικό 3 σημείων:</b> καλό για δωμάτιο/σπίτι. Άφησε το κινητό ακίνητο 60s σε 3 μη συνευθειακά σημεία.<br>2. <b>Baseline:</b> 3 σημεία εδώ + 3 σημεία μακριά (&gt;1km ιδανικά). Δίνει αρχικό orientation/περιστροφή του Personal CRS ως προς WGS84.<br>3. <b>Auto:</b> η εφαρμογή συνεχίζει να μαθαίνει όταν το κινητό μένει σταθερό.</div><div class="calStep"><b>Σχεδίαση πριν το calibration</b><br>Επιτρέπεται πάντα. Τα στοιχεία σημειώνονται provisional και μπορούν να επανυπολογιστούν όταν δημιουργηθούν control points.</div>';ui.calDialog.showModal()}
function startCalibration(mode){app.calibration={...app.calibration,mode,status:'active',startedAt:new Date().toISOString(),localCpIds:[],remoteCpIds:[],baseline:null};saveSettings();ui.calBody.innerHTML='<div class="calStep"><b>'+(mode==='baseline'?'Baseline calibration':'Τοπικό calibration')+'</b><br>'+(mode==='baseline'?'Βήμα 1: δημιούργησε 3 control points στην πρώτη περιοχή. Μετά μετακινήσου τουλάχιστον 1km και δημιούργησε άλλα 3.':'Δημιούργησε 3 control points σε μη συνευθειακά σημεία. Σε κάθε σημείο άφησε το κινητό ακίνητο για 60s.')+'</div><button id="calNextCp" class="primary">Start next 60s point</button>';ui.calDialog.showModal();$('calNextCp').onclick=()=>beginManualControlPoint(mode)}
function beginManualControlPoint(kind='manual'){if(app.controlCapture?.active)return alert('Ήδη γίνεται μέτρηση control point. Κράτα το κινητό ακίνητο.');app.controlCapture={active:true,kind,startAt:Date.now(),durationMs:60000,samples:[],label:kind};showHint('Control point: μην κουνήσεις το κινητό για 60s');ui.calBody.innerHTML='<div class="calStep"><b>Μέτρηση Control Point</b><br>Κράτα το κινητό ακίνητο. Η εφαρμογή συλλέγει GNSS samples και residuals για 60 δευτερόλεπτα.<br><span id="cpCountdown" class="calGood">60s</span></div>';if(!ui.calDialog.open)ui.calDialog.showModal()}
function collectControlCapture(raw,sol){const c=app.controlCapture;if(!c?.active)return;c.samples.push({raw,sol});const left=Math.max(0,Math.ceil((c.durationMs-(Date.now()-c.startAt))/1000));const el=$('cpCountdown');if(el)el.textContent=left+'s';showHint('Control point: '+left+'s');if(Date.now()-c.startAt>=c.durationMs||c.samples.length>=Math.max(12,Math.floor(c.durationMs/1000/app.settings.gnssInterval))){finishControlCapture()}}
function finishControlCapture(){const c=app.controlCapture;if(!c?.active||!c.samples.length)return;const locked=averageSolvedLocal(c.samples);const avgAcc=c.samples.reduce((a,x)=>a+(x.raw.accuracy||50),0)/c.samples.length;const cp=makeControlFromSamples(c.samples,locked,avgAcc);cp.captureKind=c.kind;cp.calibrationMode=app.calibration.mode;cp.manual=true;cp.report=controlPointReport(cp);app.controlPoints.push(cp);put('controlPoints',cp);if(app.calibration.mode==='local'){app.calibration.localCpIds.push(cp.id);if(app.calibration.localCpIds.length>=3)app.calibration.status='local-ready'}else if(app.calibration.mode==='baseline'){if((app.calibration.localCpIds?.length||0)<3)app.calibration.localCpIds.push(cp.id);else app.calibration.remoteCpIds.push(cp.id);if((app.calibration.localCpIds?.length||0)>=3&&(app.calibration.remoteCpIds?.length||0)>=3){computeBaselineCalibration();app.calibration.status='baseline-ready'}}app.controlCapture=null;saveSettings();buildViews();renderAll();ui.calBody.innerHTML='<div class="calStep"><b>Control point saved</b><br>'+esc(cp.report.summary)+'<br>σ '+cp.sigmaM.toFixed(2)+'m · confidence '+(cp.confidence*100).toFixed(0)+'%</div><div class="row"><button id="calAnother" class="primary">Next point</button><button id="calDone">Done</button></div>';if($('calAnother'))$('calAnother').onclick=()=>beginManualControlPoint(app.calibration.mode||'manual');if($('calDone'))$('calDone').onclick=()=>ui.calDialog.close();showHint('Control point saved')}
function averageSolvedLocal(samples){let x=0,y=0,z=0,sw=0;for(const s of samples){const acc=Math.max(1,s.raw.accuracy||20),w=1/(acc*acc),l=s.sol.correctedLocal||s.raw.rawLocal;x+=l.x*w;y+=l.y*w;z+=l.z*w;sw+=w}return{x:x/sw,y:y/sw,z:z/sw}}
function controlPointReport(cp){const res=cp.residuals||[];const max=res.reduce((m,r)=>Math.max(m,Math.hypot(r.dx,r.dy,r.dz)),0);return{summary:'samples '+cp.samples+', avg accuracy '+(cp.avgAccuracy||0).toFixed(1)+'m, max residual '+max.toFixed(2)+'m',maxResidual:max,weightedDelta:cp.weightedDelta,sigmaM:cp.sigmaM}}
function computeBaselineCalibration(){const pts=idList=>idList.map(id=>app.controlPoints.find(c=>c.id===id)).filter(Boolean);const a=pts(app.calibration.localCpIds),b=pts(app.calibration.remoteCpIds);if(a.length<3||b.length<3)return;const cen=arr=>arr.reduce((o,c)=>({x:o.x+c.personalLocal.x/arr.length,y:o.y+c.personalLocal.y/arr.length,z:o.z+c.personalLocal.z/arr.length,lat:o.lat+c.personalWgs.lat/arr.length,lng:o.lng+c.personalWgs.lng/arr.length}),{x:0,y:0,z:0,lat:0,lng:0});const ca=cen(a),cb=cen(b);const localBearing=(Math.atan2(cb.x-ca.x,cb.y-ca.y)*180/Math.PI+360)%360;const wgsA=wgsToLocal(ca.lat,ca.lng,ca.z),wgsB=wgsToLocal(cb.lat,cb.lng,cb.z);const wgsBearing=(Math.atan2(wgsB.x-wgsA.x,wgsB.y-wgsA.y)*180/Math.PI+360)%360;const rotationOffset=((wgsBearing-localBearing+540)%360)-180;app.calibration.baseline={createdAt:new Date().toISOString(),localCentroid:ca,remoteCentroid:cb,localBearing,wgsBearing,rotationOffset,meters:distanceLocal(ca,cb)};app.correctionLog.push({id:id('BASE'),type:'baseline-orientation',...app.calibration.baseline});put('correctionLog',app.correctionLog.at(-1))}
function setCrsOriginHere(){const w=app.avatarView.correctedWgs;if(!w)return alert('Δεν υπάρχει θέση avatar ακόμη.');if(!confirm('Να οριστεί το τρέχον WGS ως αρχική αναφορά CRS; Τα raw δεδομένα δεν αλλοιώνονται, αλλά οι μελλοντικοί μετασχηματισμοί θα βασίζονται σε αυτή την αρχή.'))return;app.crs.origin={lat:w.lat,lng:w.lng,alt:w.alt||0};app.camera.x=app.crs.falseEasting;app.camera.y=app.crs.falseNorthing;saveSettings();alert('CRS origin set at current avatar position.');renderAll()}
function showHint(t){ui.cmdHint.textContent=t;ui.cmdHint.classList.add('on');clearTimeout(showHint._t);showHint._t=setTimeout(()=>ui.cmdHint.classList.remove('on'),3500)}
function renderCompassPanel(){ui.panelBody.innerHTML=`<details open><summary>Compass / sensors</summary><pre>${esc(JSON.stringify({heading:app.avatarView.heading,orientation:app.orientation,solver:app.avatarView.solver,confidence:app.avatarView.confidence,usedControls:app.avatarView.usedControls},null,2))}</pre></details><details><summary>Position solver formula</summary><pre>raw WGS84 phone alt → personal XYZ ground z = alt - 1m\ncorrected XYZ = raw XYZ - Σ(wᵢ · Δᵢ) / Σwᵢ\nwᵢ = confidenceᵢ / (σᵢ² · distanceᵢ²)\nroute distance = Σ distance(corrected XYZ vertices)</pre></details>`}
function metricsRoute(v){let d=0,raw=0;for(let i=1;i<v.length;i++){d+=distanceLocal(v[i-1].correctedLocal||v[i-1].local,v[i].correctedLocal||v[i].local);if(v[i-1].rawWgs&&v[i].rawWgs)raw+=distanceM(v[i-1].rawWgs,v[i].rawWgs)}return{distanceM:d,rawDistanceM:raw,vertexCount:v.length}}
function areaM2(v){if(v.length<3)return 0;let a=0;for(let i=0;i<v.length;i++){const p=v[i].correctedLocal||v[i].local,q=v[(i+1)%v.length].correctedLocal||v[(i+1)%v.length].local;a+=p.x*q.y-q.x*p.y}return Math.abs(a/2)}
function vertexFromLocal(local,source='design'){const w=localToWgs(local.x,local.y,local.z);return{id:id('V'),source,local,correctedLocal:{...local},rawWgs:w,correctedWgs:w,capturedAt:new Date().toISOString()}}
function vertexFromAvatar(){const l=app.avatarView.correctedLocal,w=app.avatarView.correctedWgs||localToWgs(l.x,l.y,l.z);return{id:id('V'),source:'add-avatar',local:{...l},correctedLocal:{...l},rawWgs:app.avatarView.rawWgs||w,correctedWgs:w,capturedAt:new Date().toISOString()}}
function openPointDialog(source,local){local={...local,z:estimateGroundZForLocal(local)};const w=localToWgs(local.x,local.y,local.z);ui.recordTitle.textContent=source==='add'?'Add point at avatar':'Design point';ui.recordBody.innerHTML=`<div class="grid2"><label>Name<input id="edName" value="Point"></label><label>Icon<select id="edIcon"><option>✦</option><option>⛪</option><option>🏟️</option><option>⚒️</option><option>🏛️</option><option>✎</option></select></label></div><label>Comment<textarea id="edComment"></textarea></label><div class="grid3"><label>X<input id="edX" type="number" step="any" value="${local.x.toFixed(3)}"></label><label>Y<input id="edY" type="number" step="any" value="${local.y.toFixed(3)}"></label><label>Z ground<input id="edZ" type="number" step="any" value="${local.z.toFixed(3)}"></label></div><div class="grid2"><label>Event date/time<input id="edAt" type="datetime-local" value="${isoLocal(app.settings.selectedAt)}"></label><label>Address<input id="edAddr" placeholder="auto lookup when online"></label></div><p class="small muted">WGS preview: ${w.lat.toFixed(6)}, ${w.lng.toFixed(6)}, ground z ${(w.alt||0).toFixed(1)} · phone offset −${PHONE_HEIGHT_OFFSET_M}m</p>`;const addrInput=$('edAddr');if(navigator.onLine&&addrInput){addrInput.placeholder='looking up address…';reverse(w.lat,w.lng).then(a=>{if(a&&!addrInput.value)addrInput.value=a;addrInput.placeholder=a?'address found':'no address found';}).catch(()=>{addrInput.placeholder='address lookup failed'});}ui.recordCancel.onclick=()=>ui.dialog.close();ui.recordSave.onclick=async()=>{const l={x:Number($('edX').value),y:Number($('edY').value),z:Number($('edZ').value)},cw=localToWgs(l.x,l.y,l.z),dt=safeDate($('edAt').value).toISOString();const rec={id:id('REC'),code:makeCode('point',dt),type:'point',source,geometryStatus:app.avatarView.confidence>.45?'corrected':'provisional',name:$('edName').value,icon:$('edIcon').value,iconScale:1,comment:$('edComment').value,address:$('edAddr').value||'',local:l,correctedLocal:l,wgs:cw,correctedWgs:cw,time:{eventAt:dt,capturedAt:new Date().toISOString()},createdAt:new Date().toISOString()};app.base.push(rec);await put('base',rec);buildViews();ui.dialog.close();renderAll()};ui.dialog.showModal()}
function startElement(type,source,local=null){if(type==='point'){openPointDialog(source,source==='add'?app.avatarView.correctedLocal:local);return}const v=source==='add'?vertexFromAvatar():vertexFromLocal(local,source);app.active={id:id(type.toUpperCase()),type,source,vertices:[v],eventAt:safeDate(app.settings.selectedAt).toISOString()}}
function finishActive(local=null){if(!app.active)return;const a=app.active;if(local&&(a.source==='design'))a.vertices.push(vertexFromLocal(local,'design-end'));if(a.source==='add')a.vertices.push(vertexFromAvatar());const type=a.type,dt=a.eventAt;const rec={id:id('REC'),code:makeCode(type,dt),type,source:a.source,geometryStatus:app.avatarView.confidence>.45?'corrected':'provisional',[type==='route'?'routeId':'areaId']:a.id,vertices:a.vertices,time:{eventAt:dt,capturedAt:new Date().toISOString()},createdAt:new Date().toISOString(),metrics:type==='route'?metricsRoute(a.vertices):{areaM2:areaM2(a.vertices),vertexCount:a.vertices.length}};app.base.push(rec);put('base',rec);app.active=null;buildViews();renderAll()}
function addVertex(local){if(!app.active)return;if(app.active.source==='add')app.active.vertices.push(vertexFromAvatar());else app.active.vertices.push(vertexFromLocal(local,'design'))}
function sampleActiveFromAvatar(){if(!app.active||app.active.source!=='add')return;const last=app.active.vertices.at(-1);const now=new Date();if(last&&(now-new Date(last.capturedAt))/1000<app.settings.routeInterval)return;const v=vertexFromAvatar();if(!last||distanceLocal(last.correctedLocal,v.correctedLocal)>0.5)app.active.vertices.push(v)}
function setTool(kind,type){closePops();app.mode=kind;app.active=null;if(kind==='add'){showHint('Add '+type+': χρησιμοποιεί τη θέση avatar. Double tap/δεξί κλικ = finish.');startElement(type,'add')}else{app.mode=kind+'-'+type;showHint('Design '+type+': click = vertex, double tap = finish/confirm.')}}
async function saveSettings(){await put('settings',{id:'settings',settings:app.settings,crs:app.crs,camera:app.camera,calibration:app.calibration})}
function showSelectedDateStep(dir){const m=app.settings.viewMode,d=safeDate(app.settings.selectedAt);if(m==='day')d.setDate(d.getDate()+dir);else if(m==='week')d.setDate(d.getDate()+7*dir);else if(m==='month')d.setMonth(d.getMonth()+dir);else d.setFullYear(d.getFullYear()+dir);app.settings.selectedAt=d.toISOString();buildViews();renderAll()}
async function reverse(lat,lng){if(!navigator.onLine)return'';try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`);if(!r.ok)return'';const j=await r.json();return j.display_name||''}catch{return''}}
async function refreshAddresses(){for(const r of app.base){if(r.type==='point'&&!r.address){const w=r.correctedWgs||r.wgs||localToWgs(r.correctedLocal.x,r.correctedLocal.y,r.correctedLocal.z);r.address=await reverse(w.lat,w.lng);await put('base',r)}}buildViews();renderAll();alert('Address refresh complete where possible.')}
function inRangeRecords(range){const old=app.settings.viewMode;app.settings.viewMode=range;const rows=visibleRecords();app.settings.viewMode=old;return rows}
function exportGeoJSON(range,mode){const rows=inRangeRecords(range);return JSON.stringify({type:'FeatureCollection',metadata:{range,mode,exportedAt:new Date().toISOString()},features:rows.map(r=>featureOf(r,mode))},null,2)}
function featureOf(r,mode){const pointCoord=(l)=>{const w=mode==='historical'?(r.wgs||r.rawWgs||localToWgs(l.x,l.y,l.z)):(r.correctedWgs||localToWgs(l.x,l.y,l.z));return[w.lng,w.lat,w.alt||0]};let geom;if(r.type==='point')geom={type:'Point',coordinates:pointCoord(r.correctedLocal||r.local)};else{const cs=r.vertices.map(v=>{const l=mode==='historical'?(v.local||v.correctedLocal):(v.correctedLocal||v.local);const w=mode==='historical'?(v.rawWgs||v.wgs||localToWgs(l.x,l.y,l.z)):(v.correctedWgs||localToWgs(l.x,l.y,l.z));return[w.lng,w.lat,w.alt||0]});geom={type:r.type==='area'?'Polygon':'LineString',coordinates:r.type==='area'?[cs.concat([cs[0]])]:cs}}return{type:'Feature',geometry:geom,properties:{id:r.id,code:r.code,type:r.type,name:r.name,address:r.address,metrics:r.metrics,time:r.time,mode}}}
function exportKML(range,mode){const gj=JSON.parse(exportGeoJSON(range,mode));return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${gj.features.map(f=>`<Placemark><name>${esc(f.properties.name||f.properties.code||f.properties.id)}</name><description>${esc(f.properties.address||'')}</description>${kmlGeom(f.geometry)}</Placemark>`).join('')}</Document></kml>`}
function kmlGeom(g){if(g.type==='Point')return`<Point><coordinates>${g.coordinates.join(',')}</coordinates></Point>`;const coords=(g.type==='Polygon'?g.coordinates[0]:g.coordinates).map(c=>c.join(',')).join(' ');return g.type==='Polygon'?`<Polygon><outerBoundaryIs><LinearRing><coordinates>${coords}</coordinates></LinearRing></outerBoundaryIs></Polygon>`:`<LineString><coordinates>${coords}</coordinates></LineString>`}

    const row=document.querySelector('#bottomToolbar .toolRow:nth-child(2)');
    if(row && !q('pinBtnV71')){
      const b=document.createElement('button'); b.id='pinBtnV71'; b.className='floatBtn'; b.textContent='Pin';
      row.insertBefore(b, row.firstChild);
    }
  }
  window.renderWeeklyPanel=function(){
    const st=weekStart(app.settings.selectedAt);
    const days=Array.from({length:7},(_,i)=>addDays(st,i));
    const rows=app.base.filter(r=>recWeek(r)===ymd(st));
    ui.panelTitle.textContent='Weekly';
    ui.panelBody.innerHTML='<div class="row weekNav"><button id="prevWeekBtn">←</button><b>W'+weekNo(st)+' · '+ymd(days[0])+' → '+ymd(days[6])+'</b><button id="nextWeekBtn">→</button></div><details open><summary>Πίνακας εβδομάδας</summary>'+weeklyTable(days,rows)+'</details><details><summary>Κάρτες στοιχείων ('+rows.length+')</summary>'+(rows.map(weeklyCard).join('')||'<p>No records.</p>')+'</details>';
    const change=(n,e)=>{ if(e){e.preventDefault();e.stopPropagation();} const base=weekStart(app.settings.selectedAt); app.settings.selectedAt=addDays(base,n*7).toISOString(); buildViews(); renderWeeklyPanel(); };
    const p=q('prevWeekBtn'), nx=q('nextWeekBtn');
    if(p) p.onclick=e=>change(-1,e);
    if(nx) nx.onclick=e=>change(1,e);
  };
  function wireSelect(){
    document.querySelectorAll('[data-select]').forEach(b=>{
      b.onclick=e=>{e.preventDefault();e.stopPropagation();app.selectMode=b.dataset.select;app.mode=null;closePops();showHint(app.selectMode==='box'?'Select window: drag rectangle on canvas':'Select one: tap object on canvas');};
    });
  }
  function wireAddDesign(){
    document.querySelectorAll('[data-add]').forEach(b=>{
      b.onclick=e=>{e.preventDefault();e.stopPropagation();app.selectMode=null;setTool('add',b.dataset.add);};
    });
    document.querySelectorAll('[data-design]').forEach(b=>{
      b.onclick=e=>{e.preventDefault();e.stopPropagation();app.selectMode=null;setTool('design',b.dataset.design);};
    });
  }
  window.setup=function(){
    window.addEventListener('resize',resize);
    ensurePinButton();
    safeOn(ui.viewBtn,'click',e=>{e.stopPropagation();clampPopover(ui.viewPop,ui.viewBtn)});
    safeOn(ui.addBtn,'click',e=>{e.stopPropagation();clampPopover(ui.addPop,ui.addBtn)});
    safeOn(ui.designBtn,'click',e=>{e.stopPropagation();clampPopover(ui.designPop,ui.designBtn)});
    safeOn(ui.selectBtn,'click',e=>{e.stopPropagation();clampPopover(ui.selectPop,ui.selectBtn)});
    safeOn(ui.layersBtn,'click',e=>{e.stopPropagation();clampPopover(ui.layersPop,ui.layersBtn)});
    safeOn(q('pinBtnV71'),'click',pinAvatar);
    safeOn(ui.followBtn,'click',()=>{app.follow=!app.follow;ui.followBtn.classList.toggle('active',app.follow);showHint(app.follow?'Follow on':'Follow off')});
    safeOn(ui.zoomIn,'click',()=>{app.camera.z*=1.25;draw()});
    safeOn(ui.zoomOut,'click',()=>{app.camera.z/=1.25;draw()});
    safeOn(ui.fit,'click',()=>{fitAll();draw()});
    safeOn(ui.fitSel,'click',()=>{fitSelected();draw()});
    q('prevDateBtn')&&(q('prevDateBtn').onclick=e=>{e.preventDefault();showSelectedDateStep(-1)});
    q('nextDateBtn')&&(q('nextDateBtn').onclick=e=>{e.preventDefault();showSelectedDateStep(1)});
    q('todayDateBtn')&&(q('todayDateBtn').onclick=e=>{e.preventDefault();app.settings.selectedAt=new Date().toISOString();buildViews();renderAll()});
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=e=>{e.preventDefault();app.settings.viewMode=b.dataset.view;closePops();buildViews();renderAll();showHint('View: '+b.dataset.view)});
    wireAddDesign(); wireSelect();
    ['Trail','Controls','Objects','Routes','Areas'].forEach(n=>{const el=q('layer'+n);if(el)el.onchange=e=>{app.layers[n.toLowerCase()]=e.target.checked;renderAll()}});
    if(ui.toolboxHub){ ui.toolboxHub.onclick=e=>{e.stopPropagation();toggleToolArc();}; }
    const tv=q('toolViewBtn'), tl=q('toolLayersBtn');
    if(tv) tv.onclick=e=>{e.stopPropagation();toggleToolArc(false);clampPopover(ui.viewPop,tv)};
    if(ui.toolAddBtn) ui.toolAddBtn.onclick=e=>{e.stopPropagation();toggleToolArc(false);clampPopover(ui.addPop,ui.toolAddBtn)};
    if(ui.toolDesignBtn) ui.toolDesignBtn.onclick=e=>{e.stopPropagation();toggleToolArc(false);clampPopover(ui.designPop,ui.toolDesignBtn)};
    if(ui.toolSelectBtn) ui.toolSelectBtn.onclick=e=>{e.stopPropagation();toggleToolArc(false);clampPopover(ui.selectPop,ui.toolSelectBtn)};
    if(ui.measureLineBtn) ui.measureLineBtn.onclick=e=>{e.stopPropagation();toggleToolArc(false);app.selectMode=null;startMeasure('distance')};
    if(ui.measurePathBtn) ui.measurePathBtn.onclick=e=>{e.stopPropagation();toggleToolArc(false);app.selectMode=null;startMeasure('path')};
    if(tl) tl.onclick=e=>{e.stopPropagation();toggleToolArc(false);clampPopover(ui.layersPop,tl)};
    ui.hub.onclick=e=>{e.stopPropagation();toggleArc()};
    let lp; ui.hub.addEventListener('pointerdown',()=>{lp=setTimeout(()=>setPanel('compass'),650)}); ui.hub.addEventListener('pointerup',()=>clearTimeout(lp));
    ui.hub.addEventListener('contextmenu',e=>{e.preventDefault();setPanel('compass')});
    ui.arcBase.onclick=()=>setPanel('base'); ui.arcWeekly.onclick=()=>setPanel('weekly'); ui.arcSettings.onclick=()=>setPanel('settings');
    ui.panelClose.onclick=()=>ui.panel.classList.remove('open'); ui.calClose.onclick=()=>ui.calDialog.close();
    document.querySelectorAll('[data-panel]').forEach(b=>b.onclick=()=>setPanel(b.dataset.panel));
    ui.canvas.addEventListener('pointerdown',canvasDown); ui.canvas.addEventListener('pointermove',canvasMove); ui.canvas.addEventListener('pointerup',canvasUp);
    ui.canvas.addEventListener('contextmenu',e=>{e.preventDefault();if(app.active)finishActive(screenToLocal(e.offsetX,e.offsetY))});
    document.addEventListener('click',e=>{ if(!e.target.closest('.popover')&&!e.target.closest('#bottomToolbar')&&!e.target.closest('#toolArc')&&!e.target.closest('#toolboxHub')) closePops(); if(ui.panel.classList.contains('open')&&e.target===ui.canvas) ui.panel.classList.remove('open'); });
    document.addEventListener('click',e=>{const cell=e.target.closest('.expandCell'); if(cell) cell.classList.toggle('open')});
    window.addEventListener('deviceorientation',e=>{app.orientation={alpha:e.alpha,beta:e.beta||0,gamma:e.gamma||0,source:'deviceorientation'}; if(e.alpha!==null){app.avatarView.heading=computeHeading({heading:null,speed:0},app.avatarView.correctedLocal)}});
    window.addEventListener('pagehide',saveSettings);
  };
})();

async function boot(){resize();setup();draw();renderLoop();try{await openDb();await loadDb()}catch(e){console.warn('DB startup failed, fallback active',e)}resize();startGpsLoop();setTimeout(()=>{if(app.controlPoints.length===0&&!localStorage.getItem('psjCalIntroSeen')){localStorage.setItem('psjCalIntroSeen','1');showCalibrationIntro()}},1200)}
boot().catch(e=>alert('Startup error: '+(e.message||e)));
</script>
</body>
</html>
