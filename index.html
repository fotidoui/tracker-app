<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker CLEAN CORE</title>

<style>
body{margin:0;font-family:system-ui;background:#eef2f6}
#select{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px}
.box{background:white;padding:10px;border-radius:8px;text-align:center;cursor:pointer}
#app{display:none}
header{display:flex;background:#111827;color:white}
button{font-size:11px;padding:8px;margin:2px}
.tab{flex:1}
.active{background:#1f2937;color:white}
.card{background:white;margin:8px;padding:10px;border-radius:8px;font-size:12px}
textarea{width:100%}
table{width:100%;border-collapse:collapse;font-size:11px}
td,th{border:1px solid #ddd;padding:3px;text-align:center}
</style>
</head>

<body>

<div id="select"></div>

<div id="app">

<header>
  <button class="tab active" onclick="tab('w')">Weekly</button>
  <button class="tab" onclick="tab('r')">Routes</button>
  <button class="tab" onclick="tab('d')">DB</button>
  <button onclick="csv()">CSV</button>
</header>

<div id="view"></div>

</div>

<script>

/* ================= CORE STATE ================= */
let S={
  week:null,
  data:JSON.parse(localStorage.getItem("DATA")||"{}"),
  session:null,
  watch:null
};

/* ================= INIT WEEKS ================= */
let sel=document.getElementById("select");
for(let i=1;i<=52;i++){
  let d=document.createElement("div");
  d.className="box";
  d.innerHTML="Week "+i;
  d.onclick=()=>openWeek(i);
  sel.appendChild(d);
}

function openWeek(w){
  S.week=w;
  if(!S.data[w]){
    S.data[w]={
      habits:Array(8).fill(0).map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill(0).map(()=>[])
    };
  }
  document.getElementById("select").style.display="none";
  document.getElementById("app").style.display="block";
  tab('w');
}

/* ================= TAB ================= */
function tab(x){

  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));

  if(x=='w')renderW();
  if(x=='r')renderR();
  if(x=='d')renderD();

}

/* ================= WEEKLY ================= */
function renderW(){

let w=S.data[S.week];

let h="<div class='card'><b>Week "+S.week+"</b></div>";

h+="<div class='card'><table><tr><th></th>";
["M","T","W","T","F","S","S"].forEach(d=>h+="<th>"+d+"</th>");
h+="</tr>";

for(let i=0;i<8;i++){
h+="<tr><td>H"+(i+1)+"</td>";
for(let j=0;j<7;j++){
h+=`<td><input type='checkbox' ${w.habits[i][j]?'checked':''}
onchange='S.data[S.week].habits[${i}][${j}]=this.checked;save()'></td>`;
}
h+="</tr>";
}

h+="</table></div>";

h+="<div class='card'><b>Notes</b>";
w.notes.forEach((n,i)=>{
h+=`<textarea onchange='S.data[S.week].notes[${i}]=this.value;save()'>${n}</textarea>`;
});

h+="</div>";

document.getElementById("view").innerHTML=h;
}

/* ================= ROUTES ================= */
function renderR(){

let w=S.data[S.week];

let h="<div class='card'><button onclick='start()'>Start</button><button onclick='pause()'>Pause</button><button onclick='stop()'>Stop</button></div>";

h+="<div class='card'><b>Live</b> "+(S.session?S.session.points.length:0)+" pts</div>";

document.getElementById("view").innerHTML=h;
}

function start(){
S.session={seg:[[]],points:[]};

S.watch=navigator.geolocation.watchPosition(p=>{
let pt={lat:p.coords.latitude,lng:p.coords.longitude};
S.session.seg.at(-1).push(pt);
S.session.points.push(pt);
});
}

function pause(){S.session.seg.push([]);}

function stop(){
navigator.geolocation.clearWatch(S.watch);

let w=S.data[S.week];
let day=(new Date().getDay()+6)%7;

let route={segments:[],totalKm:0};

S.session.seg.forEach(s=>{
if(s.length<2)return;
let km=dist(s);
route.segments.push({points:s,km});
route.totalKm+=km;
});

w.routes[day].push(route);
save();
}

/* ================= DIST ================= */
function dist(a){
let t=0;
for(let i=1;i<a.length;i++){
t+=Math.hypot(a[i].lat-a[i-1].lat,a[i].lng-a[i-1].lng)*111;
}
return t;
}

/* ================= DB ================= */
function renderD(){

let w=S.data[S.week];

let h="<div class='card'><b>Database</b></div>";

w.routes.forEach((d,i)=>{
let sum=0;
d.forEach(r=>sum+=r.totalKm||0);
h+="Day "+(i+1)+": "+sum.toFixed(1)+" km<br>";
});

document.getElementById("view").innerHTML=h;
}

/* ================= CSV ================= */
function csv(){

let out="week,day,km\n";

for(let w in S.data){
S.data[w].routes.forEach((d,i)=>{
d.forEach(r=>{
out+=`${w},${i},${r.totalKm}\n`;
});
});
}

let blob=new Blob([out],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="routes.csv";
a.click();
}

/* ================= SAVE ================= */
function save(){
localStorage.setItem("DATA",JSON.stringify(S.data));
}

</script>

</body>
</html>
