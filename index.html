<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    .screen { display:none; }

    table { width:100%; border-collapse:collapse; margin:10px 0; }
    td, th { border:1px solid #ccc; font-size:12px; padding:4px; }

    #map, #vector {
      width:100%;
      height:260px;
      border:1px solid #ccc;
      margin:10px 0;
    }

    textarea { width:95%; height:40px; }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">

  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="saveDB()">Save Week</button>

  <button onclick="setMode('map')">Map</button>
  <button onclick="setMode('vector')">Vector</button>

  <div id="map"></div>
  <canvas id="vector"></canvas>

  <table id="table"></table>

  <div id="events"></div>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbView"></div>
</div>

<script>

// ===== STATE =====
let events = JSON.parse(localStorage.getItem("events") || "[]");
let db = JSON.parse(localStorage.getItem("db") || "[]");
let habits = JSON.parse(localStorage.getItem("habits") || JSON.stringify(
  Array.from({length:10},(_,i)=>"Habit "+(i+1))
));

let week = null;
let day = null;
let mode = "map";

let route = {active:false,paused:false,id:null};
let watch = null;

let map, layer;

// ===== INIT SAFE =====
window.onload = () => {

  document.getElementById("weekInput").onchange = e=>{
    week = Number(e.target.value);
    renderAll();
  };

  show("home");
};

// ===== SAVE =====
function save(){
  localStorage.setItem("events",JSON.stringify(events));
  localStorage.setItem("db",JSON.stringify(db));
  localStorage.setItem("habits",JSON.stringify(habits));
}

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly") setTimeout(initMap,100);
  if(id==="db") renderDB();
}

// ===== MODE =====
function setMode(m){
  mode = m;
  document.getElementById("map").style.display = m==="map"?"block":"none";
  document.getElementById("vector").style.display = m==="vector"?"block":"none";
  renderAll();
}

// ===== MAP =====
function initMap(){
  if(map) return;

  map = L.map("map").setView([52,5],7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  layer = L.layerGroup().addTo(map);
}

// ===== RENDER MASTER =====
function renderAll(){
  renderTable();
  renderEvents();
  drawMap();
  drawVector();
}

// ===== SAFE GPS WRAPPER =====
function gps(cb){
  navigator.geolocation.getCurrentPosition(pos=>{
    cb(pos.coords);
  },()=>cb(null));
}

// ===== EVENT CORE =====
function addEvent(type, extra={}){

  if(!Number.isFinite(week)) return;

  gps(coords=>{

    events.push({
      type,
      time:Date.now(),
      lat:coords?.latitude || null,
      lng:coords?.longitude || null,
      week:Number(week),
      day:day ?? (new Date().getDay()+6)%7,
      routeId:route.id,
      ...extra
    });

    save();
    renderAll();
  });
}

// ===== ROUTES =====
function startRoute(){
  route={active:true,paused:false,id:Date.now()};
  addEvent("route-start");

  watch = navigator.geolocation.watchPosition(pos=>{
    if(route.active && !route.paused){
      events.push({
        type:"route-point",
        time:Date.now(),
        lat:pos.coords.latitude,
        lng:pos.coords.longitude,
        week:Number(week),
        day:day ?? 0,
        routeId:route.id
      });
      save();
      renderAll();
    }
  });
}

function pauseRoute(){ route.paused=true; addEvent("pause"); }
function resumeRoute(){ route.paused=false; addEvent("resume"); }

function stopRoute(){
  navigator.geolocation.clearWatch(watch);
  addEvent("end");
  route={active:false,paused:false,id:null};
}

// ===== TABLE =====
function renderTable(){

  if(!week) return;

  let t=document.getElementById("table");
  t.innerHTML="";

  let h=document.createElement("tr");
  h.innerHTML="<th>Habit</th>"+Array.from({length:7},(_,i)=>`<th>${i}</th>`).join("");
  t.appendChild(h);

  for(let i=0;i<10;i++){
    let r=document.createElement("tr");

    let name=document.createElement("td");
    name.innerText=habits[i];
    r.appendChild(name);

    for(let d=0;d<7;d++){
      let c=document.createElement("td");

      let b=document.createElement("button");
      b.innerText="+";

      b.onclick=()=>{
        day=d;
        addEvent("habit",{habitIndex:i});
      };

      c.appendChild(b);
      r.appendChild(c);
    }

    t.appendChild(r);
  }
}

// ===== EVENTS VIEW =====
function renderEvents(){

  let div=document.getElementById("events");
  div.innerHTML="<h3>Events</h3>";

  let filtered = events.filter(e=>e.week===week);

  filtered.forEach(e=>{
    let d=document.createElement("div");
    d.innerText = `${e.type} | ${e.lat},${e.lng} | ${new Date(e.time).toLocaleTimeString()}`;

    let del=document.createElement("button");
    del.innerText="X";

    del.onclick=()=>{
      events = events.filter(x=>x!==e);
      save();
      renderAll();
    };

    d.appendChild(del);
    div.appendChild(d);
  });
}

// ===== MAP =====
function drawMap(){

  if(mode!=="map" || !map || !week) return;

  layer.clearLayers();

  let pts = events.filter(e=>e.week===week && e.lat);

  let routeMap={};

  pts.forEach(p=>{
    if(p.routeId){
      if(!routeMap[p.routeId]) routeMap[p.routeId]=[];
      routeMap[p.routeId].push([p.lat,p.lng]);
    }
  });

  Object.values(routeMap).forEach(r=>{
    if(r.length>1) L.polyline(r,{color:"blue"}).addTo(layer);
  });

  pts.forEach(p=>{
    L.circleMarker([p.lat,p.lng]).addTo(layer);
  });
}

// ===== VECTOR =====
function drawVector(){

  if(mode!=="vector" || !week) return;

  let c=document.getElementById("vector");
  c.width=c.offsetWidth;
  c.height=260;

  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  let pts = events.filter(e=>e.week===week && e.lat);
  if(pts.length<2) return;

  let minLat=Math.min(...pts.map(p=>p.lat));
  let maxLat=Math.max(...pts.map(p=>p.lat));
  let minLng=Math.min(...pts.map(p=>p.lng));
  let maxLng=Math.max(...pts.map(p=>p.lng));

  const proj = p => [
    (p.lng-minLng)/(maxLng-minLng)*c.width,
    c.height-(p.lat-minLat)/(maxLat-minLat)*c.height
  ];

  ctx.beginPath();

  pts.forEach((p,i)=>{
    let [x,y]=proj(p);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });

  ctx.stroke();
}

// ===== DB =====
function saveDB(){

  if(!week) return;

  db = db.filter(w=>w.week!==week);

  db.push({
    week:Number(week),
    data:JSON.parse(JSON.stringify(events.filter(e=>e.week===week)))
  });

  save();
}

function renderDB(){

  let d=document.getElementById("dbView");
  d.innerHTML="";

  db.forEach(w=>{
    d.innerHTML+="<h4>Week "+w.week+"</h4>";

    w.data.forEach(e=>{
      let row=document.createElement("div");
      row.innerText=`${e.type} | ${e.lat},${e.lng}`;
      d.appendChild(row);
    });
  });
}

</script>
</body>
</html>
