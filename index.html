<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; }

    .screen { display:none; }

    table {
      margin:20px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:6px;
      min-width:80px;
      vertical-align: top;
    }

    button { margin:6px; padding:10px; }

    pre { text-align:left; }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('routes')">Routes</button>
  <button onclick="show('db')">Database</button>
</div>

<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>
  <input id="weekInput" type="number" placeholder="Week">
  <table id="grid"></table>
</div>

<div id="routes" class="screen">
  <button onclick="show('home')">⬅</button><br>
  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>
  <p id="gpsStatus"></p>
</div>

<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

let currentWeek=null;
let weekData={};
let watchId=null;

let session={
  active:false,
  paused:false,
  segments:[]
};

const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

// ===== SAFE LOAD =====
window.onload=()=>{

  let saved=localStorage.getItem("weekData");

  if(saved){
    try{
      weekData=JSON.parse(saved);
    }catch(e){
      weekData={};
    }
  }

  // 🔥 FIX: normalize corrupted data
  for(let w in weekData){
    if(!weekData[w].routes){
      weekData[w].routes=[[],[],[],[],[],[],[]];
    }

    for(let i=0;i<7;i++){
      if(!Array.isArray(weekData[w].routes[i])){
        weekData[w].routes[i]=[];
      }
    }
  }

  show("home");
};

// ===== WEEK =====
document.getElementById("weekInput").addEventListener("change",e=>{
  currentWeek=Number(e.target.value);

  if(!weekData[currentWeek]){
    weekData[currentWeek]={
      routes:[[],[],[],[],[],[],[]]
    };
  }

  render();
});

// ===== START =====
function startRoute(){

  if(!currentWeek){
    alert("Select week first");
    return;
  }

  session={
    active:true,
    paused:false,
    segments:[[]]
  };

  document.getElementById("gpsStatus").innerText="Tracking...";

  watchId=navigator.geolocation.watchPosition(pos=>{

    if(!session.active || session.paused) return;

    session.segments[session.segments.length-1].push({
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    });

  },
  err=>{
    document.getElementById("gpsStatus").innerText=err.message;
  },
  {enableHighAccuracy:true});
}

// ===== PAUSE =====
function pauseRoute(){
  session.paused=true;
  session.segments.push([]);
}

// ===== RESUME =====
function resumeRoute(){
  session.paused=false;
}

// ===== STOP =====
function stopRoute(){

  session.active=false;
  navigator.geolocation.clearWatch(watchId);

  let day=(new Date().getDay()+6)%7;

  let route={
    segments:[],
    totalKm:0
  };

  for(let seg of session.segments){

    if(!seg || seg.length<2) continue;

    let km=calc(seg);
    if(km<0.02) continue;

    route.segments.push({
      km:km.toFixed(2),
      start:"start",
      end:"end"
    });

    route.totalKm+=km;
  }

  weekData[currentWeek].routes[day].push(route);

  save();
  render();
}

// ===== DISTANCE =====
function calc(r){
  let t=0;
  for(let i=1;i<r.length;i++){
    t+=dist(r[i-1],r[i]);
  }
  return t;
}

function dist(a,b){
  let R=6371;
  let dLat=(b.lat-a.lat)*Math.PI/180;
  let dLon=(b.lng-a.lng)*Math.PI/180;

  let x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== SAVE =====
function save(){
  localStorage.setItem("weekData",JSON.stringify(weekData));
}

// ===== WEEK VIEW =====
function render(){

  if(!currentWeek) return;

  let t=document.getElementById("grid");
  t.innerHTML="";

  let header=document.createElement("tr");
  header.appendChild(document.createElement("th"));

  for(let d of days){
    let th=document.createElement("th");
    th.innerText=d;
    header.appendChild(th);
  }

  t.appendChild(header);

  let row=document.createElement("tr");
  row.style.background="#eef";
  row.appendChild(Object.assign(document.createElement("td"),{innerText:"Routes"}));

  for(let i=0;i<7;i++){

    let routes=(weekData[currentWeek].routes[i]||[]);

    let total=0;
    routes.forEach(r=>{
      total+=r.totalKm||0;
    });

    let td=document.createElement("td");
    td.innerHTML=routes.length+"<br>"+total.toFixed(1)+" km";

    row.appendChild(td);
  }

  t.appendChild(row);
}

// ===== DATABASE (FIXED) =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  if(Object.keys(weekData).length===0){
    div.innerHTML="<b>No data stored</b>";
    return;
  }

  for(let w in weekData){

    let block=document.createElement("div");
    block.style.border="1px solid #aaa";
    block.style.margin="10px";
    block.style.padding="10px";

    block.innerHTML="<h3>Week "+w+"</h3>";

    let data=weekData[w];

    for(let i=0;i<7;i++){

      let routes=(data.routes?.[i]||[]);

      block.innerHTML+="<b>"+days[i]+"</b><br>";

      if(routes.length===0){
        block.innerHTML+="No routes<br><br>";
        continue;
      }

      routes.forEach(r=>{
        block.innerHTML+=
          "Total: "+(r.totalKm||0).toFixed(2)+" km<br>";

        if(r.segments){
          r.segments.forEach(s=>{
            block.innerHTML+=s.km+" km<br>";
          });
        }

        block.innerHTML+="<br>";
      });
    }

    div.appendChild(block);
  }
}

</script>

</body>
</html>
