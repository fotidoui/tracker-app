<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid GIS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; text-align:center; }
.screen { display:none; }

#map { width:100%; height:260px; border:1px solid #ccc; }

table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ccc; font-size:12px; padding:4px; }

.event { font-size:11px; border-bottom:1px solid #eee; padding:3px; }
</style>
</head>

<body>

<h2>Hybrid GIS Tracker</h2>

<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('map')">Map</button>
  <button onclick="show('db')">Database</button>
</div>

<!-- ================= WEEKLY ================= -->
<div id="weekly" class="screen">

  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <button onclick="renderAll()">Refresh</button>

  <table id="table"></table>

  <div id="events"></div>
</div>

<!-- ================= MAP ================= -->
<div id="mapScreen" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="map"></div>
</div>

<!-- ================= DB ================= -->
<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbView"></div>
</div>

<script>

// ================= STATE =================
let events = JSON.parse(localStorage.getItem("events") || "[]");
let routes = {};

let week = null;
let route = null;
let watch = null;

let map, layer;

// ================= WEEKDAYS =================
const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ================= INIT =================
window.onload = () => {
  document.getElementById("weekInput").onchange = e=>{
    week = Number(e.target.value);
    renderAll();
  };

  show("home");
};

// ================= SAVE =================
function save(){
  localStorage.setItem("events",JSON.stringify(events));
}

// ================= NAV =================
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id==="map"?"mapScreen":id).style.display="block";

  if(id==="map") initMap();
  if(id==="db") renderDB();
}

// ================= DISTANCE (Haversine) =================
function dist(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;

  const x =
    Math.sin(dLat/2)**2 +
    Math.cos(a.lat*Math.PI/180) *
    Math.cos(b.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  return 2*R*Math.asin(Math.sqrt(x));
}

// ================= REVERSE GEOCODE =================
async function getAddress(lat,lng){
  try{
    let r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
    );
    let j = await r.json();
    return j.display_name;
  }catch(e){
    return "offline";
  }
}

// ================= ADD EVENT =================
async function addEvent(type, coords){

  let now = new Date();

  let address = coords
    ? await getAddress(coords.lat,coords.lng)
    : null;

  events.push({
    id:Date.now()+Math.random(),
    type,
    time:now.getTime(),
    week,
    day:(now.getDay()+6)%7,
    lat:coords?.lat,
    lng:coords?.lng,
    address
  });

  save();
  renderAll();
}

// ================= ROUTE SYSTEM =================
function startRoute(){

  route = {
    id:Date.now(),
    points:[],
    distance:0,
    active:true,
    last:null
  };

  watch = navigator.geolocation.watchPosition(async p=>{

    if(!route.active) return;

    let point = {
      lat:p.coords.latitude,
      lng:p.coords.longitude,
      time:Date.now()
    };

    if(route.last){
      route.distance += dist(route.last,point);
    }

    route.last = point;
    route.points.push(point);

    events.push({
      id:Date.now()+Math.random(),
      type:"route-point",
      week,
      lat:point.lat,
      lng:point.lng,
      routeId:route.id,
      distance:route.distance
    });

    save();
  });
}

function pauseRoute(){ route.active=false; }
function resumeRoute(){ route.active=true; }

function stopRoute(){
  navigator.geolocation.clearWatch(watch);
  route.active=false;
}

// ================= RENDER =================
function renderAll(){
  renderTable();
  renderEvents();
  renderMap();
}

// ================= TABLE =================
function renderTable(){

  if(!week) return;

  let t=document.getElementById("table");
  t.innerHTML="";

  let h="<th>Habit</th>"+days.map(d=>`<th>${d}</th>`).join("");
  t.innerHTML="<tr>"+h+"</tr>";
}

// ================= EVENTS =================
function renderEvents(){

  let div=document.getElementById("events");
  div.innerHTML="<h3>Events</h3>";

  events.filter(e=>e.week===week).forEach(e=>{

    let d=document.createElement("div");
    d.className="event";

    d.innerText =
      `${e.type} | ${e.lat},${e.lng} | ${e.address||""} | km:${e.distance||0}`;

    div.appendChild(d);
  });
}

// ================= MAP =================
function initMap(){

  if(map) return;

  map = L.map("map").setView([52,5],7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  layer = L.layerGroup().addTo(map);

  renderMap();
}

function renderMap(){

  if(!map) return;

  layer.clearLayers();

  let pts = events.filter(e=>e.week===week && e.lat);

  let routes = {};

  pts.forEach(p=>{
    if(!routes[p.routeId]) routes[p.routeId]=[];
    routes[p.routeId].push([p.lat,p.lng]);
  });

  Object.values(routes).forEach(r=>{
    if(r.length>1)
      L.polyline(r,{color:"blue"}).addTo(layer);
  });

  pts.forEach(p=>{
    L.circleMarker([p.lat,p.lng]).addTo(layer);
  });
}

// ================= DB =================
function renderDB(){

  let div=document.getElementById("dbView");
  div.innerHTML="";

  let grouped = {};

  events.forEach(e=>{
    if(!grouped[e.week]) grouped[e.week]=0;
    grouped[e.week]++;
  });

  Object.keys(grouped).forEach(w=>{
    div.innerHTML += `<h3>Week ${w}</h3>Events: ${grouped[w]}<br>`;
  });
}

</script>
</body>
</html>
