<!DOCTYPE html>
<html>
<head>
  <title>Tracker App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }

    .screen { display:none; }

    table {
      margin:10px auto;
      border-collapse: collapse;
      width:100%;
    }

    td, th {
      border:1px solid #ccc;
      padding:5px;
      font-size:12px;
    }

    textarea { width:95%; height:40px; }

    button { margin:3px; padding:6px; }

    #map { height:250px; margin:10px; border:1px solid #aaa; }

    .eventBox {
      font-size:10px;
      border-top:1px solid #ddd;
      margin-top:3px;
    }
  </style>
</head>
<body>

<h2>Tracker App</h2>

<!-- HOME -->
<div id="home" class="screen">
  <button onclick="show('weekly')">Weekly</button>
  <button onclick="show('db')">Database</button>
</div>

<!-- WEEKLY -->
<div id="weekly" class="screen">
  <button onclick="show('home')">⬅</button><br>

  <input id="weekInput" type="number" placeholder="Week"><br>

  <!-- ROUTE BUTTONS -->
  <button onclick="startRoute()">Start</button>
  <button onclick="pauseRoute()">Pause</button>
  <button onclick="resumeRoute()">Resume</button>
  <button onclick="stopRoute()">Stop</button>

  <p id="gpsStatus"></p>

  <!-- FILTERS -->
  <select id="filterDay" onchange="updateMap()">
    <option value="all">All Days</option>
    <option value="0">Mon</option>
    <option value="1">Tue</option>
    <option value="2">Wed</option>
    <option value="3">Thu</option>
    <option value="4">Fri</option>
    <option value="5">Sat</option>
    <option value="6">Sun</option>
  </select>

  <select id="filterType" onchange="updateMap()">
    <option value="all">All Types</option>
    <option value="habit">Habits</option>
    <option value="note">Notes</option>
    <option value="route">Routes</option>
  </select>

  <!-- MAP MODE -->
  <select id="mapMode" onchange="updateMap()">
    <option value="off">Map OFF</option>
    <option value="light" selected>Light Mode</option>
    <option value="full">Full Map</option>
  </select>

  <div id="map"></div>

  <table id="grid"></table>
</div>

<!-- DATABASE -->
<div id="db" class="screen">
  <button onclick="show('home')">⬅</button>
  <div id="dbContent"></div>
</div>

<script>

let habits = [];
let events = [];
let currentWeek = null;

let lastPos = null;
let watchId = null;

let routeSession = { active:false, id:null };

let map = null;
let markersLayer = null;
let routeLayer = null;

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ===== NAV =====
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  if(id==="weekly"){
    setTimeout(initMap,100);
  }

  if(id==="db") renderDB();
}

// ===== INIT =====
window.onload = () => {

  habits = JSON.parse(localStorage.getItem("habits")) || [];
  events = JSON.parse(localStorage.getItem("events")) || [];

  if(habits.length === 0){
    habits = Array(10).fill("").map((_,i)=>"Habit "+(i+1));
  }

  startGPS();
  show("home");
};

// ===== GPS =====
function startGPS(){

  if(!navigator.geolocation) return;

  watchId = navigator.geolocation.watchPosition(pos=>{
    lastPos = {
      lat:pos.coords.latitude,
      lng:pos.coords.longitude
    };

    document.getElementById("gpsStatus").innerText = "GPS active";

  }, ()=>{}, {
    enableHighAccuracy:false,
    maximumAge:10000
  });
}

// ===== MAP =====
function initMap(){

  if(map) return;

  map = L.map('map').setView([0,0],2);

  markersLayer = L.layerGroup().addTo(map);
  routeLayer = L.layerGroup().addTo(map);

  updateMap();
}

// ===== SAVE =====
function save(){
  localStorage.setItem("events", JSON.stringify(events));
  localStorage.setItem("habits", JSON.stringify(habits));
}

// ===== EVENT =====
function recordEvent(type, extra={}){

  let day = (new Date().getDay()+6)%7;

  events.push({
    type,
    timestamp:Date.now(),
    lat:lastPos?.lat || null,
    lng:lastPos?.lng || null,
    week:currentWeek,
    day,
    routeId:routeSession.id,
    ...extra
  });

  save();
  updateMap();
}

// ===== ROUTES =====
function startRoute(){
  routeSession = {active:true,id:Date.now()};
  recordEvent("route-start");
}
function pauseRoute(){ recordEvent("route-pause"); }
function resumeRoute(){ recordEvent("route-resume"); }
function stopRoute(){ recordEvent("route-end"); routeSession.active=false; }

// ===== MAP UPDATE =====
function updateMap(){

  if(!map) return;

  let mode = document.getElementById("mapMode").value;
  let filterDay = document.getElementById("filterDay").value;
  let filterType = document.getElementById("filterType").value;

  markersLayer.clearLayers();
  routeLayer.clearLayers();

  map.eachLayer(l=>{
    if(l instanceof L.TileLayer) map.removeLayer(l);
  });

  if(mode === "full"){
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }

  if(mode === "off") return;

  let weekEvents = events.filter(e => {
    return e.week === currentWeek &&
      (filterDay==="all" || e.day == filterDay) &&
      (filterType==="all" ||
       (filterType==="route" && e.type.startsWith("route")) ||
       e.type===filterType);
  });

  // POINTS
  weekEvents.forEach(ev=>{

    if(!ev.lat) return;

    let color =
      ev.type==="habit" ? "green" :
      ev.type==="note" ? "blue" :
      "red";

    let marker = L.circleMarker([ev.lat,ev.lng],{
      radius:5,
      color
    });

    marker.bindPopup(`
      ${ev.type}<br>
      ${new Date(ev.timestamp).toLocaleString()}
    `);

    markersLayer.addLayer(marker);
  });

  // ROUTE LINES
  let routes = {};

  weekEvents.forEach(ev=>{
    if(!ev.routeId || !ev.lat) return;

    if(!routes[ev.routeId]) routes[ev.routeId] = [];
    routes[ev.routeId].push(ev);
  });

  Object.values(routes).forEach(route=>{

    route.sort((a,b)=>a.timestamp-b.timestamp);

    let coords = route.map(p=>[p.lat,p.lng]);

    if(coords.length < 2) return;

    let line = L.polyline(coords,{color:"red"}).addTo(routeLayer);

    let start = route[0];
    let end = route[route.length-1];

    let distance = 0;
    for(let i=1;i<coords.length;i++){
      distance += map.distance(coords[i-1],coords[i]);
    }

    line.bindPopup(`
      Route<br>
      From: ${new Date(start.timestamp).toLocaleTimeString()}<br>
      To: ${new Date(end.timestamp).toLocaleTimeString()}<br>
      Distance: ${(distance/1000).toFixed(2)} km
    `);
  });

  if(weekEvents.length > 0){
    let last = weekEvents[weekEvents.length-1];
    if(last.lat) map.setView([last.lat,last.lng],13);
  }
}

// ===== WEEK =====
document.getElementById("weekInput").addEventListener("change", e=>{
  currentWeek = Number(e.target.value);
  renderWeek();
  updateMap();
});

// ===== TABLE =====
function renderWeek(){

  if(!currentWeek) return;

  let table=document.getElementById("grid");
  table.innerHTML="";

  let header=document.createElement("tr");
  header.appendChild(document.createElement("th"));

  days.forEach(d=>{
    let th=document.createElement("th");
    th.innerText=d;
    header.appendChild(th);
  });

  table.appendChild(header);

  // HABITS
  for(let i=0;i<10;i++){

    let row=document.createElement("tr");

    let name=document.createElement("td");
    let inp=document.createElement("input");
    inp.value=habits[i];

    inp.onchange=()=>{
      habits[i]=inp.value;
      save();
    };

    name.appendChild(inp);
    row.appendChild(name);

    for(let d=0;d<7;d++){

      let td=document.createElement("td");

      let evs = events.filter(e =>
        e.type==="habit" &&
        e.week===currentWeek &&
        e.day===d &&
        e.habitIndex===i
      );

      let cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked = evs.length>0;

      cb.onclick=()=>{
        recordEvent("habit",{habitIndex:i});
        renderWeek();
      };

      td.appendChild(cb);

      row.appendChild(td);
    }

    table.appendChild(row);
  }

  // NOTES
  let row=document.createElement("tr");
  row.appendChild(Object.assign(document.createElement("td"),{innerText:"Notes"}));

  for(let d=0;d<7;d++){

    let td=document.createElement("td");

    let ta=document.createElement("textarea");

    let btn=document.createElement("button");
    btn.innerText="✔";

    btn.onclick=()=>{
      recordEvent("note",{text:ta.value});
      ta.value="";
      renderWeek();
    };

    td.appendChild(ta);
    td.appendChild(btn);

    row.appendChild(td);
  }

  table.appendChild(row);
}

// ===== DATABASE =====
function renderDB(){

  let div=document.getElementById("dbContent");
  div.innerHTML="";

  events.forEach(ev=>{
    let box=document.createElement("div");

    box.style.border="1px solid #ccc";
    box.style.margin="5px";
    box.style.padding="5px";

    box.innerHTML = `
      <b>${ev.type}</b><br>
      Week: ${ev.week} | Day: ${days[ev.day]}<br>
      Time: ${new Date(ev.timestamp).toLocaleString()}<br>
      GPS: ${ev.lat ? ev.lat.toFixed(5)+", "+ev.lng.toFixed(5) : "No GPS"}<br>
      Route: ${ev.routeId || "-"}<br>
      ${ev.text ? "Note: "+ev.text : ""}
    `;

    div.appendChild(box);
  });
}

</script>

</body>
</html>
