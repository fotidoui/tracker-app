<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker STABLE CORE</title>

<style>
body{margin:0;font-family:system-ui;background:#eef2f6}
#weeks{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px}
.box{background:white;padding:10px;border-radius:8px;cursor:pointer;text-align:center}
#app{display:none}
header{display:flex;background:#111827;color:white}
header button{flex:1;padding:10px;border:none;background:none;color:#ccc}
header button.active{background:#1f2937;color:white}
.card{background:white;margin:10px;padding:10px;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
td,th{border:1px solid #ddd;padding:3px;text-align:center}
textarea{width:100%}
button{font-size:11px;margin:2px}
</style>
</head>

<body>

<div id="weeks"></div>

<div id="app">

<header>
<button onclick="go('w')" id="bw">Weekly</button>
<button onclick="go('r')" id="br">Routes</button>
<button onclick="go('d')" id="bd">DB</button>
<button onclick="exportCSV()">CSV</button>
</header>

<div id="view"></div>

</div>

<script>

/* ================= CORE STATE ================= */
const S={
  week:null,
  data:JSON.parse(localStorage.getItem("DATA")||"{}"),
  session:null,
  watch:null,
  tab:"w"
};

/* ================= WEEKS ================= */
const w=document.getElementById("weeks");

for(let i=1;i<=52;i++){
  let d=document.createElement("div");
  d.className="box";
  d.innerText="Week "+i;
  d.onclick=()=>openWeek(i);
  w.appendChild(d);
}

function openWeek(i){
  S.week=i;
  if(!S.data[i]){
    S.data[i]={
      habits:Array(8).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
  document.getElementById("weeks").style.display="none";
  document.getElementById("app").style.display="block";
  go("w");
}

/* ================= TAB SYSTEM ================= */
function go(t){
  S.tab=t;
  document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));

  if(t==="w"){bw.classList.add("active");renderW();}
  if(t==="r"){br.classList.add("active");renderR();}
  if(t==="d"){bd.classList.add("active");renderD();}
}

/* ================= WEEKLY ================= */
function renderW(){
let w=S.data[S.week];

let html="<div class='card'><b>Week "+S.week+"</b></div>";

html+="<div class='card'><table><tr><th></th>";

["M","T","W","T","F","S","S"].forEach(d=>html+="<th>"+d+"</th>");
html+="</tr>";

for(let i=0;i<8;i++){
html+="<tr><td>H"+(i+1)+"</td>";
for(let j=0;j<7;j++){
html+=`
<td>
<input type="checkbox"
${w.habits[i][j]?"checked":""}
onchange="S.data[S.week].habits[${i}][${j}]=this.checked;save()">
</td>`;
}
html+="</tr>";
}

html+="</table></div>";

html+="<div class='card'><b>Notes</b>";
w.notes.forEach((n,i)=>{
html+=`<textarea onchange="S.data[S.week].notes[${i}]=this.value;save()">${n}</textarea>`;
});
html+="</div>";

document.getElementById("view").innerHTML=html;
}

/* ================= ROUTES ================= */
function renderR(){

let html=`
<div class='card'>
<button onclick='start()'>Start</button>
<button onclick='pause()'>Pause</button>
<button onclick='stop()'>Stop</button>
</div>
<div class='card'>Live session: ${S.session?S.session.points.length:0}</div>
`;

document.getElementById("view").innerHTML=html;
}

function start(){
S.session={seg:[[]],points:[]};

S.watch=navigator.geolocation.watchPosition(p=>{
let pt={lat:p.coords.latitude,lng:p.coords.longitude};
S.session.seg.at(-1).push(pt);
S.session.points.push(pt);
});
}

function pause(){
if(!S.session) return;
S.session.seg.push([]);
}

function stop(){

if(!S.session) return;

navigator.geolocation.clearWatch(S.watch);

let w=S.data[S.week];
let day=(new Date().getDay()+6)%7;

let route={segments:[],totalKm:0};

S.session.seg.forEach(s=>{
if(s.length<2)return;
let km=dist(s);
route.segments.push({points:s,km});
route.totalKm+=km;
});

w.routes[day].push(route);

save();
}

/* ================= DIST ================= */
function dist(a){
let t=0;
for(let i=1;i<a.length;i++){
t+=Math.hypot(a[i].lat-a[i-1].lat,a[i].lng-a[i-1].lng)*111;
}
return t;
}

/* ================= DB ================= */
function renderD(){

let w=S.data[S.week];

let html="<div class='card'><b>Database</b></div>";

w.routes.forEach((d,i)=>{
let sum=0;
d.forEach(r=>sum+=r.totalKm||0);
html+="Day "+(i+1)+": "+sum.toFixed(1)+" km<br>";
});

document.getElementById("view").innerHTML=html;
}

/* ================= CSV ================= */
function exportCSV(){

let out="week,day,km\n";

for(let w in S.data){
S.data[w].routes.forEach((d,i)=>{
d.forEach(r=>{
out+=`${w},${i},${r.totalKm||0}\n`;
});
});
}

let blob=new Blob([out],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="routes.csv";
a.click();
}

/* ================= SAVE ================= */
function save(){
localStorage.setItem("DATA",JSON.stringify(S.data));
}

</script>

</body>
</html>
