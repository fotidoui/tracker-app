<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FieldLog Stable</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#eef2f6;
}

#weekSelect{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  padding:20px;
}

.weekBox{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

#app{display:none;}

#header{
  display:flex;
  background:#111827;
  color:white;
}

#tabs{
  display:flex;
  flex:1;
}

#tabs button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:#cbd5e1;
  font-size:11px;
}

#tabs button.active{
  background:#1f2937;
  color:white;
}

#back{
  padding:10px;
  background:#374151;
  color:white;
  border:none;
  font-size:11px;
}

#content{padding:12px;}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
  font-size:12px;
}

.small{
  font-size:11px;
  color:#555;
  margin-top:3px;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

td,th{
  border:1px solid #e5e7eb;
  font-size:10px;
  text-align:center;
  padding:2px;
}

textarea{
  width:100%;
  font-size:11px;
}

canvas{
  width:100%;
  height:300px;
  background:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="weekSelect"></div>

<div id="app">

<div id="header">
  <div id="tabs">
    <button onclick="tab('weekly')" id="t-weekly">Weekly</button>
    <button onclick="tab('routes')" id="t-routes">Routes</button>
    <button onclick="tab('viz')" id="t-viz">Vectors</button>
    <button onclick="tab('db')" id="t-db">Database</button>
  </div>
  <button id="back" onclick="back()">Weeks</button>
</div>

<div id="content">

<div id="weekly"></div>

<div id="routes" style="display:none"></div>

<div id="viz" style="display:none">
  <div class="card">
    <button onclick="drawVectors()">Render Route Vectors</button>
    <div class="small">
      → shows simplified movement lines<br>
      → no map needed (lightweight)
    </div>
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="db" style="display:none"></div>

</div>
</div>

<script>

let state={
  week:null,
  data:JSON.parse(localStorage.getItem("data")||"{}")
};

let habits=Array.from({length:8},(_,i)=>"Habit "+(i+1));

let session=null;
let watch=null;

/* ================= WEEK SELECT ================= */
function initWeeks(){
  let c=document.getElementById("weekSelect");
  c.innerHTML="<h2 style='grid-column:1/-1'>Select Week</h2>";

  for(let i=1;i<=52;i++){
    let d=new Date(2026,0,1+(i-1)*7);
    let m=d.toLocaleString('default',{month:'short'});

    let el=document.createElement("div");
    el.className="weekBox";
    el.innerHTML=`Week ${i}<br>${m}`;

    el.onclick=()=>{
      state.week=i;
      ensure();
      open();
    };

    c.appendChild(el);
  }
}
initWeeks();

/* ================= OPEN ================= */
function open(){
  document.getElementById("weekSelect").style.display="none";
  document.getElementById("app").style.display="block";
  tab("weekly");
}

function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("weekSelect").style.display="grid";
}

/* ================= DATA ================= */
function ensure(){
  if(!state.data[state.week]){
    state.data[state.week]={
      checks:Array(8).fill().map(()=>Array(7).fill(false)),
      notes:Array(7).fill(""),
      routes:Array(7).fill().map(()=>[])
    };
  }
}

/* ================= TABS ================= */
function tab(t){
  ["weekly","routes","viz","db"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });

  document.getElementById(t).style.display="block";

  if(t==="weekly") renderWeekly();
  if(t==="db") renderDB();
}

/* ================= WEEKLY ================= */
function renderWeekly(){

  let w=state.data[state.week];

  let html="<div class='card'><b>Week "+state.week+"</b><div class='small'>Your weekly tracking overview</div></div>";

  html+="<div class='card'><b>Habits</b><div class='small'>Check daily completion</div><table><tr><th></th>";

  ["M","T","W","T","F","S","S"].forEach(d=>{
    html+="<th>"+d+"</th>";
  });

  html+="</tr>";

  habits.forEach((h,i)=>{
    html+="<tr><td>"+h+"</td>";

    for(let j=0;j<7;j++){
      html+=`
      <td>
        <input type="checkbox"
        ${w.checks[i][j]?"checked":""}
        onchange="toggle(${i},${j})">
      </td>`;
    }

    html+="</tr>";
  });

  html+="</table></div>";

  html+="<div class='card'><b>Notes</b><div class='small'>Daily notes per weekday</div>";

  w.notes.forEach((n,i)=>{
    let label=["M","T","W","T","F","S","S"][i];
    html+=`
    <textarea onchange="note(${i},this.value)">
${label} /${i+1} / ${n}
</textarea>`;
  });

  html+="</div>";

  document.getElementById("weekly").innerHTML=html;
}

/* ================= DB FIXED ================= */
function renderDB(){

  let html="<div class='card'><b>Database Overview</b><div class='small'>Full stored structure</div></div>";

  for(let w in state.data){

    let week=state.data[w];

    html+=`<div class='card'><b>Week ${w}</b>`;

    /* habits summary */
    html+="<div class='small'><b>Habits:</b><br>";

    week.checks.forEach((r,i)=>{
      html+=`H${i+1}: `+r.map(x=>x?"✔":"✖").join(" ")+"<br>";
    });

    html+="</div>";

    /* notes */
    html+="<div class='small'><b>Notes:</b><br>";

    week.notes.forEach((n,i)=>{
      html+=`D${i+1}: ${n}<br>`;
    });

    html+="</div>";

    /* routes */
    html+="<div class='small'><b>Routes:</b><br>";

    week.routes.forEach((d,i)=>{
      let total=0;
      d.forEach(r=>total+=r.total||0);
      html+=`Day ${i+1}: ${total.toFixed(1)} km<br>`;
    });

    html+="</div></div>";
  }

  document.getElementById("db").innerHTML=html;
}

/* ================= VECTOR VIEW ================= */
function drawVectors(){

  let c=document.getElementById("canvas");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let w=state.data[state.week];
  if(!w) return;

  ctx.strokeStyle="blue";

  w.routes.forEach(day=>{
    day.forEach(route=>{
      if(!route.segments) return;

      route.segments.forEach(seg=>{
        let pts=seg.points;
        for(let i=1;i<pts.length;i++){
          ctx.beginPath();
          ctx.moveTo(pts[i-1].lat,pts[i-1].lng);
          ctx.lineTo(pts[i].lat,pts[i].lng);
          ctx.stroke();
        }
      });
    });
  });
}

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("data",JSON.stringify(state.data));
}

/* ================= CHECK ================= */
function toggle(i,j){
  state.data[state.week].checks[i][j]=!state.data[state.week].checks[i][j];
  save();
}

/* ================= NOTES ================= */
function note(i,v){
  state.data[state.week].notes[i]=v;
  save();
}

</script>
</body>
</html>
